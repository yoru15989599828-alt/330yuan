// --- AI Diary Writing ---
function requestAiDiary() {
  closeDiaryFab();
  if (aiWritingDiary) return;
  aiWritingDiary = true;
  renderDiaryList();
  // Send request to parent to generate AI diary
  var diaries = getDiaries();
  var recentDiaries = diaries.slice(-5).map(function(d) {
    return { author: d.author === 'char' ? csCharName : csUserName, title: d.title, content: d.content.substring(0, 200), mood: d.mood, date: fmtDiaryDate(d.timestamp) };
  });
  window.parent.postMessage({
    type: 'coupleSpaceDiaryAiRequest',
    charId: currentCharId,
    recentDiaries: recentDiaries,
    charName: csCharName,
    userName: csUserName
  }, '*');
}

function handleAiDiaryResult(data) {
  aiWritingDiary = false;
  if (data.error) {
    if (data.reason === 'already_wrote_today') {
      showDiaryToast('今天已经写过日记了，明天再来吧');
    } else if (data.reason === 'ai_decided_no') {
      showDiaryToast('TA觉得今天没什么特别想记录的');
    } else {
      showDiaryToast('写日记失败了，请稍后再试');
    }
    renderDiaryList();
    return;
  }
  // 手动触发时，保存日记
  var diaries = getDiaries();
  diaries.push({
    id: genId(),
    author: 'char',
    title: data.title || '无题',
    content: data.content || '',
    mood: data.mood || '',
    timestamp: Date.now(),
    comments: []
  });
  saveDiaries(diaries);
  renderDiaryList();
  showDiaryToast('TA写好了！');
}

function handleAutoDiaryWritten(data) {
  // 自动定时写入的日记，数据已经在localStorage中了，只需要刷新显示
  if (data.charId === currentCharId) {
    renderDiaryList();
    // 如果在日记页面，显示一个提示
    var diaryPage = document.getElementById('page-diary');
    if (diaryPage && diaryPage.classList.contains('active')) {
      showDiaryToast('TA写了一篇新日记');
    }
  }
}

function showDiaryToast(msg) {
  var el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(28,25,23,0.85);color:white;padding:12px 24px;border-radius:1rem;font-size:13px;z-index:100;pointer-events:none;';
  el.textContent = msg;
  document.getElementById('app').appendChild(el);
  setTimeout(function(){ el.remove(); }, 2500);
}

// --- AI Comment ---
function requestAiComment(diary) {
  // Ask AI to comment on user's diary
  window.parent.postMessage({
    type: 'coupleSpaceDiaryCommentRequest',
    charId: currentCharId,
    diaryId: diary.id,
    diaryAuthor: 'user',
    diaryTitle: diary.title,
    diaryContent: diary.content,
    diaryMood: diary.mood,
    charName: csCharName,
    userName: csUserName
  }, '*');
}

function requestAiCommentReply(diary, userComment) {
  // Ask AI to reply to user's comment on char's diary
  window.parent.postMessage({
    type: 'coupleSpaceDiaryCommentRequest',
    charId: currentCharId,
    diaryId: diary.id,
    diaryAuthor: 'char',
    diaryTitle: diary.title,
    diaryContent: diary.content,
    diaryMood: diary.mood,
    userComment: userComment,
    charName: csCharName,
    userName: csUserName
  }, '*');
}

function handleAiCommentResult(data) {
  if (data.error || !data.comment) return;
  var diaries = getDiaries();
  var diary = diaries.find(function(d){ return d.id === data.diaryId; });
  if (!diary) return;
  if (!diary.comments) diary.comments = [];
  diary.comments.push({
    author: 'char',
    content: data.comment,
    timestamp: Date.now()
  });
  saveDiaries(diaries);
  // If currently viewing this diary, refresh
  if (currentViewingDiaryId === data.diaryId) {
    renderDiaryDetail();
  }
  renderDiaryList();
}

// --- Diary Summary ---
function generateDiarySummary(diaryId) {
  var btn = document.getElementById('diary-summary-btn');
  if (btn) {
    btn.innerHTML = '<div class="diary-ai-dots" style="justify-content:center"><span></span><span></span><span></span></div> 生成中...';
    btn.style.pointerEvents = 'none';
  }
  var diaries = getDiaries();
  var diary = diaries.find(function(d){ return d.id === diaryId; });
  if (!diary) return;
  window.parent.postMessage({
    type: 'coupleSpaceDiarySummaryRequest',
    charId: currentCharId,
    diaryId: diary.id,
    diaryAuthor: diary.author,
    diaryTitle: diary.title,
    diaryContent: diary.content,
    diaryMood: diary.mood,
    diaryComments: diary.comments || [],
    charName: csCharName,
    userName: csUserName
  }, '*');
}

function handleDiarySummaryResult(data) {
  if (data.error || !data.summary) {
    showDiaryToast('摘要生成失败');
    if (currentViewingDiaryId === data.diaryId) renderDiaryDetail();
    return;
  }
  var diaries = getDiaries();
  var diary = diaries.find(function(d){ return d.id === data.diaryId; });
  if (!diary) return;
  diary.summary = data.summary;
  saveDiaries(diaries);
  if (currentViewingDiaryId === data.diaryId) renderDiaryDetail();
  showDiaryToast('摘要已生成');
}

function buildCountOptions(selected) {
  var opts = '';

}

var DEFAULT_DIARY_PROMPT = '# 你的任务\n你是"{{charName}}"，现在要在情侣空间里写一篇日记。这篇日记是写给你自己的，但你的伴侣"{{myNickname}}"可以看到并写评语。\n\n# 你的角色设定\n{{aiPersona}}\n\n# 你的伴侣\n- 昵称: {{myNickname}}\n- 人设: {{myPersona}}\n\n{{worldBook}}\n\n# 你的记忆\n{{structuredMemory}}\n\n{{longTermMemory}}\n\n{{shortTermMemory}}\n\n{{linkedMemory}}\n\n{{summaryContext}}\n\n{{recentDiaries}}\n\n# 当前时间\n{{currentTime}}\n\n# 输出要求\n请以JSON格式返回，不要输出任何其他内容：\n{"title": "日记标题", "content": "日记正文", "mood": "心情ID"}\n\n心情ID可选值: happy, calm, moved, miss, sad, angry, excited, tired（选一个最符合的）\n\n# 写作要求\n- 以第一人称写，像真人写日记一样自然\n- 内容要基于你的记忆和最近发生的事\n- 可以写对伴侣的感受、今天的心情、发生的事、未来的期待等\n- 字数在100-400字之间\n- 语气要符合你的角色设定\n- 不要写成流水账，要有情感和细节\n- 绝对不要提到你是AI';

function getDiaryCustomPrompt() {

}

}
function toggleDiaryPromptSetting() {
  var settings = getDiarySettings();
  settings.enableCustomPrompt = !settings.enableCustomPrompt;
  saveDiarySettings(settings);
  var toggle = document.getElementById('diary-toggle-prompt');
  toggle.classList.toggle('on', settings.enableCustomPrompt);
  var section = document.getElementById('diary-prompt-section');
  section.style.display = settings.enableCustomPrompt ? '' : 'none';
  if (settings.enableCustomPrompt && !settings.customPrompt) {
    document.getElementById('diary-prompt-textarea').value = DEFAULT_DIARY_PROMPT;
  }
  notifyDiarySettingsChanged();
}
function saveDiaryPromptText() {
  var settings = getDiarySettings();
  var val = document.getElementById('diary-prompt-textarea').value;
  settings.customPrompt = val;
  saveDiarySettings(settings);
  notifyDiarySettingsChanged();
  showDiaryToast('提示词已保存');
}
function resetDiaryPrompt() {
  document.getElementById('diary-prompt-textarea').value = DEFAULT_DIARY_PROMPT;
  var settings = getDiarySettings();
  settings.customPrompt = '';
  saveDiarySettings(settings);
  notifyDiarySettingsChanged();
  showDiaryToast('已重置为默认提示词');
}
function exportDiaryPrompt() {
  var text = document.getElementById('diary-prompt-textarea').value;
  var blob = new Blob([text], { type: 'text/plain' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'diary-prompt-' + (currentCharId || 'default') + '.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importDiaryPrompt() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.txt,.md';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var text = ev.target.result;
      document.getElementById('diary-prompt-textarea').value = text;
      var settings = getDiarySettings();
      settings.customPrompt = text;
      saveDiarySettings(settings);
      notifyDiarySettingsChanged();
      showDiaryToast('提示词已导入');
    };
    reader.readAsText(file);
  };
  input.click();
}
function notifyDiarySettingsChanged() {
  var settings = getDiarySettings();
  window.parent.postMessage({
    type: 'coupleSpaceDiarySettingsChanged',
    charId: currentCharId,
    settings: settings
  }, '*');
}

// ===== ALBUM =====
var albumFabOpen = false;
function getAlbumPhotos() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleAlbum_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveAlbumPhotos(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleAlbum_' + currentCharId, JSON.stringify(list));
}
function getAlbumSettings() {
  if (!currentCharId) return {};
  try { return JSON.parse(localStorage.getItem('coupleAlbumSettings_' + currentCharId)) || {}; }
  catch(e) { return {}; }
}
function saveAlbumSettings(s) {
  if (!currentCharId) return;
  localStorage.setItem('coupleAlbumSettings_' + currentCharId, JSON.stringify(s));
}

function renderAlbumList() {
  var container = document.getElementById('album-list-container');
  if (!container) return;
  var photos = getAlbumPhotos();
  if (photos.length === 0) {
    container.innerHTML = '';
    container.className = '';
    container.innerHTML = '<div class="album-empty"><svg class="album-empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><div class="album-empty-text">还没有照片</div></div>';
    return;
  }
  container.className = 'album-grid';
  container.parentElement.className = 'fc-scroll';
  // Sort newest first
  var sorted = photos.slice().sort(function(a, b) { return b.timestamp - a.timestamp; });
  container.innerHTML = sorted.map(function(p) {
    var thumbHtml;
    if (p.imageData) {
      thumbHtml = '<img src="' + escAttr(p.imageData) + '" alt="" loading="lazy" />';
    } else {
      thumbHtml = '<div class="album-placeholder"><svg style="width:32px;height:32px" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>';
    }
    var authorName = p.author === 'user' ? (csUserName || '我') : (csCharName || 'TA');
    var avatarUrl = p.author === 'user' ? (csUserAvatar || '') : (csCharAvatar || '');
    var avatarStyle = avatarUrl ? 'background-image:url(' + avatarUrl + ');background-size:cover;background-position:center' : '';
    var dateStr = new Date(p.timestamp).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    var desc = p.description ? escHtml(p.description) : '<span style="color:#c8c5c2;font-style:italic">无描述</span>';
    var commentCount = (p.comments && p.comments.length > 0) ? '<span style="color:#a8a29e;font-size:10px;display:flex;align-items:center;gap:2px"><svg style="width:12px;height:12px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' + p.comments.length + '</span>' : '';
    return '<div class="album-item" onclick="openAlbumDetail(\'' + p.id + '\')">' +
      '<div class="album-thumb">' + thumbHtml + '</div>' +
      '<div class="album-item-footer">' +
        '<div class="album-item-desc">' + desc + '</div>' +
        '<div class="album-item-meta">' +
          '<div class="album-item-author"><div class="album-item-avatar" style="' + avatarStyle + '"></div><span class="album-item-name">' + escHtml(authorName) + '</span></div>' +
          '<div style="display:flex;align-items:center;gap:8px">' + commentCount + '<span class="album-item-date">' + dateStr + '</span></div>' +
        '</div>' +
      '</div></div>';

// --- Album Upload ---
var albumUploadImageData = null;
function openAlbumUpload(mode) {
  closeAlbumFab();
  var overlay = document.createElement('div');
  overlay.className = 'album-upload-overlay animate-fade-in';
  overlay.id = 'album-upload-overlay';

  var previewContent;
  if (mode === 'local') {
    previewContent = '<div class="album-upload-preview" id="album-upload-preview" onclick="triggerAlbumFileInput()">' +
      '<svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>' +
      '<span>点击选择图片</span></div>' +
      '<input type="file" id="album-file-input" accept="image/*" style="display:none" onchange="handleAlbumFileSelect(event)" />';
  } else {
    previewContent = '<div class="album-upload-preview" id="album-upload-preview" style="pointer-events:none;border-style:solid;background:#f0efed">' +
      '<svg style="width:32px;height:32px;color:#d6d3d1" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' +
      '<span style="color:#a8a29e;font-size:12px">文字描述模式（无图片）</span></div>';
  }

  overlay.innerHTML = '<div class="album-upload-sheet animate-slide-up">' +
    '<div class="album-upload-handle"></div>' +
    '<div class="album-upload-title">' + (mode === 'local' ? '上传照片' : '文字描述') + '</div>' +
    previewContent +
    '<textarea class="album-upload-desc-input" id="album-upload-desc" placeholder="写点什么描述这张照片...（可选）" maxlength="500"></textarea>' +
    '<button class="album-upload-btn" id="album-upload-submit" onclick="submitAlbumUpload(\'' + mode + '\')">发布</button>' +
    '</div>';

  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeAlbumUpload(); });
  document.getElementById('app').appendChild(overlay);
  albumUploadImageData = null;
}

function triggerAlbumFileInput() {
  document.getElementById('album-file-input').click();
}

function handleAlbumFileSelect(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    albumUploadImageData = ev.target.result;
    var preview = document.getElementById('album-upload-preview');
    preview.innerHTML = '<img src="' + albumUploadImageData + '" />';
    preview.style.border = 'none';
  };
  reader.readAsDataURL(file);
}

function submitAlbumUpload(mode) {
  var desc = document.getElementById('album-upload-desc').value.trim();
  if (mode === 'local' && !albumUploadImageData) {
    showAlbumToast('请先选择一张图片');
    return;
  }
  if (mode === 'text' && !desc) {
    showAlbumToast('请输入描述');
    return;
  }

  var photo = {
    id: 'ap_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
    author: 'user',
    timestamp: Date.now(),
    description: desc,
    imageData: mode === 'local' ? albumUploadImageData : null,
    type: mode === 'local' ? 'local' : 'text',
    tags: []
  };

  // If local image, ask parent to recognize it
  if (mode === 'local' && albumUploadImageData) {
    window.parent.postMessage({
      type: 'coupleSpaceAlbumRecognize',
      charId: currentCharId,
      photoId: photo.id,
      imageData: albumUploadImageData
    }, '*');
  }

  var photos = getAlbumPhotos();
  photos.push(photo);
  saveAlbumPhotos(photos);
  closeAlbumUpload();
  renderAlbumList();
  showAlbumToast('已发布');

  // Request AI to comment on user's photo
  requestAiAlbumComment(photo);

  // Notify parent
  window.parent.postMessage({
    type: 'coupleSpaceAlbumSettingsChanged',
    charId: currentCharId,
    settings: getAlbumSettings()
  }, '*');
}

function closeAlbumUpload() {
  var el = document.getElementById('album-upload-overlay');
  if (el) el.remove();
  albumUploadImageData = null;
}

// --- Album Detail ---
var currentAlbumPhotoId = null;
function openAlbumDetail(photoId) {
  var photos = getAlbumPhotos();
  var photo = photos.find(function(p) { return p.id === photoId; });
  if (!photo) return;
  currentAlbumPhotoId = photoId;

  var scroll = document.getElementById('album-detail-scroll');
  var authorName = photo.author === 'user' ? (csUserName || '我') : (csCharName || 'TA');
  var avatarUrl = photo.author === 'user' ? (csUserAvatar || '') : (csCharAvatar || '');
  var avatarStyle = avatarUrl ? 'background-image:url(' + avatarUrl + ');background-size:cover;background-position:center' : '';
  var dateStr = new Date(photo.timestamp).toLocaleString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });

  var imageHtml;
  if (photo.imageData) {
    imageHtml = '<div class="album-detail-image"><img src="' + escAttr(photo.imageData) + '" /></div>';
  } else {
    imageHtml = '<div class="album-detail-image"><div class="album-placeholder-lg"><svg style="width:48px;height:48px" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div></div>';
  }

  var typeBadge = '';
  if (photo.type === 'screenshot') typeBadge = '<div class="album-detail-type-badge screenshot">📸 聊天截图</div>';
  else if (photo.type === 'ai_gen') typeBadge = '<div class="album-detail-type-badge ai-gen">🎨 AI 生成</div>';
  else if (photo.type === 'local') typeBadge = '<div class="album-detail-type-badge local">📷 本地上传</div>';
  else if (photo.type === 'text') typeBadge = '<div class="album-detail-type-badge">📝 文字描述</div>';

  var tagsHtml = '';
  if (photo.tags && photo.tags.length > 0) {
    tagsHtml = '<div class="album-detail-tags">' + photo.tags.map(function(t) { return '<span class="album-detail-tag">' + escHtml(t) + '</span>'; }).join('') + '</div>';
  }

  // Build comments section
  var commentsHtml = '<div class="diary-comments-section">' +
    '<div class="diary-comments-title">评论</div>';
  var comments = photo.comments || [];
  if (comments.length === 0) {
    commentsHtml += '<div class="diary-comment-empty">还没有评论</div>';
  } else {
    comments.forEach(function(c) {
      var cIsChar = c.author === 'char';
      var cAvatar = cIsChar ? csCharAvatar : csUserAvatar;
      var cName = cIsChar ? csCharName : csUserName;
      commentsHtml += '<div class="diary-comment-item">' +
        '<div class="diary-comment-avatar" style="background-image:url(' + escAttr(cAvatar) + ')"></div>' +
        '<div class="diary-comment-body">' +
          '<div><span class="diary-comment-name">' + escHtml(cName) + '</span>' +
          '<span class="diary-comment-time">' + fmtRelativeDate(c.timestamp) + '</span></div>' +
          '<div class="diary-comment-text">' + escHtml(c.content) + '</div>' +
        '</div></div>';
    });
  }
  commentsHtml += '</div>';

  scroll.innerHTML = imageHtml +
    '<div class="album-detail-author-row">' +
      '<div class="album-detail-avatar" style="' + avatarStyle + '"></div>' +
      '<div><div class="album-detail-author-name">' + escHtml(authorName) + '</div>' +
      '<div class="album-detail-date">' + dateStr + '</div></div>' +
    '</div>' +
    typeBadge +
    (photo.description ? '<div class="album-detail-desc">' + escHtml(photo.description) + '</div>' : '') +
    tagsHtml +
    commentsHtml;

  // Reset comment input
  var input = document.getElementById('album-comment-input');
  if (input) { input.value = ''; input.style.height = 'auto'; }
  updateAlbumCommentSendBtn();

  document.getElementById('album-detail-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
}

function renderAlbumDetail() {
  if (currentAlbumPhotoId) openAlbumDetail(currentAlbumPhotoId);
}

function closeAlbumDetail() {
  document.getElementById('album-detail-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
  currentAlbumPhotoId = null;
}

// --- Album Comments ---
function updateAlbumCommentSendBtn() {
  var input = document.getElementById('album-comment-input');
  var btn = document.getElementById('album-comment-send-btn');
  if (!input || !btn) return;
  if (input.value.trim()) { btn.classList.remove('disabled'); } else { btn.classList.add('disabled'); }
}

function submitAlbumComment() {
  var input = document.getElementById('album-comment-input');
  var text = input.value.trim();
  if (!text || !currentAlbumPhotoId) return;
  var photos = getAlbumPhotos();
  var photo = photos.find(function(p){ return p.id === currentAlbumPhotoId; });
  if (!photo) return;
  if (!photo.comments) photo.comments = [];
  photo.comments.push({
    author: 'user',
    content: text,
    timestamp: Date.now()
  });
  saveAlbumPhotos(photos);
  renderAlbumDetail();
  // If this is a char's photo, request AI to respond to user's comment
  if (photo.author === 'char') {
    requestAiAlbumCommentReply(photo, text);
  }
}

function requestAiAlbumComment(photo) {
  // Ask AI to comment on user's photo
  window.parent.postMessage({
    type: 'coupleSpaceAlbumCommentRequest',
    charId: currentCharId,
    photoId: photo.id,
    photoAuthor: 'user',
    photoDescription: photo.description || '',
    photoTags: photo.tags || [],
    charName: csCharName,
    userName: csUserName
  }, '*');
}

function requestAiAlbumCommentReply(photo, userComment) {
  // Ask AI to reply to user's comment on char's photo
  window.parent.postMessage({
    type: 'coupleSpaceAlbumCommentRequest',
    charId: currentCharId,
    photoId: photo.id,
    photoAuthor: 'char',
    photoDescription: photo.description || '',
    photoTags: photo.tags || [],
    userComment: userComment,
    charName: csCharName,
    userName: csUserName
  }, '*');
}

function handleAiAlbumCommentResult(data) {
  if (data.error || !data.comment) return;
  var photos = getAlbumPhotos();
  var photo = photos.find(function(p){ return p.id === data.photoId; });
  if (!photo) return;
  if (!photo.comments) photo.comments = [];
  photo.comments.push({
    author: 'char',
    content: data.comment,
    timestamp: Date.now()
  });
  saveAlbumPhotos(photos);
  // If currently viewing this photo, refresh
  if (currentAlbumPhotoId === data.photoId) {
    renderAlbumDetail();
  }
}

function showAlbumDeleteConfirm() {
  if (!currentAlbumPhotoId) return;
  var overlay = document.createElement('div');
  overlay.className = 'sig-overlay animate-fade-in';
  overlay.innerHTML = '<div class="sig-modal animate-slide-up"><h3>删除照片</h3><p style="font-size:14px;color:#78716c;margin:12px 0">确定要删除这张照片吗？</p>' +
    '<div class="sig-btns"><button class="sig-cancel" onclick="this.closest(\'.sig-overlay\').remove()">取消</button>' +
    '<button class="sig-confirm" style="background:#ef4444" onclick="deleteAlbumPhoto()">删除</button></div></div>';
  document.getElementById('app').appendChild(overlay);
}

function deleteAlbumPhoto() {
  if (!currentAlbumPhotoId) return;
  var photos = getAlbumPhotos();
  photos = photos.filter(function(p) { return p.id !== currentAlbumPhotoId; });
  saveAlbumPhotos(photos);
  document.querySelectorAll('.sig-overlay').forEach(function(el) { el.remove(); });
  closeAlbumDetail();
  renderAlbumList();
  showAlbumToast('已删除');
}

function editCurrentAlbumPhoto() {
  if (!currentAlbumPhotoId) return;
  var photos = getAlbumPhotos();
  var photo = photos.find(function(p){ return p.id === currentAlbumPhotoId; });
  if (!photo || photo.author !== 'user') return;
  var overlay = document.createElement('div');
  overlay.className = 'sig-overlay animate-fade-in';
  overlay.innerHTML = '<div class="sig-modal animate-slide-up"><h3>编辑照片描述</h3>' +
    '<textarea id="album-edit-desc" style="width:100%;background:#fafaf9;border:1px solid #e7e5e4;border-radius:0.75rem;padding:12px 16px;font-size:14px;color:#44403c;outline:none;resize:none;min-height:80px;line-height:1.5;font-family:inherit">' + escHtml(photo.description || '') + '</textarea>' +
    '<div class="sig-btns"><button class="sig-cancel" id="album-edit-cancel">取消</button><button class="sig-confirm" id="album-edit-confirm">保存</button></div></div>';
  document.getElementById('app').appendChild(overlay);
  var textarea = overlay.querySelector('#album-edit-desc'); textarea.focus();
  overlay.querySelector('#album-edit-cancel').onclick = function() { overlay.remove(); };
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector('#album-edit-confirm').onclick = function() {
    var val = textarea.value.trim();
    var photos2 = getAlbumPhotos();
    var idx = photos2.findIndex(function(p){ return p.id === currentAlbumPhotoId; });
    if (idx >= 0) {
      photos2[idx].description = val;
      saveAlbumPhotos(photos2);
      renderAlbumDetail();
      renderAlbumList();
    }
    overlay.remove();
  };
}

// --- Request char to post ---
function requestCharAlbumPost() {
  closeAlbumFab();
  showAlbumToast('正在让TA想想发什么...');
  window.parent.postMessage({
    type: 'coupleSpaceAlbumAiRequest',
    charId: currentCharId,
    recentPhotos: getAlbumPhotos().slice(-10)
  }, '*');

function requestChatScreenshot() {
  closeAlbumFab();
  showAlbumToast('正在让TA截图聊天记录...');
  // Set a timeout to show error if parent doesn't respond
  if (window._screenshotTimeout) clearTimeout(window._screenshotTimeout);
  window._screenshotTimeout = setTimeout(function() {
    showAlbumToast('截图超时，请重试');
    window._screenshotTimeout = null;
  }, 35000);
  window.parent.postMessage({
    type: 'coupleSpaceScreenshotRequest',
    charId: currentCharId
  }, '*');
}

          '<option value="none"' + (imageGenMode === 'none' ? ' selected' : '') + '>无（灰色占位）</option>' +
          '<option value="pollinations"' + (imageGenMode === 'pollinations' ? ' selected' : '') + '>通用AI生图</option>' +
          '<option value="nai"' + (imageGenMode === 'nai' ? ' selected' : '') + '>NovelAI</option>' +
          '<option value="imagen"' + (imageGenMode === 'imagen' ? ' selected' : '') + '>Google Imagen</option>' +
        '</select>' +
      '</div>' +
    '</div>' +

    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">定时自动发照片</div>' +
      '<div class="diary-setting-desc">角色会在设定时间自动发一张照片</div></div>' +
      '<div class="diary-toggle' + (autoEnabled ? ' on' : '') + '" id="album-toggle-auto" onclick="toggleAlbumSetting(\'auto\')"></div>' +
    '</div>' +

    '<div class="diary-setting-item" id="album-time-row" style="' + (autoEnabled ? '' : 'opacity:0.4;pointer-events:none') + '">' +
      '<div class="diary-setting-label">发照片时间</div>' +
      '<input type="time" class="diary-time-select" id="album-auto-time" value="' + autoTime + '" onchange="updateAlbumTimeSetting()" />' +
    '</div>' +

    '<div class="diary-setting-item" id="album-count-row" style="' + (autoEnabled ? '' : 'opacity:0.4;pointer-events:none') + '">' +
      '<div><div class="diary-setting-label">每次发送数量</div>' +
      '<div class="diary-setting-desc">定时触发时一次发几张照片</div></div>' +
      '<input type="number" class="diary-time-select" id="album-auto-count" value="' + autoCount + '" min="1" max="10" style="width:60px;text-align:center" onchange="updateAlbumAutoCount()" />' +
    '</div>' +

    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">AI 自主决定</div>' +
      '<div class="diary-setting-desc">聊天或后台活动时随机触发，AI 自己决定</div></div>' +
      '<div class="diary-toggle' + (aiDecide ? ' on' : '') + '" id="album-toggle-decide" onclick="toggleAlbumSetting(\'decide\')"></div>' +
    '</div>' +

    '<div id="album-ai-decide-probs" style="' + (aiDecide ? '' : 'display:none') + '">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">聊天触发概率 (%)</div>' +
        '<div class="diary-setting-desc">每次聊天消息后触发的概率</div></div>' +
        '<input type="number" value="' + aiDecideChatProb + '" class="diary-time-select" style="width:70px;text-align:center" onchange="updateAlbumAiDecideProb()" id="album-chat-prob" />' +
      '</div>' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">后台触发概率 (%)</div>' +
        '<div class="diary-setting-desc">后台活动每次心跳触发的概率</div></div>' +
        '<input type="number" value="' + aiDecideBgProb + '" class="diary-time-select" style="width:70px;text-align:center" onchange="updateAlbumAiDecideProb()" id="album-bg-prob" />' +
      '</div>' +
    '</div>' +

    '<div style="padding-top:16px;margin-top:8px;border-top:1px solid #f0efed">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">角色可见的用户照片数</div>' +
        '<div class="diary-setting-desc">注入到 AI 提示词中的用户照片条数</div></div>' +
        '<select class="diary-time-select" id="album-user-count" onchange="updateAlbumCountSetting()">' +
          buildCountOptions(visibleUserPhotoCount) +
        '</select>' +
      '</div>' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">角色可见的自己照片数</div>' +
        '<div class="diary-setting-desc">注入到 AI 提示词中的角色照片条数</div></div>' +
        '<select class="diary-time-select" id="album-char-count" onchange="updateAlbumCountSetting()">' +
          buildCountOptions(visibleCharPhotoCount) +
        '</select>' +
      '</div>' +
    '</div>' +

    '</div>';

  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeAlbumSettings(); });
  document.getElementById('app').appendChild(overlay);
}

function closeAlbumSettings() {
  var el = document.getElementById('album-settings-overlay');
  if (el) el.remove();
}

function updateAlbumGenMode() {
  var settings = getAlbumSettings();
  settings.imageGenMode = document.getElementById('album-image-gen-mode').value;
  saveAlbumSettings(settings);
  notifyAlbumSettingsChanged();
}

function toggleAlbumSetting(key) {
  var settings = getAlbumSettings();
  if (key === 'auto') {
    settings.autoEnabled = !settings.autoEnabled;
    var toggle = document.getElementById('album-toggle-auto');
    toggle.classList.toggle('on', settings.autoEnabled);
    var timeRow = document.getElementById('album-time-row');
    var countRow = document.getElementById('album-count-row');
    timeRow.style.opacity = settings.autoEnabled ? '' : '0.4';
    timeRow.style.pointerEvents = settings.autoEnabled ? '' : 'none';
    countRow.style.opacity = settings.autoEnabled ? '' : '0.4';
    countRow.style.pointerEvents = settings.autoEnabled ? '' : 'none';
  } else if (key === 'decide') {
    settings.aiDecide = !settings.aiDecide;
    var toggle = document.getElementById('album-toggle-decide');
    toggle.classList.toggle('on', settings.aiDecide);
    var probsDiv = document.getElementById('album-ai-decide-probs');
    if (probsDiv) probsDiv.style.display = settings.aiDecide ? '' : 'none';
  }
  saveAlbumSettings(settings);
  notifyAlbumSettingsChanged();
}

function updateAlbumTimeSetting() {
  var settings = getAlbumSettings();
  settings.autoTime = document.getElementById('album-auto-time').value;
  saveAlbumSettings(settings);
  notifyAlbumSettingsChanged();
}

function updateAlbumAutoCount() {
  var settings = getAlbumSettings();
  var val = parseInt(document.getElementById('album-auto-count').value) || 1;
  if (val < 1) val = 1;
  if (val > 10) val = 10;
  document.getElementById('album-auto-count').value = val;
  settings.autoCount = val;
  saveAlbumSettings(settings);
  notifyAlbumSettingsChanged();
}

function updateAlbumAiDecideProb() {
  var settings = getAlbumSettings();
  settings.aiDecideChatProb = parseInt(document.getElementById('album-chat-prob').value) || 15;
  settings.aiDecideBgProb = parseInt(document.getElementById('album-bg-prob').value) || 5;
  saveAlbumSettings(settings);
  notifyAlbumSettingsChanged();
}

function updateAlbumCountSetting() {
  var settings = getAlbumSettings();
  settings.visibleUserPhotoCount = parseInt(document.getElementById('album-user-count').value) || 0;
  settings.visibleCharPhotoCount = parseInt(document.getElementById('album-char-count').value) || 0;
  saveAlbumSettings(settings);
  notifyAlbumSettingsChanged();
}

function notifyAlbumSettingsChanged() {
  var settings = getAlbumSettings();
  window.parent.postMessage({
    type: 'coupleSpaceAlbumSettingsChanged',
    charId: currentCharId,
    settings: settings
  }, '*');
}

function showAlbumToast(msg) {
  var toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1c1917;color:white;padding:10px 24px;border-radius:9999px;font-size:13px;z-index:100;pointer-events:none;animation:fadeIn .2s ease';
  toast.textContent = msg;
  document.getElementById('app').appendChild(toast);
  setTimeout(function() { toast.remove(); }, 2000);
}

// --- Handle AI album result from parent ---
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'coupleSpaceAlbumAiResult') {
    if (e.data.error) {
      showAlbumToast('生成失败，请重试');
      return;
    }
    var photo = {
      id: 'ap_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      author: 'char',
      timestamp: Date.now(),
      description: e.data.description || '',
      imageData: e.data.imageData || null,
      type: e.data.imageData ? 'ai_gen' : 'text',
      tags: e.data.tags || [],
      imagePrompt: e.data.imagePrompt || ''
    };
    var photos = getAlbumPhotos();
    photos.push(photo);
    saveAlbumPhotos(photos);
    renderAlbumList();
    showAlbumToast((csCharName || 'TA') + '发了一张照片');
  }

  if (e.data && e.data.type === 'coupleSpaceAlbumAutoResult') {
    // Same as above but for auto/scheduled posts
    if (e.data.error) return;
    var photo = {
      id: 'ap_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      author: 'char',
      timestamp: Date.now(),
      description: e.data.description || '',
      imageData: e.data.imageData || null,
      type: e.data.imageData ? 'ai_gen' : 'text',
      tags: e.data.tags || [],
      imagePrompt: e.data.imagePrompt || ''
    };
    var photos = getAlbumPhotos();
    photos.push(photo);
    saveAlbumPhotos(photos);
    renderAlbumList();
  }

  // Album comment result from parent
  if (e.data && e.data.type === 'coupleSpaceAlbumCommentResult') {
    handleAiAlbumCommentResult(e.data);
  }
});

// --- Escape helpers ---
function escHtml(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function escAttr(s) { return (s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
</script>

<script>
// ========== ANNIVERSARY SYSTEM ==========
var currentAnnivView = 'list';
var currentViewingAnnivId = null;

var ANNIV_TYPES = [
  { id: 'love', label: '恋爱纪念', bg: 'love' },
  { id: 'first', label: '第一次', bg: 'first' },
  { id: 'birthday', label: '生日', bg: 'birthday' },
  { id: 'custom', label: '自定义', bg: 'custom' }
];

function getCustomAnnivTypes() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleCustomAnnivTypes_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveCustomAnnivTypes(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleCustomAnnivTypes_' + currentCharId, JSON.stringify(list));
}
function getAllAnnivTypes() {
  return ANNIV_TYPES.concat(getCustomAnnivTypes());
}

function getAnniversaries() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleAnniv_' + currentCharId)) || []; } catch(e) { return []; }
}
function saveAnniversaries(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleAnniv_' + currentCharId, JSON.stringify(list));
}

function calcAnnivDays(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  var now = new Date(); now.setHours(0,0,0,0);
  return Math.floor((now - d) / 86400000);
}

function getNextOccurrence(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  var now = new Date(); now.setHours(0,0,0,0);
  var thisYear = new Date(now.getFullYear(), d.getMonth(), d.getDate());
  if (thisYear >= now) return thisYear;
  return new Date(now.getFullYear() + 1, d.getMonth(), d.getDate());
}

function daysUntilNext(dateStr) {
  var next = getNextOccurrence(dateStr);
  var now = new Date(); now.setHours(0,0,0,0);
  return Math.floor((next - now) / 86400000);
}

function getTypeInfo(typeId) {
  return getAllAnnivTypes().find(function(t) { return t.id === typeId; }) || ANNIV_TYPES[3];
}

function getTypeIcon(typeId) {
  switch(typeId) {
    case 'love': return '<svg style="width:20px;height:20px" fill="none" stroke="#fb7185" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    case 'first': return '<svg style="width:20px;height:20px" fill="none" stroke="#f59e0b" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
    case 'birthday': return '<svg style="width:20px;height:20px" fill="none" stroke="#8b5cf6" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8"/><path d="M4 16s.5-1 2-1 2.5 2 4 2 2.5-2 4-2 2.5 2 4 2 2-1 2-1"/><path d="M2 21h20"/><path d="M7 8v3"/><path d="M12 8v3"/><path d="M17 8v3"/><path d="M7 4h.01"/><path d="M12 4h.01"/><path d="M17 4h.01"/></svg>';
    default: return '<svg style="width:20px;height:20px" fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
  }
}

function getTypeIconLg(typeId) {
  switch(typeId) {
    case 'love': return '<svg style="width:32px;height:32px" fill="none" stroke="#fb7185" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    case 'first': return '<svg style="width:32px;height:32px" fill="none" stroke="#f59e0b" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
    case 'birthday': return '<svg style="width:32px;height:32px" fill="none" stroke="#8b5cf6" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8"/><path d="M4 16s.5-1 2-1 2.5 2 4 2 2.5-2 4-2 2.5 2 4 2 2-1 2-1"/><path d="M2 21h20"/><path d="M7 8v3"/><path d="M12 8v3"/><path d="M17 8v3"/><path d="M7 4h.01"/><path d="M12 4h.01"/><path d="M17 4h.01"/></svg>';
    default: return '<svg style="width:32px;height:32px" fill="none" stroke="#10b981" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
  }
}

function switchAnnivView(view) {
  currentAnnivView = view;
  var tabs = document.querySelectorAll('#anniv-tab-bar .anniv-tab');
  tabs.forEach(function(t, i) {
    t.classList.toggle('active', (i === 0 && view === 'list') || (i === 1 && view === 'timeline'));
  });
  renderAnnivList();
}

function renderAnnivList() {
  var container = document.getElementById('anniv-list-container');
  if (!container) return;
  var annivs = getAnniversaries();

  if (annivs.length === 0) {
    container.className = 'fc-scroll';
    container.innerHTML = '<div class="anniv-empty">' +
      '<svg style="width:64px;height:64px;color:#d6d3d1" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>' +
      '<span class="anniv-empty-text">还没有纪念日，创建第一个吧</span></div>';
    return;
  }

  if (currentAnnivView === 'timeline') {
    renderAnnivTimeline(container, annivs);
    return;
  }

  // Sort: today first, then upcoming (by days until), then past (by days ago desc)
  annivs.sort(function(a, b) {
    var da = daysUntilNext(a.date), db = daysUntilNext(b.date);
    if (da === 0 && db !== 0) return -1;
    if (db === 0 && da !== 0) return 1;
    return da - db;
  });

  container.className = 'fc-scroll anniv-list';
  var html = '';
  annivs.forEach(function(a) {
    var type = getTypeInfo(a.type);
    var daysDiff = calcAnnivDays(a.date);
    var untilNext = daysUntilNext(a.date);
    var authorName = a.author === 'user' ? (csUserName || '我') : (csCharName || 'TA');
    var avatarUrl = a.author === 'user' ? (csUserAvatar || '') : (csCharAvatar || '');
    var userLiked = a.hearts && a.hearts.user;
    var charLiked = a.hearts && a.hearts.char;
    var totalHearts = (userLiked ? 1 : 0) + (charLiked ? 1 : 0);

    var badge = '';
    var isToday = (untilNext === 0);
    if (isToday) {
      badge = '<div class="anniv-card-today">今天!</div>';
    } else if (untilNext <= 7) {
      badge = '<div class="anniv-card-countdown">还有' + untilNext + '天</div>';
    }

    var daysDisplay, daysLabel;
    if (daysDiff >= 0) {
      daysDisplay = daysDiff;
      daysLabel = '天前';
    } else {
      daysDisplay = Math.abs(daysDiff);
      daysLabel = '天后';
    }

    html += '<div class="anniv-card" onclick="openAnnivDetail(\'' + a.id + '\')">' +
      badge +
      '<div class="anniv-card-top">' +
        '<div class="anniv-card-icon ' + type.bg + '">' + getTypeIcon(a.type) + '</div>' +
        '<div class="anniv-card-meta">' +
          '<div class="anniv-card-title">' + escHtml(a.title) + '</div>' +
          '<div class="anniv-card-date">' + a.date + '</div>' +
        '</div>' +
        (isToday ? '' : '<div class="anniv-card-days">' +
          '<div class="anniv-card-days-num">' + daysDisplay + '</div>' +
          '<div class="anniv-card-days-label">' + daysLabel + '</div>' +
        '</div>') +
      '</div>' +
      (a.reason ? '<div class="anniv-card-reason">' + escHtml(a.reason) + '</div>' : '') +
      '<div class="anniv-card-footer">' +
        '<div class="anniv-card-author">' +
          '<div class="anniv-card-avatar" style="' + (avatarUrl ? 'background-image:url(' + avatarUrl + ')' : '') + '"></div>' +
          '<span class="anniv-card-author-name">' + escHtml(authorName) + ' 创建</span>' +
        '</div>' +
        '<div class="anniv-hearts">' +
          '<span class="anniv-heart-btn' + (totalHearts > 0 ? ' liked' : '') + '" onclick="event.stopPropagation();toggleAnnivHeart(\'' + a.id + '\',\'user\')">' +
            (userLiked ? '❤️' : '🤍') + ' ' + totalHearts +
          '</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  });
  container.innerHTML = html;
}

function renderAnnivTimeline(container, annivs) {
  // Sort by date ascending
  var sorted = annivs.slice().sort(function(a, b) { return new Date(a.date) - new Date(b.date); });
  container.className = 'fc-scroll';

  var html = '<div class="anniv-timeline">';
  sorted.forEach(function(a) {
    var type = getTypeInfo(a.type);
    var untilNext = daysUntilNext(a.date);
    var isToday = untilNext === 0;
    var userLiked = a.hearts && a.hearts.user;
    var charLiked = a.hearts && a.hearts.char;
    var totalHearts = (userLiked ? 1 : 0) + (charLiked ? 1 : 0);

    html += '<div class="anniv-timeline-item" onclick="openAnnivDetail(\'' + a.id + '\')" style="cursor:pointer">' +
      '<div class="anniv-timeline-dot' + (isToday ? ' today' : '') + '"></div>' +
      '<div class="anniv-timeline-date">' + a.date + '</div>' +
      '<div class="anniv-timeline-card">' +
        '<div class="anniv-timeline-title">' + escHtml(a.title) + '</div>' +
        (a.reason ? '<div class="anniv-timeline-reason">' + escHtml(a.reason) + '</div>' : '') +
        (totalHearts > 0 ? '<div class="anniv-timeline-hearts">❤️ ' + totalHearts + '</div>' : '') +
      '</div></div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

// --- Anniversary Detail ---
function openAnnivDetail(id) {
  var annivs = getAnniversaries();
  var a = annivs.find(function(x) { return x.id === id; });
  if (!a) return;
  currentViewingAnnivId = id;

  var type = getTypeInfo(a.type);
  var daysDiff = calcAnnivDays(a.date);
  var untilNext = daysUntilNext(a.date);
  var userLiked = a.hearts && a.hearts.user;
  var charLiked = a.hearts && a.hearts.char;

  var daysText;
  if (untilNext === 0) {
    daysText = '今天是纪念日!';
  } else if (daysDiff >= 0) {
    daysText = '已经 <span class="num">' + daysDiff + '</span> 天';
  } else {
    daysText = '还有 <span class="num">' + Math.abs(daysDiff) + '</span> 天';
  }

  var scroll = document.getElementById('anniv-detail-scroll');
  var html = '<div class="anniv-detail-icon ' + type.bg + '" style="background:' +
    (type.bg === 'love' ? '#fff1f2' : type.bg === 'first' ? '#fef3c7' : type.bg === 'birthday' ? '#ede9fe' : '#ecfdf5') +
    '">' + getTypeIconLg(a.type) + '</div>' +
    '<div class="anniv-detail-title">' + escHtml(a.title) + '</div>' +
    '<div class="anniv-detail-date">' + a.date + ' · ' + type.label + '</div>' +
    '<div style="text-align:center"><div class="anniv-detail-days-badge">' + daysText + '</div></div>';

  if (a.reason) {
    html += '<div class="anniv-detail-reason-card">' +
      '<div class="anniv-detail-reason-label">纪念理由</div>' +
      '<div class="anniv-detail-reason-text">' + escHtml(a.reason) + '</div></div>';
  }

  // Hearts section
  html += '<div class="anniv-detail-hearts-row">' +
    '<div class="anniv-detail-heart-col">' +
      '<div class="anniv-detail-heart-avatar" style="' + (csUserAvatar ? 'background-image:url(' + csUserAvatar + ')' : '') + '"></div>' +
      '<span class="anniv-detail-heart-name">' + escHtml(csUserName || '我') + '</span>' +
      '<span class="anniv-detail-heart-icon' + (userLiked ? ' liked' : '') + '" onclick="toggleAnnivHeart(\'' + a.id + '\',\'user\')">' + (userLiked ? '❤️' : '🤍') + '</span>' +
    '</div>' +
    '<div class="anniv-detail-heart-col">' +
      '<div class="anniv-detail-heart-avatar" style="' + (csCharAvatar ? 'background-image:url(' + csCharAvatar + ')' : '') + '"></div>' +
      '<span class="anniv-detail-heart-name">' + escHtml(csCharName || 'TA') + '</span>' +
      '<span class="anniv-detail-heart-icon' + (charLiked ? ' liked' : '') + '">' + (charLiked ? '❤️' : '🤍') + '</span>' +

  renderAnnivList();
}

function findLinkedContent(dateStr) {
  var items = [];
  // Check diaries on that date
  var diaries = getDiaries();
  diaries.forEach(function(d) {
    var dDate = new Date(d.timestamp).toISOString().slice(0, 10);
    if (dDate === dateStr) {
      items.push({ icon: '📖', title: d.title || '无标题日记', type: '日记' });
    }
  });
  // Check album photos on that date
  var photos = getAlbumPhotos();
  photos.forEach(function(p) {
    var pDate = new Date(p.timestamp).toISOString().slice(0, 10);
    if (pDate === dateStr) {
      items.push({ icon: '📷', title: p.description || '无描述照片', type: '相册' });
    }
  });
  return items;
}
