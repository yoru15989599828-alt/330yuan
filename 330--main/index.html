function checkTodayAnniversaries() {
  var badge = document.getElementById('home-anniv-badge');
  if (!badge) return;
  var annivs = getAnniversaries();
  var todayItems = annivs.filter(function(a) { return daysUntilNext(a.date) === 0; });
  if (todayItems.length > 0) {
    var names = todayItems.map(function(a) { return a.title; }).join('、');
    badge.textContent = '💕 今天是: ' + names;
    badge.style.display = '';
  } else {
    // Check upcoming within 3 days
    var upcoming = annivs.filter(function(a) { var d = daysUntilNext(a.date); return d > 0 && d <= 3; });
    if (upcoming.length > 0) {
      var first = upcoming.sort(function(a, b) { return daysUntilNext(a.date) - daysUntilNext(b.date); })[0];
      badge.textContent = '📅 ' + first.title + ' 还有' + daysUntilNext(first.date) + '天';
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  }
}

// --- Generate Anniversary Card Image ---
function generateAnnivCard() {
  if (!currentViewingAnnivId) return;
  var annivs = getAnniversaries();
  var a = annivs.find(function(x) { return x.id === currentViewingAnnivId; });
  if (!a) return;

  var type = getTypeInfo(a.type);
  var daysDiff = calcAnnivDays(a.date);
  var untilNext = daysUntilNext(a.date);

  var canvas = document.createElement('canvas');
  var dpr = 2;
  var cW = 375 * dpr;
  var cH = 500 * dpr;
  canvas.width = cW;
  canvas.height = cH;
  var cx = canvas.getContext('2d');

  // Background gradient
  var grad = cx.createLinearGradient(0, 0, 0, cH);
  grad.addColorStop(0, '#fff1f2');
  grad.addColorStop(0.5, '#FAF9F8');
  grad.addColorStop(1, '#fef3c7');
  cx.fillStyle = grad;
  cx.fillRect(0, 0, cW, cH);

  // Decorative circles
  cx.fillStyle = 'rgba(253,164,175,0.15)';
  cx.beginPath(); cx.arc(cW * 0.8, cH * 0.15, 80 * dpr, 0, Math.PI * 2); cx.fill();
  cx.fillStyle = 'rgba(253,164,175,0.1)';
  cx.beginPath(); cx.arc(cW * 0.2, cH * 0.75, 60 * dpr, 0, Math.PI * 2); cx.fill();

  var py = 60 * dpr;

  // Type label
  cx.font = '500 ' + (16 * dpr) + 'px -apple-system, BlinkMacSystemFont, sans-serif';
  cx.textAlign = 'center';
  cx.fillStyle = '#a8a29e';
  cx.fillText(type.label, cW / 2, py);
  py += 40 * dpr;

  // Title
  cx.font = '700 ' + (22 * dpr) + 'px -apple-system, BlinkMacSystemFont, sans-serif';
  cx.fillStyle = '#1c1917';
  cx.fillText(a.title, cW / 2, py);
  py += 30 * dpr;

  // Date
  cx.font = (13 * dpr) + 'px -apple-system, sans-serif';
  cx.fillStyle = '#a8a29e';
  cx.fillText(a.date, cW / 2, py);
  py += 40 * dpr;

  // Days number
  var daysText, daysLabel;
  if (untilNext === 0) { daysText = '今天'; daysLabel = '是纪念日'; }
  else if (daysDiff >= 0) { daysText = String(daysDiff); daysLabel = '天'; }
  else { daysText = String(Math.abs(daysDiff)); daysLabel = '天后'; }

  cx.font = '400 ' + (64 * dpr) + 'px Georgia, serif';
  cx.fillStyle = '#fb7185';
  cx.fillText(daysText, cW / 2, py);
  py += 20 * dpr;

  cx.font = (14 * dpr) + 'px -apple-system, sans-serif';
  cx.fillStyle = '#a8a29e';
  cx.fillText(daysLabel, cW / 2, py);
  py += 40 * dpr;

  // Reason
  if (a.reason) {
    cx.font = (14 * dpr) + 'px -apple-system, sans-serif';
    cx.fillStyle = '#57534e';
    var maxTW = cW - 80 * dpr;
    var rLines = [];
    var cur = '';
    for (var ri = 0; ri < a.reason.length; ri++) {
      var tst = cur + a.reason[ri];
      if (cx.measureText(tst).width > maxTW && cur) { rLines.push(cur); cur = a.reason[ri]; }
      else { cur = tst; }
    }
    if (cur) rLines.push(cur);
    rLines.slice(0, 3).forEach(function(line) { cx.fillText(line, cW / 2, py); py += 22 * dpr; });
  }

  // Names
  var ny = cH - 80 * dpr;
  cx.font = '500 ' + (13 * dpr) + 'px -apple-system, sans-serif';
  cx.fillStyle = '#78716c';
  cx.fillText((csUserName || '我') + ' ❤️ ' + (csCharName || 'TA'), cW / 2, ny);

  // Watermark
  cx.font = (10 * dpr) + 'px -apple-system, sans-serif';
  cx.fillStyle = '#d6d3d1';
  cx.fillText('情侣空间', cW / 2, cH - 40 * dpr);

  // Save to album
  var imgData = canvas.toDataURL('image/png');
  var photos = getAlbumPhotos();
  photos.push({
    id: 'ap_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
    author: 'user',
    timestamp: Date.now(),
    description: '纪念日卡片: ' + a.title,
    imageData: imgData,
    type: 'local',
    tags: ['纪念日卡片', a.title]
  });
  saveAlbumPhotos(photos);

  // Download
  var link = document.createElement('a');
  link.download = '纪念日-' + a.title + '.png';
  link.href = imgData;
  link.click();

  showAnnivToast('卡片已保存到相册并下载');
}
// ========== CHECKLIST ==========
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
var clCurrentFilter = 'all';
var currentViewingClId = null;
var editingClId = null;

var CL_CATEGORIES = [
  { id: 'travel', label: '旅行' },
  { id: 'food', label: '美食' },
  { id: 'experience', label: '体验' },
  { id: 'daily', label: '日常' },
  { id: 'custom', label: '其他' }
];
var CL_PRIORITIES = [
  { id: 'wish', label: '遥远的愿望' },
  { id: 'low', label: '不急' },
  { id: 'normal', label: '一般' },
  { id: 'high', label: '很想做' }
];

function getCustomClCategories() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleCustomClCats_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveCustomClCategories(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleCustomClCats_' + currentCharId, JSON.stringify(list));
}
function getAllClCategories() {
  return CL_CATEGORIES.concat(getCustomClCategories());
}

function getChecklistItems() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleChecklist_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveChecklistItems(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleChecklist_' + currentCharId, JSON.stringify(list));
}
function getClSettings() {
  if (!currentCharId) return {};
  try { return JSON.parse(localStorage.getItem('coupleChecklistSettings_' + currentCharId)) || {}; }
  catch(e) { return {}; }
}
function saveClSettings(s) {
  if (!currentCharId) return;
  localStorage.setItem('coupleChecklistSettings_' + currentCharId, JSON.stringify(s));
}

function notifyClChanged() {
  window.parent.postMessage({
    type: 'coupleSpaceChecklistChanged',
    charId: currentCharId,
    items: getChecklistItems()
  }, '*');
}
function notifyClSettingsChanged() {
  window.parent.postMessage({
    type: 'coupleSpaceChecklistSettingsChanged',
    charId: currentCharId,
    settings: getClSettings()
  }, '*');
}

function getCategoryInfo(catId) {
  var all = getAllClCategories();
  return all.find(function(c) { return c.id === catId; }) || { id: 'custom', label: '其他' };
}
function getPriorityInfo(priId) {
  return CL_PRIORITIES.find(function(p) { return p.id === priId; }) || CL_PRIORITIES[2];
}

function filterChecklist(filter) {
  clCurrentFilter = filter;
  document.querySelectorAll('.cl-filter-chip').forEach(function(el) {
    el.classList.toggle('active', el.dataset.filter === filter);
  });
  renderChecklistList();
}

function renderChecklistList() {
  var container = document.getElementById('cl-list-container');
  if (!container) return;
  var items = getChecklistItems();

  if (items.length === 0) {
    container.innerHTML = '<div class="cl-empty">' +
      '<svg class="cl-empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>' +
      '<div class="cl-empty-text">还没有清单项</div></div>';
    return;
  }

  var filtered = items;
  if (clCurrentFilter === 'pending') filtered = items.filter(function(i) { return !i.done; });
  else if (clCurrentFilter === 'done') filtered = items.filter(function(i) { return i.done; });

  filtered.sort(function(a, b) {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return b.createdAt - a.createdAt;
  });

  var html = '';
  filtered.forEach(function(item) {
    var cat = getCategoryInfo(item.category);
    var pri = getPriorityInfo(item.priority);
    var authorName = item.author === 'char' ? (csCharName || 'TA') : (csUserName || '我');
    var heartUser = item.hearts && item.hearts.user;
    var heartChar = item.hearts && item.hearts.char;

    html += '<div class="check-item' + (item.done ? ' check-done' : '') + '" onclick="openClDetail(\'' + item.id + '\')">' +
      '<div class="check-circle' + (item.done ? ' checked' : '') + '" onclick="event.stopPropagation();toggleClDone(\'' + item.id + '\')">' +
      (item.done ? '<div class="check-dot"></div>' : '') + '</div>' +
      '<div class="cl-item-body">' +
      '<div class="cl-item-title">' + escapeHtml(item.title) + '</div>' +
      '<div class="cl-item-meta">' +
      '<span class="cl-item-tag ' + item.category + '">' + cat.label + '</span>' +
      (item.priority === 'high' ? '<span class="cl-item-tag priority-high">很想做</span>' : '') +
      (item.priority === 'wish' ? '<span class="cl-item-tag priority-wish">愿望</span>' : '') +
      '<span class="cl-item-author">' + authorName + '</span>' +
      '</div></div>' +
      '<div class="cl-item-hearts">' +
      '<span class="cl-item-heart' + (heartUser ? ' active' : '') + '"><svg style="width:12px;height:12px" fill="' + (heartUser ? '#fb7185' : 'none') + '" stroke="' + (heartUser ? '#fb7185' : '#d6d3d1') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span>' +
      '<span class="cl-item-heart' + (heartChar ? ' active' : '') + '"><svg style="width:12px;height:12px" fill="' + (heartChar ? '#fb7185' : 'none') + '" stroke="' + (heartChar ? '#fb7185' : '#d6d3d1') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></span>' +
      '</div></div>';
  });
  container.innerHTML = html;
}

function toggleClDone(itemId) {
  var items = getChecklistItems();
  var item = items.find(function(i) { return i.id === itemId; });
  if (!item) return;
  item.done = !item.done;
  item.doneAt = item.done ? Date.now() : null;
  if (!item.done) item.doneNote = '';
  saveChecklistItems(items);
  renderChecklistList();
  notifyClChanged();

  if (item.done) {
    showClToast('已完成 ✓');
    window.parent.postMessage({
      type: 'coupleSpaceChecklistCommentRequest',
      charId: currentCharId,
      itemId: item.id,
      itemTitle: item.title,
      itemCategory: item.category,
      itemAuthor: item.author,
      doneBy: 'user',
      doneNote: ''
    }, '*');
  }
}

function toggleClHeart(itemId) {
  var items = getChecklistItems();
  var item = items.find(function(i) { return i.id === itemId; });
  if (!item) return;
  if (!item.hearts) item.hearts = {};
  item.hearts.user = !item.hearts.user;
  saveChecklistItems(items);
  renderChecklistList();
  notifyClChanged();

  if (item.hearts.user) {
    window.parent.postMessage({
      type: 'coupleSpaceChecklistHeartRequest',
      charId: currentCharId,
      itemId: item.id,
      itemTitle: item.title,
      itemNote: item.note || ''
    }, '*');
  }
}

function openClDetail(itemId) {
  currentViewingClId = itemId;
  var items = getChecklistItems();
  var item = items.find(function(i) { return i.id === itemId; });
  if (!item) return;

  var cat = getCategoryInfo(item.category);
  var pri = getPriorityInfo(item.priority);
  var authorName = item.author === 'char' ? (csCharName || 'TA') : (csUserName || '我');
  var authorAvatar = item.author === 'char' ? (csCharAvatar || '') : (csUserAvatar || '');
  var dateStr = new Date(item.createdAt).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });

  var scroll = document.getElementById('cl-detail-scroll');
  var html = '<div class="cl-detail-title">' + escapeHtml(item.title) + '</div>' +
    '<div class="cl-detail-tags">' +
    '<span class="cl-item-tag ' + item.category + '">' + cat.label + '</span>' +
    '<span class="cl-item-tag" style="background:#fafaf9;color:#78716c">' + pri.label + '</span>' +
    '</div>' +
    '<div class="cl-detail-author-row">' +
    '<div class="cl-detail-avatar" style="background-image:url(' + (authorAvatar || '') + ')"></div>' +
    '<div><div class="cl-detail-author-name">' + authorName + '</div>' +
    '<div class="cl-detail-date">' + dateStr + '</div></div></div>';

  if (item.note) {
    html += '<div class="cl-detail-note">' + escapeHtml(item.note) + '</div>';
  }

  if (item.done) {
    html += '<div class="cl-detail-done-section">' +
      '<div class="cl-detail-done-badge">✓ 已完成' +
      (item.doneAt ? ' · ' + new Date(item.doneAt).toLocaleDateString('zh-CN') : '') + '</div>';
    if (item.doneNote) {
      html += '<div class="cl-detail-done-note">' + escapeHtml(item.doneNote) + '</div>';
    }
    html += '</div>';
  }

  html += '<div class="cl-detail-hearts">' +
    '<button class="cl-detail-heart-btn' + (item.hearts && item.hearts.user ? ' active' : '') + '" onclick="toggleClHeart(\'' + item.id + '\');openClDetail(\'' + item.id + '\')">' +
    '<svg style="width:16px;height:16px" fill="' + (item.hearts && item.hearts.user ? '#fb7185' : 'none') + '" stroke="' + (item.hearts && item.hearts.user ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + (csUserName || '我') + '</button>' +
    '<button class="cl-detail-heart-btn' + (item.hearts && item.hearts.char ? ' active' : '') + '" style="pointer-events:none">' +
    '<svg style="width:16px;height:16px" fill="' + (item.hearts && item.hearts.char ? '#fb7185' : 'none') + '" stroke="' + (item.hearts && item.hearts.char ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + (csCharName || 'TA') + '</button></div>';

  if (item.comments && item.comments.length > 0) {
    html += '<div class="cl-comments-section"><div class="cl-comments-title">评论</div>';
    item.comments.forEach(function(c) {
      var cName = c.author === 'char' ? (csCharName || 'TA') : (csUserName || '我');
      var cAvatar = c.author === 'char' ? (csCharAvatar || '') : (csUserAvatar || '');
      var cTime = new Date(c.timestamp).toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      html += '<div class="cl-comment-item">' +
        '<div class="cl-comment-avatar" style="background-image:url(' + cAvatar + ')"></div>' +
        '<div class="cl-comment-body"><span class="cl-comment-name">' + cName + '</span>' +
        '<span class="cl-comment-time">' + cTime + '</span>' +
        '<div class="cl-comment-text">' + escapeHtml(c.content) + '</div></div></div>';
    });
    html += '</div>';
  }

  scroll.innerHTML = html;

  var commentBar = document.getElementById('cl-comment-bar');
  commentBar.style.display = item.done ? 'flex' : 'none';
  document.getElementById('cl-comment-input').value = '';

  document.getElementById('cl-detail-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
}

function closeClDetail() {
  currentViewingClId = null;
  document.getElementById('cl-detail-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
  renderChecklistList();
}

function submitClDoneNote() {
  if (!currentViewingClId) return;
  var input = document.getElementById('cl-comment-input');
  var text = input.value.trim();
  if (!text) return;

  var items = getChecklistItems();
  var item = items.find(function(i) { return i.id === currentViewingClId; });
  if (!item) return;

  item.doneNote = text;
  if (!item.comments) item.comments = [];
  item.comments.push({ author: 'user', content: text, timestamp: Date.now() });
  saveChecklistItems(items);
  input.value = '';
  openClDetail(currentViewingClId);
  notifyClChanged();

  window.parent.postMessage({
    type: 'coupleSpaceChecklistCommentRequest',
    charId: currentCharId,
    itemId: item.id,
    itemTitle: item.title,
    itemCategory: item.category,
    itemAuthor: item.author,
    doneBy: 'user',
    doneNote: text
  }, '*');
}

function editCurrentClItem() {
  if (!currentViewingClId) return;
  var idToEdit = currentViewingClId;
  closeClDetail();
  openClWrite(idToEdit);
}

function showClDeleteConfirm() {
  if (!currentViewingClId) return;
  var overlay = document.createElement('div');
  overlay.className = 'sig-overlay animate-fade-in';
  overlay.innerHTML = '<div class="sig-modal animate-slide-up"><h3>删除清单项</h3><p style="font-size:14px;color:#78716c;margin:12px 0">确定要删除这个清单项吗？</p>' +
    '<div class="sig-btns"><button class="sig-cancel" onclick="this.closest(\'.sig-overlay\').remove()">取消</button>' +
    '<button class="sig-confirm" style="background:#ef4444" onclick="deleteClItem()">删除</button></div></div>';
  document.getElementById('app').appendChild(overlay);
}

function deleteClItem() {
  if (!currentViewingClId) return;
  var items = getChecklistItems();
  items = items.filter(function(i) { return i.id !== currentViewingClId; });
  saveChecklistItems(items);
  document.querySelectorAll('.sig-overlay').forEach(function(el) { el.remove(); });
  closeClDetail();
  showClToast('已删除');
  notifyClChanged();
}

function toggleClFab() {
  var menu = document.getElementById('cl-fab-menu');
  if (!menu) return;
  if (menu.style.display === 'flex') { menu.style.display = 'none'; return; }
  menu.style.display = 'flex';
  menu.innerHTML =
    '<div class="album-fab-option" onclick="closeClFab();openClWrite()">' +
      '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
      '手动创建</div>' +
    '<div class="album-fab-option" onclick="closeClFab();requestCharClRecommend()">' +
      '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>' +
      '让TA推荐</div>';
}
function closeClFab() {
  var menu = document.getElementById('cl-fab-menu');
  if (menu) menu.style.display = 'none';
}

function openClWrite(existingId) {
  editingClId = existingId || null;
  var existing = null;
  if (editingClId) {
    var items = getChecklistItems();
    existing = items.find(function(i) { return i.id === editingClId; });
  }

  document.getElementById('cl-write-title-label').textContent = existing ? '编辑清单' : '新建清单';
  document.getElementById('cl-write-title').value = existing ? existing.title : '';
  document.getElementById('cl-write-note').value = existing ? (existing.note || '') : '';

  var catContainer = document.getElementById('cl-category-chips');
  renderClCategoryChips(catContainer, existing ? existing.category : 'daily');

  var priContainer = document.getElementById('cl-priority-chips');
  priContainer.innerHTML = CL_PRIORITIES.map(function(p) {
    var isActive = existing ? existing.priority === p.id : p.id === 'normal';
    return '<button class="cl-write-chip' + (isActive ? ' active' : '') + '" data-pri="' + p.id + '" onclick="selectClPriority(\'' + p.id + '\')">' + p.label + '</button>';
  }).join('');

  document.getElementById('cl-write-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
}

function closeClWrite() {
  editingClId = null;
  document.getElementById('cl-write-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
}

function selectClCategory(catId) {
  _clActiveCategory = catId;
  document.querySelectorAll('#cl-category-chips .cl-write-chip').forEach(function(el) {
    el.classList.toggle('active', el.dataset.cat === catId);
  });
}
function selectClPriority(priId) {
  document.querySelectorAll('#cl-priority-chips .cl-write-chip').forEach(function(el) {
    el.classList.toggle('active', el.dataset.pri === priId);
  });
}

var _clActiveCategory = 'daily';
function renderClCategoryChips(container, activeId) {
  _clActiveCategory = activeId || 'daily';
  container.innerHTML = '';
  var allCats = getAllClCategories();
  var customIds = getCustomClCategories().map(function(c){ return c.id; });
  allCats.forEach(function(c) {
    var chip = document.createElement('button');
    var isCustom = customIds.indexOf(c.id) !== -1;
    chip.className = 'cl-write-chip' + (isCustom ? ' custom-cat' : '') + (_clActiveCategory === c.id ? ' active' : '');
    chip.setAttribute('data-cat', c.id);
    var labelSpan = document.createElement('span');
    labelSpan.textContent = c.label;
    chip.appendChild(labelSpan);
    if (isCustom) {
      var delBtn = document.createElement('span');
      delBtn.className = 'cat-delete-btn';
      delBtn.innerHTML = '✕';
      delBtn.onclick = function(e) { e.stopPropagation(); deleteCustomClCategory(c.id); };
      chip.appendChild(delBtn);
    }
    chip.onclick = function() { selectClCategory(c.id); };
    container.appendChild(chip);
  });
  var addChip = document.createElement('button');
  addChip.className = 'cl-cat-add-chip';
  addChip.innerHTML = '<svg style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>自定义';
  addChip.onclick = function() { openAddClCategoryModal(); };
  container.appendChild(addChip);
}

function openAddClCategoryModal() {
  var overlay = document.createElement('div');
  overlay.className = 'mood-add-overlay animate-fade-in';
  overlay.id = 'cl-cat-add-overlay';
  overlay.innerHTML = '<div class="mood-add-modal animate-slide-up">' +
    '<h3>添加自定义分类</h3>' +
    '<input id="cl-cat-add-input" type="text" placeholder="输入分类名称" maxlength="8" />' +
    '<div class="mood-add-btns">' +
      '<button class="sig-cancel" onclick="closeAddClCategoryModal()">取消</button>' +
      '<button class="sig-confirm" onclick="confirmAddClCategory()">添加</button>' +
    '</div></div>';
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeAddClCategoryModal(); });
  document.getElementById('app').appendChild(overlay);
  setTimeout(function(){ document.getElementById('cl-cat-add-input').focus(); }, 100);
}
function closeAddClCategoryModal() {
  var el = document.getElementById('cl-cat-add-overlay');
  if (el) el.remove();
}
function confirmAddClCategory() {
  var input = document.getElementById('cl-cat-add-input');
  var label = input.value.trim();
  if (!label) return;
  var allCats = getAllClCategories();
  if (allCats.some(function(c){ return c.label === label; })) {
    showClToast('该分类已存在');
    return;
  }
  var customs = getCustomClCategories();
  customs.push({ id: 'clcat_' + Date.now().toString(36), label: label });
  saveCustomClCategories(customs);
  closeAddClCategoryModal();
  var container = document.getElementById('cl-category-chips');
  renderClCategoryChips(container, _clActiveCategory);
}
function deleteCustomClCategory(id) {
  var customs = getCustomClCategories();
  customs = customs.filter(function(c){ return c.id !== id; });
  saveCustomClCategories(customs);
  if (_clActiveCategory === id) _clActiveCategory = 'daily';
  var container = document.getElementById('cl-category-chips');
  renderClCategoryChips(container, _clActiveCategory);
}

function saveClItem() {
  var title = document.getElementById('cl-write-title').value.trim();
  var note = document.getElementById('cl-write-note').value.trim();
  if (!title) { showClToast('请输入标题'); return; }

  var activeCat = document.querySelector('#cl-category-chips .cl-write-chip.active');
  var activePri = document.querySelector('#cl-priority-chips .cl-write-chip.active');
  var category = activeCat ? activeCat.dataset.cat : 'custom';
  var priority = activePri ? activePri.dataset.pri : 'normal';

  var items = getChecklistItems();

  if (editingClId) {
    var item = items.find(function(i) { return i.id === editingClId; });
    if (item) {
      item.title = title;
      item.note = note;
      item.category = category;
      item.priority = priority;
    }
  } else {
    items.push({
      id: 'cl_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      title: title,
      category: category,
      priority: priority,
      note: note,
      done: false,
      doneAt: null,
      author: 'user',
      createdAt: Date.now(),
      doneNote: '',
      hearts: { user: true },
      comments: []
    });
  }

  saveChecklistItems(items);
  closeClWrite();
  renderChecklistList();
  showClToast(editingClId ? '已更新' : '清单已创建');
  notifyClChanged();
}

function requestCharClRecommend() {
  showClToast('正在让TA想想...');
  var items = getChecklistItems();
  var settings = getClSettings();
  window.parent.postMessage({
    type: 'coupleSpaceChecklistAiRequest',
    charId: currentCharId,
    existingItems: items,
    checklistSettings: settings
  }, '*');
}

function openClSettings() {
  var settings = getClSettings();
  var overlay = document.createElement('div');
  overlay.className = 'diary-settings-overlay animate-fade-in';
  overlay.id = 'cl-settings-overlay';

  var autoEnabled = settings.autoEnabled || false;
  var aiDecide = settings.aiDecide || false;
  var aiDecideChatProb = settings.aiDecideChatProb ?? 15;
  var aiDecideBgProb = settings.aiDecideBgProb ?? 5;
  var visCharItems = settings.visibleCharItems ?? 10;
  var visUserItems = settings.visibleUserItems ?? 10;

  overlay.innerHTML = '<div class="diary-settings-sheet animate-slide-up">' +
    '<div class="diary-settings-handle"></div>' +
    '<div class="diary-settings-title">清单设置</div>' +

    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">角色自动推荐</div>' +
      '<div class="diary-setting-desc">角色会定期推荐想一起做的事</div></div>' +
      '<div class="diary-toggle' + (autoEnabled ? ' on' : '') + '" id="cl-toggle-auto" onclick="toggleClSetting(\'auto\')"></div>' +
    '</div>' +

    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">自动推荐时间</div></div>' +
      '<input type="time" class="diary-time-select" id="cl-auto-time" value="' + (settings.autoTime || '20:00') + '" onchange="updateClAutoTime()" />' +
    '</div>' +

    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">AI 自主决定</div>' +
      '<div class="diary-setting-desc">聊天或后台活动时随机触发，AI 自己决定</div></div>' +
      '<div class="diary-toggle' + (aiDecide ? ' on' : '') + '" id="cl-toggle-decide" onclick="toggleClSetting(\'decide\')"></div>' +
    '</div>' +

    '<div id="cl-ai-decide-probs" style="' + (aiDecide ? '' : 'display:none') + '">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">聊天触发概率 (%)</div>' +
        '<div class="diary-setting-desc">每次聊天消息后触发的概率</div></div>' +
        '<input type="number" value="' + aiDecideChatProb + '" class="diary-time-select" style="width:70px;text-align:center" onchange="updateClAiDecideProb()" id="cl-chat-prob" />' +
      '</div>' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">后台触发概率 (%)</div>' +
        '<div class="diary-setting-desc">后台活动每次心跳触发的概率</div></div>' +
        '<input type="number" value="' + aiDecideBgProb + '" class="diary-time-select" style="width:70px;text-align:center" onchange="updateClAiDecideProb()" id="cl-bg-prob" />' +
      '</div>' +
    '</div>' +

    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">AI可见角色清单数</div>' +
      '<div class="diary-setting-desc">AI能看到多少条角色创建的清单</div></div>' +
      '<input type="number" class="diary-time-select" style="width:60px" id="cl-vis-char" value="' + visCharItems + '" min="0" max="50" onchange="updateClVisibility()" />' +
    '</div>' +

    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">AI可见用户清单数</div>' +
      '<div class="diary-setting-desc">AI能看到多少条你创建的清单</div></div>' +
      '<input type="number" class="diary-time-select" style="width:60px" id="cl-vis-user" value="' + visUserItems + '" min="0" max="50" onchange="updateClVisibility()" />' +
    '</div>' +

  '</div>';

  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeClSettings(); });
  document.getElementById('app').appendChild(overlay);
}

function closeClSettings() {
  var el = document.getElementById('cl-settings-overlay');
  if (el) el.remove();
}

function toggleClSetting(key) {
  var settings = getClSettings();
  if (key === 'auto') {
    settings.autoEnabled = !settings.autoEnabled;
    document.getElementById('cl-toggle-auto').classList.toggle('on', settings.autoEnabled);
  } else if (key === 'decide') {
    settings.aiDecide = !settings.aiDecide;
    document.getElementById('cl-toggle-decide').classList.toggle('on', settings.aiDecide);
    var probsDiv = document.getElementById('cl-ai-decide-probs');
    if (probsDiv) probsDiv.style.display = settings.aiDecide ? '' : 'none';
  }
  saveClSettings(settings);
  notifyClSettingsChanged();
}

function updateClAutoTime() {
  var settings = getClSettings();
  settings.autoTime = document.getElementById('cl-auto-time').value;
  saveClSettings(settings);
  notifyClSettingsChanged();
}

function updateClVisibility() {
  var settings = getClSettings();
  settings.visibleCharItems = parseInt(document.getElementById('cl-vis-char').value) || 10;
  settings.visibleUserItems = parseInt(document.getElementById('cl-vis-user').value) || 10;
  saveClSettings(settings);
  notifyClSettingsChanged();
}

function updateClAiDecideProb() {
  var settings = getClSettings();
  settings.aiDecideChatProb = parseInt(document.getElementById('cl-chat-prob').value) || 15;
  settings.aiDecideBgProb = parseInt(document.getElementById('cl-bg-prob').value) || 5;
  saveClSettings(settings);
  notifyClSettingsChanged();
}

function showClToast(msg) {
  var toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1c1917;color:white;padding:10px 24px;border-radius:9999px;font-size:13px;z-index:100;pointer-events:none;animation:fadeIn .2s ease';
  toast.textContent = msg;
  document.getElementById('app').appendChild(toast);
  setTimeout(function() { toast.remove(); }, 2000);
}

// --- Handle AI checklist results from parent ---
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'coupleSpaceChecklistAiResult') {
    if (e.data.error) {
      showClToast('推荐失败，请重试');
      return;
    }
    var items = getChecklistItems();
    items.push({
      id: 'cl_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      title: e.data.title,
      category: e.data.category || 'custom',
      priority: e.data.priority || 'normal',
      note: e.data.note || '',
      done: false,
      doneAt: null,
      author: 'char',
      createdAt: Date.now(),
      doneNote: '',
      hearts: { char: true },
      comments: []
    });
    saveChecklistItems(items);
    renderChecklistList();
    showClToast((csCharName || 'TA') + '推荐了一件事');
    notifyClChanged();
  }

  if (e.data && e.data.type === 'coupleSpaceChecklistCommentResult') {
    if (e.data.error) return;
    var items = getChecklistItems();
    var item = items.find(function(i) { return i.id === e.data.itemId; });
    if (item) {
      if (!item.comments) item.comments = [];
      item.comments.push({ author: 'char', content: e.data.comment, timestamp: Date.now() });
      saveChecklistItems(items);
      if (currentViewingClId === e.data.itemId) openClDetail(e.data.itemId);
    }
  }

  if (e.data && e.data.type === 'coupleSpaceChecklistHeartResult') {
    if (e.data.liked) {
      var items = getChecklistItems();
      var item = items.find(function(i) { return i.id === e.data.itemId; });
      if (item) {
        if (!item.hearts) item.hearts = {};
        item.hearts.char = true;
        saveChecklistItems(items);
        if (currentViewingClId === e.data.itemId) openClDetail(e.data.itemId);
        else renderChecklistList();
        showClToast((csCharName || 'TA') + '也点了爱心');
      }
    }
  }

  if (e.data && e.data.type === 'coupleSpaceChecklistAutoResult') {
    var items = getChecklistItems();
    if (e.data.item && !items.find(function(i) { return i.id === e.data.item.id; })) {
      items.push(e.data.item);
      saveChecklistItems(items);
      renderChecklistList();
      showClToast((csCharName || 'TA') + '推荐了一件事');
    }
  }

  // --- Message Board results from parent ---
  if (e.data && e.data.type === 'coupleSpaceMessageAiResult') {
    if (e.data.error) {
      showMsgToast('留言失败，请重试');
      aiWritingMsg = false;
      renderMsgList();
      return;
    }
    var msgs = getMessages();
    var newMsg = {
      id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      content: e.data.content,
      sticker: e.data.sticker || 'none',
      author: 'char',
      createdAt: Date.now(),
      hearts: { char: true },
      comments: []
    };
    msgs.push(newMsg);
    saveMessages(msgs);
    aiWritingMsg = false;
    renderMsgList();
    showMsgToast((csCharName || 'TA') + '留了一条言');
    notifyMsgChanged();
  }

  if (e.data && e.data.type === 'coupleSpaceMessageReplyResult') {
    if (e.data.error) return;
    var msgs = getMessages();
    var msg = msgs.find(function(m) { return m.id === e.data.msgId; });
    if (msg) {
      if (!msg.comments) msg.comments = [];
      msg.comments.push({ author: 'char', content: e.data.reply, timestamp: Date.now() });
      saveMessages(msgs);
      if (currentViewingMsgId === e.data.msgId) openMsgDetail(e.data.msgId);
      notifyMsgChanged();
    }
  }

  if (e.data && e.data.type === 'coupleSpaceMessageHeartResult') {
    if (e.data.liked) {
      var msgs = getMessages();
      var msg = msgs.find(function(m) { return m.id === e.data.msgId; });
      if (msg) {
        if (!msg.hearts) msg.hearts = {};
        msg.hearts.char = true;
        saveMessages(msgs);
        if (currentViewingMsgId === e.data.msgId) openMsgDetail(e.data.msgId);
        else renderMsgList();
        showMsgToast((csCharName || 'TA') + '也点了爱心');
        notifyMsgChanged();
      }
    }
  }

  if (e.data && e.data.type === 'coupleSpaceMessageAutoResult') {
    var msgs = getMessages();
    if (e.data.item && !msgs.find(function(m) { return m.id === e.data.item.id; })) {
      msgs.push(e.data.item);
      saveMessages(msgs);
      renderMsgList();
      showMsgToast((csCharName || 'TA') + '留了一条言');
    }
  }

  // --- Mood results from parent ---
  if (e.data && e.data.type === 'coupleSpaceMoodAiResult') {
    if (e.data.error) {
      showMoodToast('记录失败，请重试');
      aiWritingMood = false;
      renderMoodList();
      return;
    }
    var moods = getMoods();
    var newMood = {
      id: 'mood_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      moodType: e.data.moodType || 'calm',
      content: e.data.content,
      author: 'char',
      createdAt: Date.now(),
      hearts: { char: true },
      comments: []
    };
    moods.push(newMood);
    saveMoods(moods);
    aiWritingMood = false;
    renderMoodList();
    showMoodToast((csCharName || 'TA') + '记录了心情');
    notifyMoodChanged();
  }

  if (e.data && e.data.type === 'coupleSpaceMoodCommentResult') {
    if (e.data.error) return;
    var moods = getMoods();
    var mood = moods.find(function(m) { return m.id === e.data.moodId; });
    if (mood) {
      if (!mood.comments) mood.comments = [];
      mood.comments.push({ author: 'char', content: e.data.reply, timestamp: Date.now() });
      saveMoods(moods);
      if (currentViewingMoodId === e.data.moodId) openMoodDetail(e.data.moodId);
      notifyMoodChanged();
    }
  }

  if (e.data && e.data.type === 'coupleSpaceMoodHeartResult') {
    if (e.data.liked) {
      var moods = getMoods();
      var mood = moods.find(function(m) { return m.id === e.data.moodId; });
      if (mood) {
        if (!mood.hearts) mood.hearts = {};
        mood.hearts.char = true;
        saveMoods(moods);
        if (currentViewingMoodId === e.data.moodId) openMoodDetail(e.data.moodId);
        else renderMoodList();
        showMoodToast((csCharName || 'TA') + '也点了爱心');
        notifyMoodChanged();
      }
    }
  }

  if (e.data && e.data.type === 'coupleSpaceMoodAutoResult') {
    var moods = getMoods();
    if (e.data.item && !moods.find(function(m) { return m.id === e.data.item.id; })) {
      moods.push(e.data.item);
      saveMoods(moods);
      renderMoodList();
      showMoodToast((csCharName || 'TA') + '记录了心情');
    }
  }
});
</script>

<script>
// ===== MESSAGE BOARD =====
var msgFabOpen = false;
var aiWritingMsg = false;
var currentViewingMsgId = null;
var editingMsgCategory = 'none';

var MSG_CATEGORIES = [
  { id: 'none', label: '无' },
  { id: 'love', label: '表白' },
  { id: 'miss', label: '想念' },
  { id: 'care', label: '关心' },
  { id: 'share', label: '分享' },
  { id: 'daily', label: '日常' }
];

function getCustomMsgCategories() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleCustomMsgCats_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveCustomMsgCategories(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleCustomMsgCats_' + currentCharId, JSON.stringify(list));
}
function getAllMsgCategories() {
  return MSG_CATEGORIES.concat(getCustomMsgCategories());
}

function getMsgCategoryLabel(id) {
  var all = getAllMsgCategories();
  var c = all.find(function(x) { return x.id === id; });
  if (c) return c.label;
  // Legacy sticker ID mapping
  var legacy = { heart: '表白', star: '分享', smile: '日常', hug: '关心', kiss: '表白', moon: '想念', sun: '日常', rainbow: '分享', flower: '表白' };
  return legacy[id] || '';
}

// --- Storage ---
function getMessages() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleMessages_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveMessages(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleMessages_' + currentCharId, JSON.stringify(list));
}
function getMsgSettings() {
  if (!currentCharId) return {};
  try { return JSON.parse(localStorage.getItem('coupleMessageSettings_' + currentCharId)) || {}; }
  catch(e) { return {}; }
}
function saveMsgSettings(s) {
  if (!currentCharId) return;
  localStorage.setItem('coupleMessageSettings_' + currentCharId, JSON.stringify(s));
}

function notifyMsgChanged() {
  window.parent.postMessage({
    type: 'coupleSpaceMessageChanged',
    charId: currentCharId,
    items: getMessages()
  }, '*');
}
function notifyMsgSettingsChanged() {
  window.parent.postMessage({
    type: 'coupleSpaceMessageSettingsChanged',
    charId: currentCharId,
    settings: getMsgSettings()
  }, '*');
}

// --- List ---
function renderMsgList() {
  var container = document.getElementById('msg-list-container');
  if (!container) return;
  var msgs = getMessages();
  msgs.sort(function(a, b) { return b.createdAt - a.createdAt; });

  if (msgs.length === 0 && !aiWritingMsg) {
    container.innerHTML = '<div class="msg-empty">' +
      '<svg class="msg-empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
      '<span class="msg-empty-text">还没有留言，写下第一条吧</span></div>';
    return;
  }

  var html = '';
  if (aiWritingMsg) {
    html += '<div class="msg-ai-writing"><div class="diary-ai-dots"><span></span><span></span><span></span></div>' + escHtml(csCharName) + ' 正在写留言...</div>';
  }
  msgs.forEach(function(m) {
    var isChar = m.author === 'char';
    var avatar = isChar ? csCharAvatar : csUserAvatar;
    var name = isChar ? csCharName : csUserName;
    var commentCount = (m.comments || []).length;
    var heartCount = 0;
    if (m.hearts) { if (m.hearts.user) heartCount++; if (m.hearts.char) heartCount++; }
    var catLabel = getMsgCategoryLabel(m.sticker || m.category || 'none');
    var categoryHtml = (catLabel && catLabel !== '无') ? '<span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:10px;font-weight:500;background:#fafaf9;color:#78716c;border:1px solid #f5f5f4">' + escHtml(catLabel) + '</span>' : '';

    html += '<div class="msg-card" onclick="openMsgDetail(\'' + m.id + '\')">' +
      (categoryHtml ? '<div class="msg-card-sticker">' + categoryHtml + '</div>' : '') +
      '<div class="msg-card-top">' +
        '<div class="msg-card-avatar" style="background-image:url(' + escAttr(avatar) + ')"></div>' +
        '<div class="msg-card-meta"><div class="msg-card-author">' + escHtml(name) + '</div>' +
        '<div class="msg-card-date">' + fmtRelativeDate(m.createdAt) + '</div></div>' +
      '</div>' +
      '<div class="msg-card-content">' + escHtml(m.content) + '</div>' +
      '<div class="msg-card-footer">' +
        '<span class="msg-card-heart' + (heartCount > 0 ? ' active' : '') + '"><svg style="width:14px;height:14px" fill="' + (heartCount > 0 ? '#fb7185' : 'none') + '" stroke="' + (heartCount > 0 ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + heartCount + '</span>' +
        '<svg style="width:14px;height:14px;margin-left:auto;color:#c8c5c2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
        '<span>' + commentCount + '</span>' +
      '</div></div>';
  });
  container.innerHTML = html;
}

// --- FAB ---
function toggleMsgFab() {
  msgFabOpen = !msgFabOpen;
  var menu = document.getElementById('msg-fab-menu');
  var btn = document.getElementById('msg-fab-btn');
  if (msgFabOpen) {
    menu.style.display = 'flex';
    menu.innerHTML =
      '<div class="album-fab-option animate-fade-in" onclick="openMsgWrite()">' +
        '<svg style="width:18px;height:18px;color:#78716c;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>' +
        '我来写' +
      '</div>' +
      '<div class="album-fab-option animate-fade-in" onclick="requestAiMsg()">' +
        '<svg style="width:18px;height:18px;color:#78716c;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
        '让TA写' +
      '</div>';
    btn.innerHTML = '<svg class="icon-lg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  } else {
    menu.style.display = 'none';
    btn.innerHTML = SVG_PLUS;
  }
}
function closeMsgFab() { if (msgFabOpen) toggleMsgFab(); }

// --- Request AI Message ---
function requestAiMsg() {
  closeMsgFab();
  if (aiWritingMsg) return;
  aiWritingMsg = true;
  renderMsgList();
  var settings = getMsgSettings();
  window.parent.postMessage({
    type: 'coupleSpaceMessageAiRequest',
    charId: currentCharId,
    existingMessages: getMessages(),
    messageSettings: settings
  }, '*');
}

// --- Write Message ---
var editingMsgId = null;
function openMsgWrite(existingId) {
  closeMsgFab();
  editingMsgId = existingId || null;
  editingMsgCategory = 'none';
  document.getElementById('msg-write-content').value = '';
  if (existingId) {
    var msgs = getMessages();
    var m = msgs.find(function(x){ return x.id === existingId; });
    if (m) {
      document.getElementById('msg-write-content').value = m.content || '';
      editingMsgCategory = m.sticker || m.category || 'none';
    }
  }
  renderMsgStickerRow();
  document.getElementById('msg-write-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
}
function closeMsgWrite() {
  document.getElementById('msg-write-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
}
function renderMsgStickerRow() {
  var row = document.getElementById('msg-sticker-row');
  row.innerHTML = '';
  var allCats = getAllMsgCategories();
  var customIds = getCustomMsgCategories().map(function(c){ return c.id; });
  allCats.forEach(function(c) {
    var chip = document.createElement('button');
    var isCustom = customIds.indexOf(c.id) !== -1;
    chip.className = 'msg-sticker-chip' + (isCustom ? ' custom-cat' : '') + (editingMsgCategory === c.id ? ' active' : '');
    chip.setAttribute('data-cat', c.id);
    var labelSpan = document.createElement('span');
    labelSpan.textContent = c.label;
    chip.appendChild(labelSpan);
    if (isCustom) {
      var delBtn = document.createElement('span');
      delBtn.className = 'cat-delete-btn';
      delBtn.innerHTML = '✕';
      delBtn.onclick = function(e) { e.stopPropagation(); deleteCustomMsgCategory(c.id); };
      chip.appendChild(delBtn);
    }
    chip.onclick = function() { selectMsgSticker(c.id); };
    row.appendChild(chip);
  });
  var addChip = document.createElement('button');
  addChip.className = 'msg-cat-add-chip';
  addChip.innerHTML = '<svg style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>自定义';
  addChip.onclick = function() { openAddMsgCategoryModal(); };
  row.appendChild(addChip);
}
function selectMsgSticker(id) {
  editingMsgCategory = id;
  renderMsgStickerRow();
}

function openAddMsgCategoryModal() {
  var overlay = document.createElement('div');
  overlay.className = 'mood-add-overlay animate-fade-in';
  overlay.id = 'msg-cat-add-overlay';
  overlay.innerHTML = '<div class="mood-add-modal animate-slide-up">' +
    '<h3>添加自定义分类</h3>' +
    '<input id="msg-cat-add-input" type="text" placeholder="输入分类名称" maxlength="8" />' +
    '<div class="mood-add-btns">' +
      '<button class="sig-cancel" onclick="closeAddMsgCategoryModal()">取消</button>' +
      '<button class="sig-confirm" onclick="confirmAddMsgCategory()">添加</button>' +
    '</div></div>';
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeAddMsgCategoryModal(); });
  document.getElementById('app').appendChild(overlay);
  setTimeout(function(){ document.getElementById('msg-cat-add-input').focus(); }, 100);
}
function closeAddMsgCategoryModal() {
  var el = document.getElementById('msg-cat-add-overlay');
  if (el) el.remove();
}
function confirmAddMsgCategory() {
  var input = document.getElementById('msg-cat-add-input');
  var label = input.value.trim();
  if (!label) return;
  var allCats = getAllMsgCategories();
  if (allCats.some(function(c){ return c.label === label; })) {
    showMsgToast('该分类已存在');
    return;
  }
  var customs = getCustomMsgCategories();
  customs.push({ id: 'msgcat_' + Date.now().toString(36), label: label });
  saveCustomMsgCategories(customs);
  closeAddMsgCategoryModal();
  renderMsgStickerRow();
}
function deleteCustomMsgCategory(id) {
  var customs = getCustomMsgCategories();
  customs = customs.filter(function(c){ return c.id !== id; });
  saveCustomMsgCategories(customs);
  if (editingMsgCategory === id) editingMsgCategory = 'none';
  renderMsgStickerRow();
}
function saveMsgItem() {
  var content = document.getElementById('msg-write-content').value.trim();
  if (!content) return;
  var msgs = getMessages();
  if (editingMsgId) {
    var idx = msgs.findIndex(function(x){ return x.id === editingMsgId; });
    if (idx >= 0) {
      msgs[idx].content = content;
      msgs[idx].sticker = editingMsgCategory;
      msgs[idx].category = editingMsgCategory;
    }
    saveMessages(msgs);
    closeMsgWrite();
    renderMsgList();
    notifyMsgChanged();
    editingMsgId = null;
  } else {
    msgs.push({
      id: 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      content: content,
      sticker: editingMsgCategory,
      category: editingMsgCategory,
      author: 'user',
      createdAt: Date.now(),
      hearts: { user: true },
      comments: []
    });
    saveMessages(msgs);
    closeMsgWrite();
    renderMsgList();
    notifyMsgChanged();
    // Ask AI to reply
    var settings = getMsgSettings();
    window.parent.postMessage({
      type: 'coupleSpaceMessageReplyRequest',
      charId: currentCharId,
      msgId: msgs[msgs.length - 1].id,
      msgContent: content,
      msgDate: new Date().toLocaleString('zh-CN')
    }, '*');
    // Ask AI to heart
    window.parent.postMessage({
      type: 'coupleSpaceMessageHeartRequest',
      charId: currentCharId,
      msgId: msgs[msgs.length - 1].id,
      msgContent: content
    }, '*');
  }
}
function editCurrentMsg() {
  if (!currentViewingMsgId) return;
  var msgs = getMessages();
  var m = msgs.find(function(x){ return x.id === currentViewingMsgId; });
  if (!m || m.author !== 'user') return;
  var idToEdit = currentViewingMsgId;
  closeMsgDetail();
  openMsgWrite(idToEdit);
}

// --- Detail ---
function openMsgDetail(id) {
  currentViewingMsgId = id;
  var msgs = getMessages();
  var m = msgs.find(function(x) { return x.id === id; });
  if (!m) return;

  var isChar = m.author === 'char';
  var avatar = isChar ? csCharAvatar : csUserAvatar;
  var name = isChar ? csCharName : csUserName;
  var userHearted = m.hearts && m.hearts.user;
  var charHearted = m.hearts && m.hearts.char;

  var html = '';
  var catLabel = getMsgCategoryLabel(m.sticker || m.category || 'none');
  if (catLabel && catLabel !== '无') {
    html += '<div class="msg-detail-sticker"><span style="display:inline-flex;align-items:center;padding:4px 12px;border-radius:9999px;font-size:12px;color:#78716c;background:#fafaf9;border:1px solid #f5f5f4">' + escHtml(catLabel) + '</span></div>';
  }
  html += '<div class="msg-detail-author-row">' +
    '<div class="msg-detail-avatar" style="background-image:url(' + escAttr(avatar) + ')"></div>' +
    '<div><div class="msg-detail-author-name">' + escHtml(name) + '</div>' +
    '<div class="msg-detail-date">' + fmtRelativeDate(m.createdAt) + '</div></div></div>';
  html += '<div class="msg-detail-content">' + escHtml(m.content) + '</div>';

  // Hearts
  html += '<div class="msg-detail-hearts">' +
    '<button class="msg-detail-heart-btn' + (userHearted ? ' active' : '') + '" onclick="toggleMsgHeart(\'' + id + '\',\'user\')">' +
      '<svg style="width:16px;height:16px" fill="' + (userHearted ? '#fb7185' : 'none') + '" stroke="' + (userHearted ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + escHtml(csUserName) +
    '</button>' +
    '<button class="msg-detail-heart-btn' + (charHearted ? ' active' : '') + '" style="pointer-events:none">' +
      '<svg style="width:16px;height:16px" fill="' + (charHearted ? '#fb7185' : 'none') + '" stroke="' + (charHearted ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + escHtml(csCharName) +
    '</button>' +
  '</div>';

  // Comments
  html += '<div class="msg-comments-section"><div class="msg-comments-title">评论</div>';
  var comments = m.comments || [];
  if (comments.length === 0) {
    html += '<div class="msg-comment-empty">暂无评论</div>';
  } else {
    comments.forEach(function(c) {
      var cIsChar = c.author === 'char';
      var cAvatar = cIsChar ? csCharAvatar : csUserAvatar;
      var cName = cIsChar ? csCharName : csUserName;
      html += '<div class="msg-comment-item">' +
        '<div class="msg-comment-avatar" style="background-image:url(' + escAttr(cAvatar) + ')"></div>' +
        '<div class="msg-comment-body">' +
          '<span class="msg-comment-name">' + escHtml(cName) + '</span>' +
          '<span class="msg-comment-time">' + fmtRelativeDate(c.timestamp) + '</span>' +
          '<div class="msg-comment-text">' + escHtml(c.content) + '</div>' +
        '</div></div>';
    });
  }
  html += '</div>';

  document.getElementById('msg-detail-scroll').innerHTML = html;
  document.getElementById('msg-detail-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
  document.getElementById('msg-comment-input').value = '';
  updateMsgCommentBtn();
}
function closeMsgDetail() {
  currentViewingMsgId = null;
  document.getElementById('msg-detail-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
  renderMsgList();
}
function deleteMsgFromDetail() {
  if (!currentViewingMsgId) return;
  if (!confirm('确定删除这条留言？')) return;
  var msgs = getMessages();
  msgs = msgs.filter(function(m) { return m.id !== currentViewingMsgId; });
  saveMessages(msgs);
  notifyMsgChanged();
  closeMsgDetail();
}

function toggleMsgHeart(id, who) {
  var msgs = getMessages();
  var m = msgs.find(function(x) { return x.id === id; });
  if (!m) return;
  if (!m.hearts) m.hearts = {};
  m.hearts[who] = !m.hearts[who];
  saveMessages(msgs);
  notifyMsgChanged();
  openMsgDetail(id);
  // If user hearted, ask AI
  if (who === 'user' && m.hearts.user) {
    window.parent.postMessage({
      type: 'coupleSpaceMessageHeartRequest',
      charId: currentCharId,
      msgId: id,
      msgContent: m.content
    }, '*');
  }
}

function updateMsgCommentBtn() {
  var val = document.getElementById('msg-comment-input').value.trim();
  var btn = document.getElementById('msg-comment-send');
  if (val) btn.classList.remove('disabled');
  else btn.classList.add('disabled');
}
function sendMsgComment() {
  var val = document.getElementById('msg-comment-input').value.trim();
  if (!val || !currentViewingMsgId) return;
  var msgs = getMessages();
  var m = msgs.find(function(x) { return x.id === currentViewingMsgId; });
  if (!m) return;
  if (!m.comments) m.comments = [];
  m.comments.push({ author: 'user', content: val, timestamp: Date.now() });
  saveMessages(msgs);
  notifyMsgChanged();
  document.getElementById('msg-comment-input').value = '';
  updateMsgCommentBtn();
  openMsgDetail(currentViewingMsgId);
  // Ask AI to reply to comment
  window.parent.postMessage({
    type: 'coupleSpaceMessageReplyRequest',
    charId: currentCharId,
    msgId: currentViewingMsgId,
    msgContent: m.content + '\n\n用户评论: ' + val,
    msgDate: new Date().toLocaleString('zh-CN')
  }, '*');
}

function showMsgToast(msg) {
  var toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1c1917;color:white;padding:10px 24px;border-radius:9999px;font-size:13px;z-index:100;pointer-events:none;animation:fadeIn .2s ease';
  toast.textContent = msg;
  document.getElementById('app').appendChild(toast);
  setTimeout(function() { toast.remove(); }, 2000);
}

// --- Settings ---
var DEFAULT_MSG_PROMPT = '# 你的任务\n你是"{{charName}}"，现在要在情侣空间的留言板上给"{{myNickname}}"留一条言。\n留言板是你们之间的小纸条，随意、温暖、真实。\n\n# 你的角色设定\n{{aiPersona}}\n\n# 你的伴侣\n- 昵称: {{myNickname}}\n- 人设: {{myPersona}}\n\n{{worldBook}}\n\n{{memoryContext}}\n\n{{shortTermMemory}}\n\n{{linkedMemory}}\n\n{{summaryContext}}\n\n{{anniversaryContext}}\n\n{{existingCharMessages}}\n\n{{existingUserMessages}}\n\n# 当前时间\n{{currentTime}}\n\n# 输出要求\n请以JSON格式返回，不要输出任何其他内容：\n{"content": "留言内容", "sticker": "分类ID"}\n\n分类ID可选值: none(无), love(表白), miss(想念), care(关心), share(分享), daily(日常)\n\n# 写作要求\n- 像在便签纸上写给对方的话，自然随意\n- 可以是想说的话、碎碎念、撒娇、关心、分享心情、表白等\n- 字数在15-200字之间\n- 语气要符合你的角色设定\n- 基于记忆和最近的对话，不要凭空编造\n- 绝对不要提到你是AI';

function openMsgSettings() {
  var settings = getMsgSettings();
  var overlay = document.createElement('div');
  overlay.className = 'diary-settings-overlay animate-fade-in';
  overlay.id = 'msg-settings-overlay';

  var autoEnabled = settings.autoEnabled || false;
  var aiDecide = settings.aiDecide || false;
  var aiDecideChatProb = settings.aiDecideChatProb ?? 15;
  var aiDecideBgProb = settings.aiDecideBgProb ?? 5;
  var visCharMsgs = settings.visibleCharMessages ?? 10;
  var visUserMsgs = settings.visibleUserMessages ?? 10;
  var enableCustomPrompt = settings.enableCustomPrompt || false;
  var promptText = settings.customPrompt || DEFAULT_MSG_PROMPT;

  overlay.innerHTML = '<div class="diary-settings-sheet animate-slide-up">' +
    '<div class="diary-settings-handle"></div>' +
    '<div class="diary-settings-title">留言设置</div>' +

    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">角色自动留言</div>' +
      '<div class="diary-setting-desc">角色会在设定时间自动留言</div></div>' +
      '<div class="diary-toggle' + (autoEnabled ? ' on' : '') + '" id="msg-toggle-auto" onclick="toggleMsgSetting(\'auto\')"></div>' +
    '</div>' +

    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">自动留言时间</div></div>' +
      '<input type="time" class="diary-time-select" id="msg-auto-time" value="' + (settings.autoTime || '20:00') + '" onchange="updateMsgAutoTime()" />' +
    '</div>' +

    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">AI 自主决定</div>' +
      '<div class="diary-setting-desc">聊天或后台活动时随机触发，AI 自己决定</div></div>' +
      '<div class="diary-toggle' + (aiDecide ? ' on' : '') + '" id="msg-toggle-decide" onclick="toggleMsgSetting(\'decide\')"></div>' +
    '</div>' +

    '<div id="msg-ai-decide-probs" style="' + (aiDecide ? '' : 'display:none') + '">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">聊天触发概率 (%)</div>' +
        '<div class="diary-setting-desc">每次聊天消息后触发的概率</div></div>' +
        '<input type="number" value="' + aiDecideChatProb + '" class="diary-time-select" style="width:70px;text-align:center" onchange="updateMsgAiDecideProb()" id="msg-chat-prob" />' +
      '</div>' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">后台触发概率 (%)</div>' +
        '<div class="diary-setting-desc">后台活动每次心跳触发的概率</div></div>' +
        '<input type="number" value="' + aiDecideBgProb + '" class="diary-time-select" style="width:70px;text-align:center" onchange="updateMsgAiDecideProb()" id="msg-bg-prob" />' +
      '</div>' +
    '</div>' +

    '<div style="padding-top:16px;margin-top:8px;border-top:1px solid #f0efed">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">AI可见角色留言数</div>' +
        '<div class="diary-setting-desc">AI能看到多少条角色的留言及评论</div></div>' +
        '<input type="number" class="diary-time-select" style="width:60px" id="msg-vis-char" value="' + visCharMsgs + '" min="0" max="50" onchange="updateMsgVisibility()" />' +
      '</div>' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">AI可见用户留言数</div>' +
        '<div class="diary-setting-desc">AI能看到多少条你的留言及评论</div></div>' +
        '<input type="number" class="diary-time-select" style="width:60px" id="msg-vis-user" value="' + visUserMsgs + '" min="0" max="50" onchange="updateMsgVisibility()" />' +
      '</div>' +
    '</div>' +

    '<div style="padding-top:16px;margin-top:8px;border-top:1px solid #f0efed">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">自定义留言生成提示词</div>' +
        '<div class="diary-setting-desc">自定义 AI 写留言时使用的提示词模板</div></div>' +
        '<div class="diary-toggle' + (enableCustomPrompt ? ' on' : '') + '" id="msg-toggle-prompt" onclick="toggleMsgPromptSetting()"></div>' +
      '</div>' +
      '<div class="diary-prompt-section" id="msg-prompt-section" style="' + (enableCustomPrompt ? '' : 'display:none') + '">' +
        '<textarea class="diary-prompt-textarea" id="msg-prompt-textarea" placeholder="输入自定义提示词...">' + escHtml(promptText) + '</textarea>' +
        '<div class="diary-prompt-actions">' +
          '<button class="diary-prompt-action-btn" onclick="saveMsgPromptText()">保存</button>' +
          '<button class="diary-prompt-action-btn warn" onclick="resetMsgPrompt()">重置默认</button>' +
        '</div>' +
        '<div style="margin-top:8px;font-size:11px;color:#a8a29e;line-height:1.5">可用变量: {{charName}} {{myNickname}} {{aiPersona}} {{myPersona}} {{worldBook}} {{memoryContext}} {{shortTermMemory}} {{linkedMemory}} {{summaryContext}} {{existingCharMessages}} {{existingUserMessages}} {{currentTime}} {{anniversaryContext}}</div>' +
      '</div>' +
    '</div>' +

  '</div>';

  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeMsgSettings(); });
  document.getElementById('app').appendChild(overlay);
}

function closeMsgSettings() {
  var el = document.getElementById('msg-settings-overlay');
  if (el) el.remove();
}

function toggleMsgSetting(key) {
  var settings = getMsgSettings();
  if (key === 'auto') {
    settings.autoEnabled = !settings.autoEnabled;
    document.getElementById('msg-toggle-auto').classList.toggle('on', settings.autoEnabled);
  } else if (key === 'decide') {
    settings.aiDecide = !settings.aiDecide;
    document.getElementById('msg-toggle-decide').classList.toggle('on', settings.aiDecide);
    var probsDiv = document.getElementById('msg-ai-decide-probs');
    if (probsDiv) probsDiv.style.display = settings.aiDecide ? '' : 'none';
  }
  saveMsgSettings(settings);
  notifyMsgSettingsChanged();
}

function updateMsgAutoTime() {
  var settings = getMsgSettings();
  settings.autoTime = document.getElementById('msg-auto-time').value;
  saveMsgSettings(settings);
  notifyMsgSettingsChanged();
}

function updateMsgAiDecideProb() {
  var settings = getMsgSettings();
  settings.aiDecideChatProb = parseInt(document.getElementById('msg-chat-prob').value) || 15;
  settings.aiDecideBgProb = parseInt(document.getElementById('msg-bg-prob').value) || 5;
  saveMsgSettings(settings);
  notifyMsgSettingsChanged();
}

function updateMsgVisibility() {
  var settings = getMsgSettings();
  settings.visibleCharMessages = parseInt(document.getElementById('msg-vis-char').value) || 10;
  settings.visibleUserMessages = parseInt(document.getElementById('msg-vis-user').value) || 10;
  saveMsgSettings(settings);
  notifyMsgSettingsChanged();
}

function toggleMsgPromptSetting() {
  var settings = getMsgSettings();
  settings.enableCustomPrompt = !settings.enableCustomPrompt;
  saveMsgSettings(settings);
  var toggle = document.getElementById('msg-toggle-prompt');
  toggle.classList.toggle('on', settings.enableCustomPrompt);
  var section = document.getElementById('msg-prompt-section');
  section.style.display = settings.enableCustomPrompt ? '' : 'none';
  if (settings.enableCustomPrompt && !settings.customPrompt) {
    document.getElementById('msg-prompt-textarea').value = DEFAULT_MSG_PROMPT;
  }
}

function saveMsgPromptText() {
  var settings = getMsgSettings();
  settings.customPrompt = document.getElementById('msg-prompt-textarea').value;
  saveMsgSettings(settings);
  notifyMsgSettingsChanged();
  showMsgToast('提示词已保存');
}

function resetMsgPrompt() {
  document.getElementById('msg-prompt-textarea').value = DEFAULT_MSG_PROMPT;
  var settings = getMsgSettings();
  settings.customPrompt = '';
  saveMsgSettings(settings);
  notifyMsgSettingsChanged();
  showMsgToast('已重置为默认');
}
</script>

<script>
// ========== TIMELINE (时光轴) ==========
var TL_CATEGORIES = [
  { id: 'milestone', label: '里程碑', color: '#e11d48' },
  { id: 'moment', label: '小确幸', color: '#2563eb' },
  { id: 'growth', label: '成长', color: '#059669' },
  { id: 'memory', label: '回忆', color: '#d97706' },
  { id: 'wish', label: '心愿', color: '#db2777' }
];
var tlFabOpen = false;
var aiWritingTl = false;
var currentViewingTlId = null;
var editingTlCategory = 'moment';

function getCustomTlCategories() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleCustomTlCats_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveCustomTlCategories(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleCustomTlCats_' + currentCharId, JSON.stringify(list));
}
function getAllTlCategories() {
  return TL_CATEGORIES.concat(getCustomTlCategories());
}
function getTlCategoryInfo(catId) {
  var all = getAllTlCategories();
  return all.find(function(c) { return c.id === catId; }) || { id: 'moment', label: '小确幸', color: '#2563eb' };
}

function getTlItems() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleTimeline_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveTlItems(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleTimeline_' + currentCharId, JSON.stringify(list));
}
function getTlSettings() {
  if (!currentCharId) return {};
  try { return JSON.parse(localStorage.getItem('coupleTimelineSettings_' + currentCharId)) || {}; }
  catch(e) { return {}; }
}
function saveTlSettings(s) {
  if (!currentCharId) return;
  localStorage.setItem('coupleTimelineSettings_' + currentCharId, JSON.stringify(s));
}
function notifyTlChanged() {
  window.parent.postMessage({ type: 'coupleSpaceTimelineChanged', charId: currentCharId, items: getTlItems() }, '*');
}
function notifyTlSettingsChanged() {
  window.parent.postMessage({ type: 'coupleSpaceTimelineSettingsChanged', charId: currentCharId, settings: getTlSettings() }, '*');
}

function renderTlList() {
  var container = document.getElementById('tl-list-container');
  if (!container) return;
  var items = getTlItems();
  items.sort(function(a, b) { return b.createdAt - a.createdAt; });

  if (items.length === 0 && !aiWritingTl) {
    container.innerHTML = '<div class="tl-empty" style="padding-left:0">' +
      '<svg class="tl-empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' +
      '<span class="tl-empty-text">时光轴还是空的，记录第一个瞬间吧</span></div>';
    return;
  }

  var html = '';
  if (aiWritingTl) {
    html += '<div class="tl-node"><div class="tl-dot char"><div class="tl-dot-inner"></div></div>' +
      '<div class="tl-ai-writing"><div class="diary-ai-dots"><span></span><span></span><span></span></div>' + escHtml(csCharName) + ' 正在记录...</div></div>';
  }

  var lastDateStr = '';
  items.forEach(function(item) {
    var d = new Date(item.createdAt);
    var dateStr = d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
    if (dateStr !== lastDateStr) {
      html += '<div class="tl-date-header">' + dateStr + '</div>';
      lastDateStr = dateStr;
    }
    var isChar = item.author === 'char';
    var avatar = isChar ? csCharAvatar : csUserAvatar;
    var name = isChar ? csCharName : csUserName;
    var heartCount = 0;
    if (item.hearts) { if (item.hearts.user) heartCount++; if (item.hearts.char) heartCount++; }
    var cat = getTlCategoryInfo(item.category);

    html += '<div class="tl-node"><div class="tl-dot' + (isChar ? ' char' : '') + '"><div class="tl-dot-inner"></div></div>' +
      '<div class="tl-card" onclick="openTlDetail(\'' + item.id + '\')">' +
        '<div class="tl-card-top">' +
          '<div class="tl-card-avatar" style="background-image:url(' + escAttr(avatar) + ')"></div>' +
          '<span class="tl-card-name">' + escHtml(name) + '</span>' +
          '<span class="tl-card-date">' + fmtRelativeDate(item.createdAt) + '</span>' +
        '</div>' +
        '<div class="tl-card-title">' + escHtml(item.title) + '</div>' +
        '<div class="tl-card-content">' + escHtml(item.content) + '</div>' +
        '<div class="tl-card-footer">' +
          '<span class="tl-card-tag" style="background:' + (cat.color || '#78716c') + '15;color:' + (cat.color || '#78716c') + '">' + cat.label + '</span>' +
