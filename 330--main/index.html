  }

  html += '</div>' +
    '<div style="padding-top:16px;margin-top:12px;border-top:1px solid #f0efed">' +
      '<button style="width:100%;padding:12px 0;border-radius:1rem;font-size:14px;font-weight:500;background:#1c1917;color:white" onclick="addGardenSpecialDate()">添加特殊日期</button>' +
    '</div>' +
  '</div>';

  overlay.innerHTML = html;
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  document.getElementById('app').appendChild(overlay);
}

function addGardenSpecialDate() {
  var sdOverlay = document.getElementById('garden-sd-overlay');
  if (sdOverlay) sdOverlay.remove();

  var overlay = document.createElement('div');
  overlay.className = 'diary-settings-overlay animate-fade-in';
  overlay.id = 'garden-sd-add-overlay';
  overlay.innerHTML = '<div class="diary-settings-sheet animate-slide-up">' +
    '<div class="diary-settings-handle"></div>' +
    '<div class="diary-settings-title">添加特殊日期</div>' +
    '<div class="cl-write-section-label">日期名称</div>' +
    '<input class="cl-write-title-input" id="sd-add-name" type="text" placeholder="例如: 我们的猫生日" maxlength="20" style="margin-bottom:12px" />' +
    '<div class="cl-write-section-label">日期 (月-日)</div>' +
    '<div style="display:flex;gap:8px;margin-bottom:12px">' +
      '<select class="diary-time-select" id="sd-add-month" style="flex:1">' +
        '<option value="">月</option>' +
        '<option value="01">1月</option><option value="02">2月</option><option value="03">3月</option>' +
        '<option value="04">4月</option><option value="05">5月</option><option value="06">6月</option>' +
        '<option value="07">7月</option><option value="08">8月</option><option value="09">9月</option>' +
        '<option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>' +
      '</select>' +
      '<select class="diary-time-select" id="sd-add-day" style="flex:1">' +
        '<option value="">日</option>' +
      '</select>' +
    '</div>' +
    '<div class="cl-write-section-label">奖励金额 (元)</div>' +
    '<input class="cl-write-title-input" id="sd-add-coins" type="number" placeholder="例如: 520" min="0.01" step="0.01" style="margin-bottom:16px" />' +
    '<button style="width:100%;padding:12px 0;border-radius:1rem;font-size:14px;font-weight:500;background:#1c1917;color:white" onclick="confirmAddSpecialDate()">确定</button>' +
  '</div>';
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  document.getElementById('app').appendChild(overlay);

  // Populate days
  var monthSel = document.getElementById('sd-add-month');
  var daySel = document.getElementById('sd-add-day');
  function updateDays() {
    var m = parseInt(monthSel.value) || 1;
    var maxDay = new Date(2024, m, 0).getDate();
    daySel.innerHTML = '<option value="">日</option>';
    for (var i = 1; i <= maxDay; i++) {
      daySel.innerHTML += '<option value="' + String(i).padStart(2, '0') + '">' + i + '日</option>';
    }
  }
  monthSel.addEventListener('change', updateDays);
  updateDays();
}

function confirmAddSpecialDate() {
  var name = (document.getElementById('sd-add-name').value || '').trim();
  var month = document.getElementById('sd-add-month').value;
  var day = document.getElementById('sd-add-day').value;
  var coins = parseFloat(document.getElementById('sd-add-coins').value);
  if (!name) { showGardenToast('请输入日期名称'); return; }
  if (!month || !day) { showGardenToast('请选择日期'); return; }
  if (isNaN(coins) || coins <= 0) { showGardenToast('请输入有效金额'); return; }

  var gd = getGardenData();
  if (!gd.specialDates) gd.specialDates = [];
  gd.specialDates.push({
    id: 'sd_' + Date.now(),
    name: name,
    date: month + '-' + day,
    coins: coins,
    author: 'user',
    createdAt: Date.now()
  });
  saveGardenData(gd);
  notifyGardenChanged();

  var overlay = document.getElementById('garden-sd-add-overlay');
  if (overlay) overlay.remove();
  openGardenSpecialDates();
  showGardenToast('特殊日期已添加');
}

function deleteGardenSpecialDate(idx) {
  if (!confirm('确定删除这个特殊日期？')) return;
  var gd = getGardenData();
  if (gd.specialDates && gd.specialDates[idx]) {
    gd.specialDates.splice(idx, 1);
    saveGardenData(gd);
    notifyGardenChanged();
    var overlay = document.getElementById('garden-sd-overlay');
    if (overlay) overlay.remove();
    openGardenSpecialDates();
  }
}

// --- Garden message listener ---
window.addEventListener('message', function(e) {
  // AI water result
  if (e.data && e.data.type === 'coupleSpaceGardenAiResult') {
    aiWritingGarden = false;
    if (e.data.error) {
      renderGardenPage();
      showGardenToast('浇水失败，请检查API设置');
      return;
    }
    var reward = calculateWaterReward('char');
    var gd = getGardenData();
    var newWater = {
      id: 'water_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      content: e.data.content,
      author: 'char',
      createdAt: Date.now(),
      coinsEarned: reward.amount,
      specialDate: reward.special ? { name: reward.special.name, coins: reward.special.coins } : null,
      hearts: { char: true },
      comments: []
    };
    gd.waterLogs.push(newWater);
    gd.totalCoins = (gd.totalCoins || 0) + reward.amount;
    saveGardenData(gd);
    notifyGardenChanged();
    renderGardenPage();
    showGardenToast((csCharName || 'TA') + '浇水了 +' + reward.amount.toFixed(2) + '元');

    // Send reward to char wallet
    window.parent.postMessage({
      type: 'coupleSpaceGardenWaterReward',
      charId: currentCharId,
      author: 'char',
      amount: reward.amount,
      description: reward.special ? ('情侣树浇水-' + reward.special.name) : '情侣树浇水奖励'
    }, '*');

    // Check streak rewards
    var streakRewards = checkStreakReward();
    streakRewards.forEach(function(sr) {
      gd = getGardenData();
      gd.totalCoins = (gd.totalCoins || 0) + sr.coins;
      saveGardenData(gd);
      window.parent.postMessage({
        type: 'coupleSpaceGardenWaterReward',
        charId: currentCharId,
        author: 'user',
        amount: sr.coins,
        description: '情侣树连续共同浇水' + sr.label + '奖励'
      }, '*');
      window.parent.postMessage({
        type: 'coupleSpaceGardenWaterReward',
        charId: currentCharId,
        author: 'char',
        amount: sr.coins,
        description: '情侣树连续共同浇水' + sr.label + '奖励'
      }, '*');
    });
    if (streakRewards.length > 0) {
      renderGardenPage();
      var totalStreakReward = streakRewards.reduce(function(s, r) { return s + r.coins; }, 0);
      setTimeout(function() {
        showGardenToast('连续共同浇水奖励 +' + totalStreakReward.toFixed(2) + '元');
      }, 1500);
    }
  }

  // Comment result
  if (e.data && e.data.type === 'coupleSpaceGardenCommentResult') {
    if (e.data.error || !e.data.reply) return;
    var gd = getGardenData();
    var w = gd.waterLogs.find(function(x) { return x.id === e.data.waterId; });
    if (w) {
      if (!w.comments) w.comments = [];
      w.comments.push({ author: 'char', content: e.data.reply, createdAt: Date.now() });
      saveGardenData(gd);
      notifyGardenChanged();
      if (currentViewingWaterId === e.data.waterId) openGardenDetail(e.data.waterId);
      else renderGardenPage();
      showGardenToast((csCharName || 'TA') + '评论了');
    }
  }

  // Heart result
  if (e.data && e.data.type === 'coupleSpaceGardenHeartResult') {
    if (!e.data.liked) return;
    var gd = getGardenData();
    var w = gd.waterLogs.find(function(x) { return x.id === e.data.waterId; });
    if (w) {
      if (!w.hearts) w.hearts = {};
      w.hearts.char = true;
      saveGardenData(gd);
      notifyGardenChanged();
      if (currentViewingWaterId === e.data.waterId) openGardenDetail(e.data.waterId);
      else renderGardenPage();
      showGardenToast((csCharName || 'TA') + '也点了爱心');
    }
  }

  // Auto garden result
  if (e.data && e.data.type === 'coupleSpaceGardenAutoResult') {
    var gd = getGardenData();
    if (e.data.item && !gd.waterLogs.find(function(w) { return w.id === e.data.item.id; })) {
      var reward = calculateWaterReward('char');
      e.data.item.coinsEarned = reward.amount;
      e.data.item.specialDate = reward.special ? { name: reward.special.name, coins: reward.special.coins } : null;
      gd.waterLogs.push(e.data.item);
      gd.totalCoins = (gd.totalCoins || 0) + reward.amount;
      saveGardenData(gd);
      notifyGardenChanged();
      renderGardenPage();
      showGardenToast((csCharName || 'TA') + '自动浇水了 +' + reward.amount.toFixed(2) + '元');

      window.parent.postMessage({
        type: 'coupleSpaceGardenWaterReward',
        charId: currentCharId,
        author: 'char',
        amount: reward.amount,
        description: reward.special ? ('情侣树浇水-' + reward.special.name) : '情侣树自动浇水奖励'
      }, '*');
    }
  }
});
</script>

<script>
// ========== LOCATION SYSTEM ==========
var locFabOpen = false;
var aiWritingLoc = false;
var currentViewingLocId = null;
var editingLocTarget = null; // 'user' or 'char'

var LOC_CATEGORIES = [
  { id: 'date', label: '约会地' },
  { id: 'food', label: '美食地' },
  { id: 'travel', label: '旅行地' },
  { id: 'daily', label: '日常地' },
  { id: 'memory', label: '回忆地' },
  { id: 'wish', label: '想去' }
];

var SVG_MAP_PIN = '<svg style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>';
var SVG_NAV = '<svg style="width:20px;height:20px;color:#a8a29e" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>';

function getLocSettings() {
  try { return JSON.parse(localStorage.getItem('coupleLocSettings_' + currentCharId) || '{}'); } catch(e) { return {}; }
}
function saveLocSettings(s) {
  localStorage.setItem('coupleLocSettings_' + currentCharId, JSON.stringify(s));
  window.parent.postMessage({ type: 'coupleSpaceLocationSettingsChanged', charId: currentCharId, settings: s }, '*');
}
function getLocItems() {
  try { return JSON.parse(localStorage.getItem('coupleLocations_' + currentCharId) || '[]'); } catch(e) { return []; }
}
function saveLocItems(items) {
  localStorage.setItem('coupleLocations_' + currentCharId, JSON.stringify(items));
  window.parent.postMessage({ type: 'coupleSpaceLocationChanged', charId: currentCharId, items: items }, '*');
}

function haversineKm(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function calcLocDistance() {
  var s = getLocSettings();
  if (s.userLat != null && s.userLng != null && s.charLat != null && s.charLng != null) {
    var d = haversineKm(s.userLat, s.userLng, s.charLat, s.charLng);
    if (d < 1) return (d * 1000).toFixed(0) + ' m';
    if (d < 100) return d.toFixed(1) + ' km';
    return Math.round(d) + ' km';
  }
  return null;
}

function updateHomeDistance() {
  var el = document.getElementById('home-distance-text');
  if (!el) return;
  var ov = getCustomOverrides();
  if (ov.distance !== undefined && ov.distance !== '') {
    el.textContent = '\u76F8\u8DDD ' + ov.distance + ' km';
    return;
  }
  var dist = calcLocDistance();
  if (dist) el.textContent = '\u76F8\u8DDD ' + dist;
  else el.textContent = '\u76F8\u8DDD -- km';
}

function renderLocPage() {
  var root = document.getElementById('loc-page-root');
  if (!root) return;
  var s = getLocSettings();
  var items = getLocItems();
  var dist = calcLocDistance();
  var userName = csUserName || '我';
  var charName = csCharName || 'TA';
  var userAddr = s.userAddress || '';
  var charAddr = s.charAddress || '';

  var html = '';
  // Map area
  html += '<div class="loc-map-area">';
  html += '<div class="loc-map-dots"></div>';
  // User pin
  html += '<div class="loc-pin" style="top:30%;left:28%;transform:translate(-50%,-50%)" onclick="openLocEdit(\'user\')">';
  html += '<div class="loc-pin-label">' + escHtml(userName) + '</div>';
  html += '<div class="loc-pin-dot user"><div class="loc-pin-ping"></div></div>';
  if (userAddr) html += '<div class="loc-pin-addr">' + escHtml(userAddr) + '</div>';
  html += '</div>';
  // Char pin
  html += '<div class="loc-pin" style="bottom:25%;right:22%;transform:translate(50%,50%)" onclick="openLocEdit(\'char\')">';
  html += '<div class="loc-pin-label">' + escHtml(charName) + '</div>';
  html += '<div class="loc-pin-dot char"></div>';
  if (charAddr) html += '<div class="loc-pin-addr">' + escHtml(charAddr) + '</div>';
  html += '</div>';
  html += '</div>';

  // Distance card
  html += '<div class="loc-distance-card">';
  html += '<div><div class="loc-distance-label">DISTANCE</div>';
  html += '<div class="loc-distance-value">' + (dist ? '\u76F8\u8DDD ' + dist : '\u70B9\u51FB\u5B9A\u4F4D\u70B9\u8BBE\u7F6E\u5730\u5740') + '</div></div>';
  html += '<div class="loc-nav-circle">' + SVG_NAV + '</div>';
  html += '</div>';

  // Records section
  html += '<div class="loc-section-title">\u5B9A\u4F4D\u8BB0\u5F55</div>';
  html += '<div style="flex:1;overflow-y:auto;padding-bottom:80px" id="loc-records-scroll">';
  if (aiWritingLoc) {
    html += '<div class="loc-ai-writing"><svg class="animate-pulse-heart" style="width:16px;height:16px;color:#fb7185" fill="currentColor" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' + escHtml(charName) + ' \u6B63\u5728\u5206\u4EAB\u5730\u70B9...</div>';
  }
  if (items.length === 0 && !aiWritingLoc) {
    html += '<div class="loc-empty"><svg class="loc-empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><div class="loc-empty-text">\u8FD8\u6CA1\u6709\u5B9A\u4F4D\u8BB0\u5F55</div></div>';
  } else {
    var sorted = items.slice().sort(function(a, b) { return b.createdAt - a.createdAt; });
    sorted.forEach(function(item) {
      var isChar = item.author === 'char';
      var avatar = isChar ? (csCharAvatar || '') : (csUserAvatar || '');
      var name = isChar ? charName : userName;
      var dateStr = new Date(item.createdAt).toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
      var cat = LOC_CATEGORIES.find(function(c) { return c.id === item.category; });
      var heartActive = item.hearts && item.hearts.user;
      var heartCount = 0;
      if (item.hearts) { if (item.hearts.user) heartCount++; if (item.hearts.char) heartCount++; }
      var commentCount = (item.comments || []).length;

      html += '<div class="loc-record-card" onclick="openLocDetail(\'' + item.id + '\')">';
      html += '<div class="loc-record-top">';
      html += '<div class="loc-record-avatar" style="background-image:url(' + escHtml(avatar) + ')"></div>';
      html += '<div class="loc-record-name">' + escHtml(name) + '</div>';
      html += '<div class="loc-record-date">' + dateStr + '</div>';
      html += '</div>';
      html += '<div class="loc-record-place">' + SVG_MAP_PIN + escHtml(item.name || '') + '</div>';
      if (item.address) html += '<div class="loc-record-addr">' + escHtml(item.address) + '</div>';
      if (item.description) html += '<div class="loc-record-desc">' + escHtml(item.description) + '</div>';
      html += '<div class="loc-record-footer">';
      if (cat) html += '<span class="loc-record-tag ' + cat.id + '">' + cat.label + '</span>';
      if (commentCount > 0) html += '<span style="font-size:11px;color:#a8a29e">' + commentCount + '\u6761\u8BC4\u8BBA</span>';
      html += '<div class="loc-record-heart' + (heartActive ? ' active' : '') + '" onclick="event.stopPropagation();toggleLocHeart(\'' + item.id + '\')">';
      html += '<svg style="width:14px;height:14px" fill="' + (heartActive ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
      if (heartCount > 0) html += ' ' + heartCount;
      html += '</div></div></div>';
    });
  }
  html += '</div>';

  // FAB
  html += '<div class="album-fab-menu" id="loc-fab-menu" style="display:none">';
  html += '<div class="album-fab-option" onclick="openLocWrite()"><svg style="width:18px;height:18px" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>\u624B\u52A8\u6DFB\u52A0</div>';
  html += '<div class="album-fab-option" onclick="requestLocAi()"><svg style="width:18px;height:18px" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>AI\u751F\u6210</div>';
  html += '</div>';
  html += '<button class="fc-fab" id="loc-fab-btn" onclick="toggleLocFab()">' + SVG_PLUS + '</button>';

  root.innerHTML = html;
  updateHomeDistance();
}

function toggleLocFab() {
  locFabOpen = !locFabOpen;
  var menu = document.getElementById('loc-fab-menu');
  if (menu) menu.style.display = locFabOpen ? '' : 'none';
}

function toggleLocHeart(id) {
  var items = getLocItems();
  var item = items.find(function(i) { return i.id === id; });
  if (!item) return;
  if (!item.hearts) item.hearts = {};
  item.hearts.user = !item.hearts.user;
  saveLocItems(items);
  renderLocPage();
  // Ask char to heart back
  if (item.hearts.user && !item.hearts.char) {
    window.parent.postMessage({
      type: 'coupleSpaceLocationHeartRequest',
      charId: currentCharId,
      locationId: id,
      locationName: item.name,
      locationDesc: item.description,
      author: item.author
    }, '*');
  }
}

function requestLocAi() {
  if (aiWritingLoc) return;
  aiWritingLoc = true;
  locFabOpen = false;
  renderLocPage();
  var items = getLocItems();
  var s = getLocSettings();
  window.parent.postMessage({
    type: 'coupleSpaceLocationAiRequest',
    charId: currentCharId,
    existingLocations: items,
    locationSettings: s
  }, '*');
}

// --- Location edit overlay (set user/char address) ---
function openLocEdit(target) {
  editingLocTarget = target;
  var s = getLocSettings();
  var isUser = target === 'user';
  var title = isUser ? '\u8BBE\u7F6E\u6211\u7684\u4F4D\u7F6E' : '\u8BBE\u7F6E' + (csCharName || 'TA') + '\u7684\u4F4D\u7F6E';
  var addr = isUser ? (s.userAddress || '') : (s.charAddress || '');
  var lat = isUser ? (s.userLat || '') : (s.charLat || '');
  var lng = isUser ? (s.userLng || '') : (s.charLng || '');
  var provider = s.geocodeProvider || 'nominatim';

  var overlay = document.createElement('div');
  overlay.className = 'loc-edit-overlay animate-fade-in';
  overlay.id = 'loc-edit-overlay';

  var html = '<div class="loc-edit-sheet animate-slide-up">';
  html += '<div class="loc-edit-handle"></div>';
  html += '<div class="loc-edit-title">' + escHtml(title) + '</div>';

  // Provider selection
  html += '<div class="loc-edit-label">\u5730\u7406\u7F16\u7801\u670D\u52A1</div>';

  html += '<div class="loc-provider-chip' + (provider === 'amap' ? ' active' : '') + '" onclick="switchLocProvider(\'amap\')">\u9AD8\u5FB7\u5730\u56FE</div>';
  html += '<div class="loc-provider-chip' + (provider === 'manual' ? ' active' : '') + '" onclick="switchLocProvider(\'manual\')">\u624B\u52A8\u8F93\u5165</div>';
  html += '</div>';

  // Amap key (shown only if amap)
  html += '<div class="loc-edit-row" id="loc-amap-key-row" style="' + (provider === 'amap' ? '' : 'display:none') + '">';
  html += '<div class="loc-edit-label">\u9AD8\u5FB7 Key</div>';
  html += '<input class="loc-edit-input" id="loc-amap-key" placeholder="\u8F93\u5165\u9AD8\u5FB7\u5730\u56FE Web\u670D\u52A1 Key" value="' + escHtml(s.amapKey || '') + '" />';
  html += '</div>';

  // Address input
  html += '<div class="loc-edit-row">';
  html += '<div class="loc-edit-label">\u5730\u5740</div>';
  html += '<input class="loc-edit-input" id="loc-edit-addr" placeholder="\u4F8B\u5982: \u4E0A\u6D77\u5E02\u9759\u5B89\u533A\u5357\u4EAC\u897F\u8DEF" value="' + escHtml(addr) + '" />';
  html += '</div>';

  // Manual lat/lng (shown only if manual)
  html += '<div id="loc-manual-coords" style="' + (provider === 'manual' ? '' : 'display:none') + '">';
  html += '<div class="loc-edit-row" style="display:flex;gap:8px">';
  html += '<div style="flex:1"><div class="loc-edit-label">\u7EAC\u5EA6</div><input class="loc-edit-input" id="loc-edit-lat" placeholder="31.2304" value="' + lat + '" /></div>';
  html += '<div style="flex:1"><div class="loc-edit-label">\u7ECF\u5EA6</div><input class="loc-edit-input" id="loc-edit-lng" placeholder="121.4737" value="' + lng + '" /></div>';
  html += '</div></div>';

  // Browser geolocation button (only for user)
  if (isUser) {
    html += '<button class="loc-edit-btn secondary" onclick="browserGeolocate()">';
    html += '<svg style="width:16px;height:16px;vertical-align:middle;margin-right:6px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>';
    html += '\u4E00\u952E\u5B9A\u4F4D\uFF08\u6D4F\u89C8\u5668\uFF09</button>';
  }

  // Search button
  html += '<button class="loc-edit-btn" onclick="geocodeLocAddress()">\u641C\u7D22\u5730\u5740</button>';

  // Result / error
  html += '<div class="loc-edit-result" id="loc-edit-result"></div>';
  html += '<div class="loc-edit-error" id="loc-edit-error"></div>';

  // Save button
  html += '<button class="loc-edit-btn" style="margin-top:16px" onclick="saveLocPosition()">\u4FDD\u5B58\u4F4D\u7F6E</button>';
  html += '</div>';

  overlay.innerHTML = html;
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeLocEdit(); });
  document.getElementById('app').appendChild(overlay);
}

function closeLocEdit() {
  var el = document.getElementById('loc-edit-overlay');
  if (el) el.remove();
  editingLocTarget = null;
}

function switchLocProvider(p) {
  var s = getLocSettings();
  s.geocodeProvider = p;
  saveLocSettings(s);
  document.querySelectorAll('.loc-provider-chip').forEach(function(c) { c.classList.remove('active'); });
  event.target.classList.add('active');
  var amapRow = document.getElementById('loc-amap-key-row');
  var manualRow = document.getElementById('loc-manual-coords');
  if (amapRow) amapRow.style.display = p === 'amap' ? '' : 'none';
  if (manualRow) manualRow.style.display = p === 'manual' ? '' : 'none';
}

function browserGeolocate() {
  if (!navigator.geolocation) {
    showLocEditError('\u6D4F\u89C8\u5668\u4E0D\u652F\u6301\u5B9A\u4F4D');
    return;
  }
  showLocEditResult('\u6B63\u5728\u83B7\u53D6\u4F4D\u7F6E...');
  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat = pos.coords.latitude;
    var lng = pos.coords.longitude;
    var addrInput = document.getElementById('loc-edit-addr');
    var latInput = document.getElementById('loc-edit-lat');
    var lngInput = document.getElementById('loc-edit-lng');
    if (latInput) latInput.value = lat.toFixed(6);
    if (lngInput) lngInput.value = lng.toFixed(6);
    showLocEditResult('\u5B9A\u4F4D\u6210\u529F: ' + lat.toFixed(4) + ', ' + lng.toFixed(4));
    // Reverse geocode to get address
    reverseGeocode(lat, lng, function(addr) {
      if (addr && addrInput) addrInput.value = addr;
    });
  }, function(err) {
    showLocEditError('\u5B9A\u4F4D\u5931\u8D25: ' + err.message);
  }, { enableHighAccuracy: true, timeout: 10000 });
}

function reverseGeocode(lat, lng, cb) {
  var s = getLocSettings();
  var provider = s.geocodeProvider || 'nominatim';
  if (provider === 'amap' && s.amapKey) {
    fetch('https://restapi.amap.com/v3/geocode/regeo?location=' + lng + ',' + lat + '&key=' + encodeURIComponent(s.amapKey))
      .then(function(r) { return r.json(); })
      .then(function(d) { cb(d.regeocode && d.regeocode.formatted_address ? d.regeocode.formatted_address : null); })
      .catch(function() { cb(null); });
  } else {
    fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lng + '&format=json&accept-language=zh', {
      headers: { 'User-Agent': 'CoupleSpaceApp/1.0' }
    })
      .then(function(r) { return r.json(); })
      .then(function(d) { cb(d.display_name || null); })
      .catch(function() { cb(null); });
  }
}

function geocodeLocAddress() {
  var addr = (document.getElementById('loc-edit-addr').value || '').trim();
  if (!addr) { showLocEditError('\u8BF7\u8F93\u5165\u5730\u5740'); return; }
  var s = getLocSettings();
  var provider = s.geocodeProvider || 'nominatim';

  showLocEditResult('\u6B63\u5728\u641C\u7D22...');
  hideLocEditError();

  if (provider === 'manual') {
    showLocEditResult('\u624B\u52A8\u6A21\u5F0F\u8BF7\u76F4\u63A5\u586B\u5199\u7ECF\u7EAC\u5EA6');
    return;
  }

  if (provider === 'amap') {
    var key = (document.getElementById('loc-amap-key') || {}).value || s.amapKey || '';
    if (!key) { showLocEditError('\u8BF7\u586B\u5199\u9AD8\u5FB7 Key'); return; }
    s.amapKey = key; saveLocSettings(s);
    fetch('https://restapi.amap.com/v3/geocode/geo?address=' + encodeURIComponent(addr) + '&key=' + encodeURIComponent(key))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.geocodes && d.geocodes.length > 0) {
          var loc = d.geocodes[0].location.split(',');
          var lng = parseFloat(loc[0]), lat = parseFloat(loc[1]);
          showLocEditResult('\u627E\u5230: ' + (d.geocodes[0].formatted_address || addr) + ' (' + lat.toFixed(4) + ', ' + lng.toFixed(4) + ')');
          var latI = document.getElementById('loc-edit-lat'); if (latI) latI.value = lat.toFixed(6);
          var lngI = document.getElementById('loc-edit-lng'); if (lngI) lngI.value = lng.toFixed(6);
        } else { showLocEditError('\u672A\u627E\u5230\u8BE5\u5730\u5740'); }
      }).catch(function(e) { showLocEditError('\u641C\u7D22\u5931\u8D25: ' + e.message); });
    return;
  }

  // Nominatim (default)
  fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(addr) + '&format=json&limit=1&accept-language=zh', {
    headers: { 'User-Agent': 'CoupleSpaceApp/1.0' }
  })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d && d.length > 0) {
        var lat = parseFloat(d[0].lat), lng = parseFloat(d[0].lon);
        showLocEditResult('\u627E\u5230: ' + (d[0].display_name || addr).substring(0, 60) + ' (' + lat.toFixed(4) + ', ' + lng.toFixed(4) + ')');
        var latI = document.getElementById('loc-edit-lat'); if (latI) latI.value = lat.toFixed(6);
        var lngI = document.getElementById('loc-edit-lng'); if (lngI) lngI.value = lng.toFixed(6);
      } else { showLocEditError('\u672A\u627E\u5230\u8BE5\u5730\u5740'); }
    }).catch(function(e) { showLocEditError('\u641C\u7D22\u5931\u8D25: ' + e.message); });
}

function saveLocPosition() {
  var s = getLocSettings();
  var provider = s.geocodeProvider || 'nominatim';
  var addr = (document.getElementById('loc-edit-addr').value || '').trim();
  var lat = null, lng = null;

  if (provider === 'manual') {
    var latV = document.getElementById('loc-edit-lat'); if (latV) lat = parseFloat(latV.value);
    var lngV = document.getElementById('loc-edit-lng'); if (lngV) lng = parseFloat(lngV.value);
  } else {
    var latI = document.getElementById('loc-edit-lat'); if (latI && latI.value) lat = parseFloat(latI.value);
    var lngI = document.getElementById('loc-edit-lng'); if (lngI && lngI.value) lng = parseFloat(lngI.value);
  }

  if (editingLocTarget === 'user') {
    s.userAddress = addr;
    if (lat && !isNaN(lat)) s.userLat = lat;
    if (lng && !isNaN(lng)) s.userLng = lng;
  } else {
    s.charAddress = addr;
    if (lat && !isNaN(lat)) s.charLat = lat;
    if (lng && !isNaN(lng)) s.charLng = lng;
  }
  saveLocSettings(s);
  closeLocEdit();
  renderLocPage();
  updateHomeDistance();
}

function showLocEditResult(msg) {

function hideLocEditResult() { var el = document.getElementById('loc-edit-result'); if (el) el.style.display = 'none'; }
function showLocEditError(msg) {

}
function hideLocEditError() { var el = document.getElementById('loc-edit-error'); if (el) el.style.display = 'none'; }

    }

function closeLocWrite() {
  document.getElementById('loc-write-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
}
function renderLocCatRow() {
  var row = document.getElementById('loc-write-cat-row');
  if (!row) return;
  row.innerHTML = LOC_CATEGORIES.map(function(c) {
    return '<div class="loc-write-chip' + (locWriteCat === c.id ? ' active' : '') + '" onclick="locWriteCat=\'' + c.id + '\';renderLocCatRow()">' + c.label + '</div>';
  }).join('');

function saveLocItem() {
  var name = (document.getElementById('loc-write-name').value || '').trim();
  if (!name) return;
  var addr = (document.getElementById('loc-write-addr').value || '').trim();
  var desc = (document.getElementById('loc-write-desc').value || '').trim();
  var items = getLocItems();
  if (editingLocId) {
    var idx = items.findIndex(function(x){ return x.id === editingLocId; });
    if (idx >= 0) {
      items[idx].name = name;
      items[idx].address = addr;
      items[idx].description = desc;
      items[idx].category = locWriteCat;
    }
    saveLocItems(items);
    closeLocWrite();
    renderLocPage();
    editingLocId = null;
  } else {
    items.push({
      id: 'loc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      name: name, address: addr, description: desc,
      category: locWriteCat, lat: null, lng: null,
      author: 'user', createdAt: Date.now(),
      hearts: { user: true }, comments: []
    });
    saveLocItems(items);
    closeLocWrite();
    renderLocPage();
  }
}
function editCurrentLoc() {
  if (!currentViewingLocId) return;
  var items = getLocItems();
  var item = items.find(function(x){ return x.id === currentViewingLocId; });
  if (!item || item.author !== 'user') return;
  var idToEdit = currentViewingLocId;
  closeLocDetail();
  openLocWrite(idToEdit);
}

function openLocDetail(id) {
  currentViewingLocId = id;
  var items = getLocItems();
  var item = items.find(function(i) { return i.id === id; });
  if (!item) return;
  var isChar = item.author === 'char';
  var avatar = isChar ? (csCharAvatar || '') : (csUserAvatar || '');
  var name = isChar ? (csCharName || 'TA') : (csUserName || '\u6211');
  var dateStr = new Date(item.createdAt).toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  var cat = LOC_CATEGORIES.find(function(c) { return c.id === item.category; });

  var html = '';
  html += '<div class="loc-detail-place">' + SVG_MAP_PIN + escHtml(item.name || '') + '</div>';
  if (item.address) html += '<div class="loc-detail-addr">' + escHtml(item.address) + '</div>';
  html += '<div class="loc-detail-author-row">';
  html += '<div class="loc-detail-avatar" style="background-image:url(' + escHtml(avatar) + ')"></div>';
  html += '<div><div class="loc-detail-author-name">' + escHtml(name) + '</div>';
  html += '<div class="loc-detail-date">' + dateStr + '</div></div></div>';
  if (item.description) html += '<div class="loc-detail-desc">' + escHtml(item.description) + '</div>';
  html += '<div class="loc-detail-tags">';
  if (cat) html += '<span class="loc-record-tag ' + cat.id + '">' + cat.label + '</span>';
  html += '</div>';

  // Hearts
  var uHeart = item.hearts && item.hearts.user;
  var cHeart = item.hearts && item.hearts.char;
  html += '<div class="loc-detail-hearts">';
  html += '<button class="loc-detail-heart-btn' + (uHeart ? ' active' : '') + '" onclick="toggleLocDetailHeart(\'user\')">';
  html += '<svg style="width:16px;height:16px" fill="' + (uHeart ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + escHtml(csUserName || '\u6211') + '</button>';
  html += '<button class="loc-detail-heart-btn' + (cHeart ? ' active' : '') + '" style="pointer-events:none">';
  html += '<svg style="width:16px;height:16px" fill="' + (cHeart ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + escHtml(csCharName || 'TA') + '</button>';
  html += '</div>';

  // Comments
  html += '<div class="loc-comments-section">';
  html += '<div class="loc-comments-title">\u8BC4\u8BBA</div>';
  var comments = item.comments || [];
  if (comments.length === 0) {
    html += '<div class="loc-comment-empty">\u8FD8\u6CA1\u6709\u8BC4\u8BBA</div>';
  } else {
    comments.forEach(function(c) {
      var cIsChar = c.author === 'char';
      var cAvatar = cIsChar ? (csCharAvatar || '') : (csUserAvatar || '');
      var cName = cIsChar ? (csCharName || 'TA') : (csUserName || '\u6211');
      var cTime = new Date(c.createdAt).toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      html += '<div class="loc-comment-item">';
      html += '<div class="loc-comment-avatar" style="background-image:url(' + escHtml(cAvatar) + ')"></div>';
      html += '<div class="loc-comment-body"><span class="loc-comment-name">' + escHtml(cName) + '</span><span class="loc-comment-time">' + cTime + '</span>';
      html += '<div class="loc-comment-text">' + escHtml(c.content) + '</div></div></div>';
    });
  }
  html += '</div>';

  document.getElementById('loc-detail-scroll').innerHTML = html;
  document.getElementById('loc-detail-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
  document.getElementById('loc-comment-input').value = '';
  updateLocCommentBtn();
}

function deleteLocFromDetail() {
  if (!currentViewingLocId) return;
  if (!confirm('\u786E\u5B9A\u5220\u9664\u8FD9\u6761\u5B9A\u4F4D\u8BB0\u5F55\uFF1F')) return;
  var items = getLocItems().filter(function(i) { return i.id !== currentViewingLocId; });
  saveLocItems(items);
  closeLocDetail();
}

function toggleLocDetailHeart(who) {
  if (!currentViewingLocId) return;
  var items = getLocItems();
  var item = items.find(function(i) { return i.id === currentViewingLocId; });
  if (!item) return;
  if (!item.hearts) item.hearts = {};
  item.hearts[who] = !item.hearts[who];
  saveLocItems(items);
  openLocDetail(currentViewingLocId);
  if (who === 'user' && item.hearts.user && !item.hearts.char) {
    window.parent.postMessage({
      type: 'coupleSpaceLocationHeartRequest',
      charId: currentCharId,
      locationId: currentViewingLocId,
      locationName: item.name,
      locationDesc: item.description,
      author: item.author
    }, '*');
  }
}

function updateLocCommentBtn() {
  var input = document.getElementById('loc-comment-input');
  var btn = document.getElementById('loc-comment-send-btn');
  if (!input || !btn) return;
  var hasText = input.value.trim().length > 0;
  btn.style.opacity = hasText ? '1' : '0.4';
  btn.style.pointerEvents = hasText ? 'auto' : 'none';
}

function sendLocComment() {
  if (!currentViewingLocId) return;
  var input = document.getElementById('loc-comment-input');
  var text = (input.value || '').trim();
  if (!text) return;
  var items = getLocItems();
  var item = items.find(function(i) { return i.id === currentViewingLocId; });
  if (!item) return;
  if (!item.comments) item.comments = [];
  item.comments.push({ author: 'user', content: text, createdAt: Date.now() });
  saveLocItems(items);
  input.value = '';
  updateLocCommentBtn();
  openLocDetail(currentViewingLocId);
  // Ask AI to comment back
  window.parent.postMessage({
    type: 'coupleSpaceLocationCommentRequest',
    charId: currentCharId,
    locationId: currentViewingLocId,
    locationName: item.name,
    locationDesc: item.description,
    userComment: text,
    author: item.author
  }, '*');
}

function closeLocSettings() {
  var el = document.getElementById('loc-settings-overlay');
  if (el) el.remove();
}
function toggleLocSetting(key) {
  var s = getLocSettings();
  if (key === 'auto') { s.autoEnabled = !s.autoEnabled; document.getElementById('loc-toggle-auto').classList.toggle('on'); }
  if (key === 'decide') {
    s.aiDecide = !s.aiDecide;
    document.getElementById('loc-toggle-decide').classList.toggle('on');
    var probsDiv = document.getElementById('loc-ai-decide-probs');
    if (probsDiv) probsDiv.style.display = s.aiDecide ? '' : 'none';
  }
  saveLocSettings(s);
}
function updateLocAutoTime() {
  var s = getLocSettings();
  s.autoTime = document.getElementById('loc-auto-time').value;
  saveLocSettings(s);
}
function updateLocAiDecideProb() {
  var settings = getLocSettings();
  settings.aiDecideChatProb = parseInt(document.getElementById('loc-chat-prob').value) || 15;
  settings.aiDecideBgProb = parseInt(document.getElementById('loc-bg-prob').value) || 5;
  saveLocSettings(settings);
}
function updateLocVisibility() {
  var s = getLocSettings();
  s.visibleCharLocations = parseInt(document.getElementById('loc-vis-char').value) || 10;
  s.visibleUserLocations = parseInt(document.getElementById('loc-vis-user').value) || 10;
  saveLocSettings(s);
}
function toggleLocPromptSetting() {
  var s = getLocSettings();
  s.enableCustomPrompt = !s.enableCustomPrompt;
  saveLocSettings(s);
  document.getElementById('loc-toggle-prompt').classList.toggle('on');
  document.getElementById('loc-prompt-section').style.display = s.enableCustomPrompt ? '' : 'none';
}
function saveLocPromptText() {
  var s = getLocSettings();
  s.customPrompt = document.getElementById('loc-prompt-textarea').value;
  saveLocSettings(s);
}
function resetLocPrompt() {
  document.getElementById('loc-prompt-textarea').value = DEFAULT_LOC_PROMPT;
  var s = getLocSettings();
  s.customPrompt = DEFAULT_LOC_PROMPT;
  saveLocSettings(s);
}

// --- Location message handlers ---
window.addEventListener('message', function(e) {
  // AI location result
  if (e.data && e.data.type === 'coupleSpaceLocationAiResult') {
    aiWritingLoc = false;
    if (e.data.error) {
      renderLocPage();
      return;
    }
    var items = getLocItems();
    items.push({
      id: 'loc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      name: e.data.name || '',
      description: e.data.description || '',
      category: e.data.category || 'daily',
      address: e.data.address || '',
      lat: null, lng: null,
      author: 'char', createdAt: Date.now(),
      hearts: { char: true }, comments: []
    });
    saveLocItems(items);
    renderLocPage();
  }
  // AI comment result
  if (e.data && e.data.type === 'coupleSpaceLocationCommentResult') {
    if (e.data.error) return;
    var items = getLocItems();
    var item = items.find(function(i) { return i.id === e.data.locationId; });
    if (!item) return;
    if (!item.comments) item.comments = [];
    item.comments.push({ author: 'char', content: e.data.reply, createdAt: Date.now() });
    saveLocItems(items);
    if (currentViewingLocId === e.data.locationId) openLocDetail(e.data.locationId);
    else renderLocPage();
  }
  // AI heart result
  if (e.data && e.data.type === 'coupleSpaceLocationHeartResult') {
    if (!e.data.shouldHeart) return;
    var items = getLocItems();
    var item = items.find(function(i) { return i.id === e.data.locationId; });
    if (!item) return;
    if (!item.hearts) item.hearts = {};
    item.hearts.char = true;
    saveLocItems(items);
    if (currentViewingLocId === e.data.locationId) openLocDetail(e.data.locationId);
    else renderLocPage();
  }
  // Auto location result
  if (e.data && e.data.type === 'coupleSpaceLocationAutoResult') {
    var items = getLocItems();
    items.push(e.data.item);
    saveLocItems(items);
    renderLocPage();
  }

  // --- Sleep results from parent ---
  if (e.data && e.data.type === 'coupleSpaceSleepAiResult') {
    if (e.data.error) {
      showSleepToast('记录失败，请重试');
      aiWritingSleep = false;
      renderSleepList();
      return;
    }
    var phase = e.data.phase;
    var result = e.data.result;
    var sleeps = getSleeps();

    if (phase === 'sleep') {
      var newSleep = {
        id: 'sleep_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
        author: 'char',
        sleepAt: new Date().toISOString().split('T')[0] + 'T' + (result.sleepTime || '23:00') + ':00',
        wakeAt: null, duration: null,
        sleepNote: result.sleepNote,
        sleepMood: result.sleepMood,
        events: [], wakeNote: null, wakeMood: null, quality: null,
        status: 'sleeping',
        createdAt: Date.now(), completedAt: null,
        hearts: { char: true }, comments: []
      };
      sleeps.push(newSleep);
      saveSleeps(sleeps);
      aiWritingSleep = false;
      renderSleepList();
      showSleepToast((csCharName || 'TA') + '记录了入睡');
      notifySleepChanged();
    } else if (phase === 'events') {
      var s = sleeps.find(function(x) { return x.id === pendingSleepEventsId; });
      if (s && Array.isArray(result)) {
        result.forEach(function(evt) {
          s.events.push({
            id: 'evt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            time: new Date().toISOString(),
            type: evt.type || 'dream', content: evt.content || '', mood: evt.mood || ''
          });
        });
        saveSleeps(sleeps);
        notifySleepChanged();
        if (currentViewingSleepId === pendingSleepEventsId) openSleepDetail(pendingSleepEventsId);
        showSleepToast('生成了' + result.length + '个睡眠事件');
      }
      aiWritingSleep = false;
      pendingSleepEventsId = null;
      renderSleepList();
    } else if (phase === 'wake') {
      var s = sleeps.find(function(x) { return x.id === pendingSleepWakeId; });
      if (s) {
        s.wakeAt = new Date().toISOString().split('T')[0] + 'T' + (result.wakeTime || '07:00') + ':00';
        s.wakeNote = result.wakeNote;
        s.wakeMood = result.wakeMood;
        s.quality = result.quality;
        s.status = 'completed';
        s.completedAt = Date.now();
        try {
          var sleepMs = new Date(s.sleepAt).getTime();
          var wakeMs = new Date(s.wakeAt).getTime();
          if (wakeMs > sleepMs) s.duration = Math.round((wakeMs - sleepMs) / 60000);
        } catch(e2) {}
        saveSleeps(sleeps);
        notifySleepChanged();
        if (currentViewingSleepId === pendingSleepWakeId) openSleepDetail(pendingSleepWakeId);
        showSleepToast((csCharName || 'TA') + '起床了');
      }
      aiWritingSleep = false;
      pendingSleepWakeId = null;
      renderSleepList();
    }
  }

  if (e.data && e.data.type === 'coupleSpaceSleepCommentResult') {
    if (e.data.error) return;
    var sleeps = getSleeps();
    var s = sleeps.find(function(x) { return x.id === e.data.sleepId; });
    if (s) {
      if (!s.comments) s.comments = [];
      s.comments.push({ author: 'char', content: e.data.reply, timestamp: Date.now() });
      saveSleeps(sleeps);
      if (currentViewingSleepId === e.data.sleepId) openSleepDetail(e.data.sleepId);
      notifySleepChanged();
    }
  }

  if (e.data && e.data.type === 'coupleSpaceSleepHeartResult') {
    if (e.data.liked) {
      var sleeps = getSleeps();
      var s = sleeps.find(function(x) { return x.id === e.data.sleepId; });
      if (s) {
        if (!s.hearts) s.hearts = {};
        s.hearts.char = true;
        saveSleeps(sleeps);
        if (currentViewingSleepId === e.data.sleepId) openSleepDetail(e.data.sleepId);
        else renderSleepList();
        showSleepToast((csCharName || 'TA') + '也点了爱心');
        notifySleepChanged();
      }
    }
  }

  if (e.data && e.data.type === 'coupleSpaceSleepAutoResult') {
    var sleeps = getSleeps();
    if (e.data.item) {
      var existing = sleeps.find(function(x) { return x.id === e.data.item.id; });
      if (existing) {
        Object.assign(existing, e.data.item);
      } else {
        sleeps.push(e.data.item);
      }
      saveSleeps(sleeps);
      renderSleepList();
      var msg = e.data.phase === 'wake' ? '起床了' : '记录了入睡';
      showSleepToast((csCharName || 'TA') + msg);
    }
  }
});
</script>

// --- List ---
function renderSleepList() {
  var container = document.getElementById('sleep-list-container');
  if (!container) return;
  var sleeps = getSleeps();
  sleeps.sort(function(a, b) { return b.createdAt - a.createdAt; });

  if (sleeps.length === 0 && !aiWritingSleep) {
    container.innerHTML = '<div class="sleep-empty">' +
      '<svg class="sleep-empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>' +
      '<span class="sleep-empty-text">还没有睡眠记录</span></div>';
    return;
  }

  var html = '';
  if (aiWritingSleep) {
    html += '<div class="sleep-ai-writing"><div class="diary-ai-dots"><span></span><span></span><span></span></div>' + escHtml(csCharName) + ' 正在记录...</div>';
  }
  sleeps.forEach(function(s) {
    var isSleeping = s.status === 'sleeping';
    var isChar = s.author === 'char';
    var name = isChar ? csCharName : csUserName;
    var commentCount = (s.comments || []).length;
    var heartCount = 0;
    if (s.hearts) { if (s.hearts.user) heartCount++; if (s.hearts.char) heartCount++; }
    var sleepMoodInfo = getSleepMoodInfo(s.sleepMood);
    var note = isSleeping ? (s.sleepNote || '') : (s.wakeNote || s.sleepNote || '');
    var iconBg = isSleeping ? '#ede9fe' : '#ecfdf5';
    var iconSvg = isSleeping ? SVG_SLEEP_MOON : SVG_SLEEP_SUN;

    html += '<div class="sleep-card" onclick="openSleepDetail(\'' + s.id + '\')">' +
      '<div class="sleep-card-top">' +
        '<div class="sleep-card-icon" style="background:' + iconBg + '">' + iconSvg + '</div>' +
        '<div class="sleep-card-meta">' +
          '<div class="sleep-card-label">' + escHtml(name) + ' <span class="sleep-card-status ' + (isSleeping ? 'sleeping' : 'completed') + '">' + (isSleeping ? '睡眠中' : '已起床') + '</span></div>' +
          '<div class="sleep-card-info">' +
            '<span class="sleep-card-author">' + sleepMoodInfo.icon + ' ' + escHtml(sleepMoodInfo.label) + '</span>' +
            '<span class="sleep-card-date">' + fmtRelativeDate(s.createdAt) + '</span>' +
          '</div>' +
        '</div>' +
      '</div>';
    if (note) html += '<div class="sleep-card-content">' + escHtml(note) + '</div>';

    // Show time info
    var timeHtml = '';
    if (s.sleepAt) {
      try { timeHtml += '<span>' + SVG_SLEEP_MOON + ' ' + s.sleepAt.split('T')[1].substring(0, 5) + '</span>'; } catch(e) {}
    }
    if (s.wakeAt) {
      try { timeHtml += '<span>' + SVG_SLEEP_SUN + ' ' + s.wakeAt.split('T')[1].substring(0, 5) + '</span>'; } catch(e) {}
    }
    if (s.duration) {
      var hrs = Math.floor(s.duration / 60);
      var mins = s.duration % 60;
      timeHtml += '<span>' + SVG_SLEEP_CLOCK + ' ' + (hrs > 0 ? hrs + 'h' : '') + (mins > 0 ? mins + 'm' : '') + '</span>';
    }
    if (timeHtml) html += '<div class="sleep-card-times">' + timeHtml + '</div>';

    // Show event tags
    if (s.events && s.events.length > 0) {
      html += '<div class="sleep-card-events">';
      s.events.forEach(function(evt) {
        var info = getSleepEventTypeInfo(evt.type);
        html += '<span class="sleep-card-event-tag">' + info.icon + ' ' + escHtml(info.label) + '</span>';
      });
      html += '</div>';
    }

    // Quality
    if (s.quality) {
      var qi = getSleepQualityInfo(s.quality);
      html += '<div style="margin-top:6px"><span style="font-size:11px;padding:2px 8px;border-radius:9999px;background:' + qi.color + '15;color:' + qi.color + ';display:inline-flex;align-items:center;gap:4px">' + qi.icon + ' ' + escHtml(qi.label) + '</span></div>';
    }

    html += '<div class="sleep-card-footer">' +
      '<span class="sleep-card-heart' + (heartCount > 0 ? ' active' : '') + '">' +
      '<svg style="width:14px;height:14px" fill="' + (heartCount > 0 ? '#fb7185' : 'none') + '" stroke="' + (heartCount > 0 ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + heartCount + '</span>' +
      '<svg style="width:14px;height:14px;margin-left:auto;color:#c8c5c2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
      '<span>' + commentCount + '</span>' +
    '</div></div>';
  });
  container.innerHTML = html;
}

<script>
// --- Request AI Sleep ---
function requestAiSleep(phase) {
  closeSleepFab();
  if (aiWritingSleep) return;
  aiWritingSleep = true;
  renderSleepList();
  var settings = getSleepSettings();
  window.parent.postMessage({
    type: 'coupleSpaceSleepAiRequest',
    charId: currentCharId,
    existingSleeps: getSleeps(),
    sleepSettings: settings,
    phase: phase || 'sleep'
  }, '*');
}

function requestAiSleepWake() {
  closeSleepFab();
  var sleeps = getSleeps();
  var sleeping = null;
  for (var i = sleeps.length - 1; i >= 0; i--) {
    if (sleeps[i].author === 'char' && sleeps[i].status === 'sleeping') { sleeping = sleeps[i]; break; }
  }
  if (!sleeping) {
    showSleepToast('没有正在睡觉的记录');
    return;
  }
  if (aiWritingSleep) return;
  aiWritingSleep = true;
  renderSleepList();
  var settings = getSleepSettings();

  // First generate events, then wake
  pendingSleepEventsId = sleeping.id;
  window.parent.postMessage({
    type: 'coupleSpaceSleepAiRequest',
    charId: currentCharId,
    existingSleeps: sleeps,
    sleepSettings: settings,
    phase: 'events',
    currentSleep: sleeping
  }, '*');

  // After events come back, we trigger wake (handled in message handler with a delay)
  setTimeout(function() {
    pendingSleepWakeId = sleeping.id;
    var updatedSleeps = getSleeps();
    var updatedSleep = updatedSleeps.find(function(x) { return x.id === sleeping.id; });
    window.parent.postMessage({
      type: 'coupleSpaceSleepAiRequest',
      charId: currentCharId,
      existingSleeps: updatedSleeps,
      sleepSettings: settings,
      phase: 'wake',
      currentSleep: updatedSleep || sleeping
    }, '*');
  }, 5000);
}

// --- Write Sleep ---
var editingSleepId = null;
function openSleepWrite(type, existingId) {
  closeSleepFab();
  editingSleepId = existingId || null;
  sleepWriteType = type || 'sleep';
  sleepWriteMood = '';
  sleepWriteQuality = '';

  var titleLabel = document.getElementById('sleep-write-title-label');
  var noteLabel = document.getElementById('sleep-write-note-label');
  var timeLabel = document.getElementById('sleep-write-time-label');
  var qualitySection = document.getElementById('sleep-write-quality-section');
  var noteInput = document.getElementById('sleep-write-note');

  if (existingId) {
    var sleeps = getSleeps();
    var s = sleeps.find(function(x){ return x.id === existingId; });
    if (s) {
      if (s.status === 'completed' && s.wakeAt) {
        sleepWriteType = 'wake';
      } else {
        sleepWriteType = 'sleep';
      }
      if (sleepWriteType === 'sleep') {
        sleepWriteMood = s.sleepMood || '';
        noteInput.value = s.sleepNote || '';
        if (s.sleepAt) {
          try { document.getElementById('sleep-write-time').value = s.sleepAt.split('T')[1].substring(0,5); } catch(e){}
        }
      } else {
        sleepWriteMood = s.wakeMood || '';
        sleepWriteQuality = s.quality || '';
        noteInput.value = s.wakeNote || '';
        if (s.wakeAt) {
          try { document.getElementById('sleep-write-time').value = s.wakeAt.split('T')[1].substring(0,5); } catch(e){}
        }
      }
    }
    titleLabel.textContent = '编辑睡眠';
  } else {
    noteInput.value = '';
  }

  if (sleepWriteType === 'sleep') {
    if (!existingId) titleLabel.textContent = '记录入睡';
    noteLabel.textContent = '想说的话';
    timeLabel.textContent = '入睡时间';
    noteInput.placeholder = '晚安...';
    qualitySection.style.display = 'none';
    if (!existingId) {
      var now = new Date();
      document.getElementById('sleep-write-time').value = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    }
  } else {
    if (!existingId) titleLabel.textContent = '记录起床';
    noteLabel.textContent = '起床感受';
    timeLabel.textContent = '起床时间';
    noteInput.placeholder = '早安...';
    qualitySection.style.display = '';
    if (!existingId) {
      var now = new Date();
      document.getElementById('sleep-write-time').value = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    }
  }

  renderSleepWriteTypeRow();
  renderSleepWriteMoodRow();
  renderSleepWriteQualityRow();
  updateSleepSaveBtn();
  document.getElementById('sleep-write-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
}

function closeSleepWrite() {
  document.getElementById('sleep-write-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
}

function renderSleepWriteTypeRow() {
  var row = document.getElementById('sleep-write-type-row');
  var types = [{ id: 'sleep', label: '入睡', icon: SVG_SLEEP_MOON }, { id: 'wake', label: '起床', icon: SVG_SLEEP_SUN }];
  row.innerHTML = '';
  types.forEach(function(t) {
    row.innerHTML += '<button class="sleep-write-chip' + (sleepWriteType === t.id ? ' active' : '') + '" onclick="switchSleepWriteType(\'' + t.id + '\')">' +
      '<span class="chip-icon">' + t.icon + '</span>' + t.label + '</button>';
  });
}

function switchSleepWriteType(type) {
  sleepWriteType = type;
  var qualitySection = document.getElementById('sleep-write-quality-section');
  var timeLabel = document.getElementById('sleep-write-time-label');
  var noteLabel = document.getElementById('sleep-write-note-label');
  var noteInput = document.getElementById('sleep-write-note');
  var titleLabel = document.getElementById('sleep-write-title-label');
  if (type === 'sleep') {
    qualitySection.style.display = 'none';
    timeLabel.textContent = '入睡时间';
    noteLabel.textContent = '想说的话';
    noteInput.placeholder = '晚安...';
    titleLabel.textContent = '记录入睡';
  } else {
    qualitySection.style.display = '';
    timeLabel.textContent = '起床时间';
    noteLabel.textContent = '起床感受';
    noteInput.placeholder = '早安...';
    titleLabel.textContent = '记录起床';
  }
  renderSleepWriteTypeRow();
  updateSleepSaveBtn();
}

function renderSleepWriteMoodRow() {
  var row = document.getElementById('sleep-write-mood-row');
  row.innerHTML = '';
  var allMoods = getAllSleepMoods();
  var customIds = getCustomSleepMoods().map(function(c){ return c.id; });
  allMoods.forEach(function(m) {
    var isCustom = customIds.indexOf(m.id) !== -1;
    var chip = document.createElement('button');
    chip.className = 'sleep-write-chip' + (isCustom ? ' custom-mood' : '') + (sleepWriteMood === m.id ? ' active' : '');
    chip.innerHTML = '<span class="chip-icon">' + m.icon + '</span>' + escHtml(m.label);
    if (isCustom) {
      var delBtn = document.createElement('span');
      delBtn.className = 'mood-delete-btn';
      delBtn.innerHTML = '✕';
      delBtn.onclick = function(e) { e.stopPropagation(); deleteCustomSleepMood(m.id); };
      chip.appendChild(delBtn);
    }
    chip.onclick = function() { selectSleepWriteMood(m.id); };
    row.appendChild(chip);
  });
  var addChip = document.createElement('button');
  addChip.className = 'diary-mood-add-chip';
  addChip.innerHTML = '<svg style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>自定义';
  addChip.onclick = function() { openAddSleepMoodModal(); };
  row.appendChild(addChip);
}

function selectSleepWriteMood(id) {
  sleepWriteMood = sleepWriteMood === id ? '' : id;
  renderSleepWriteMoodRow();
  updateSleepSaveBtn();
}

function renderSleepWriteQualityRow() {
  var row = document.getElementById('sleep-write-quality-row');
  if (!row) return;
  row.innerHTML = '';
  var allQualities = getAllSleepQualities();
  var customIds = getCustomSleepQualities().map(function(c){ return c.id; });
  allQualities.forEach(function(q) {
    var isCustom = customIds.indexOf(q.id) !== -1;
    var chip = document.createElement('button');
    chip.className = 'sleep-write-chip' + (isCustom ? ' custom-mood' : '') + (sleepWriteQuality === q.id ? ' active' : '');
    chip.innerHTML = '<span class="chip-icon">' + q.icon + '</span>' + escHtml(q.label);
    if (isCustom) {
      var delBtn = document.createElement('span');
      delBtn.className = 'mood-delete-btn';
      delBtn.innerHTML = '✕';
      delBtn.onclick = function(e) { e.stopPropagation(); deleteCustomSleepQuality(q.id); };
      chip.appendChild(delBtn);
    }
    chip.onclick = function() { selectSleepWriteQuality(q.id); };
    row.appendChild(chip);
  });
  var addChip = document.createElement('button');
  addChip.className = 'diary-mood-add-chip';
  addChip.innerHTML = '<svg style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>自定义';
  addChip.onclick = function() { openAddSleepQualityModal(); };
  row.appendChild(addChip);
}

function selectSleepWriteQuality(id) {
  sleepWriteQuality = sleepWriteQuality === id ? '' : id;
  renderSleepWriteQualityRow();
  updateSleepSaveBtn();
}

function updateSleepSaveBtn() {
  var btn = document.getElementById('sleep-save-btn');
  if (sleepWriteType) btn.classList.remove('disabled');
  else btn.classList.add('disabled');
}

function saveSleepItem() {
  if (!sleepWriteType) return;
  var timeVal = document.getElementById('sleep-write-time').value;
  var noteVal = document.getElementById('sleep-write-note').value.trim();
  var sleeps = getSleeps();

  if (editingSleepId) {
    var idx = sleeps.findIndex(function(x){ return x.id === editingSleepId; });
    if (idx >= 0) {
      var s = sleeps[idx];
      if (sleepWriteType === 'sleep') {
        s.sleepAt = new Date().toISOString().split('T')[0] + 'T' + (timeVal || '23:00') + ':00';
        s.sleepNote = noteVal;
        s.sleepMood = sleepWriteMood || s.sleepMood || 'calm';
      } else {
        s.wakeAt = new Date().toISOString().split('T')[0] + 'T' + (timeVal || '07:00') + ':00';
        s.wakeNote = noteVal;
        s.wakeMood = sleepWriteMood || s.wakeMood || 'refreshed';
        s.quality = sleepWriteQuality || s.quality || 'normal';
        if (s.sleepAt && s.wakeAt) {
          try {
            var sleepMs = new Date(s.sleepAt).getTime();
            var wakeMs = new Date(s.wakeAt).getTime();
            if (wakeMs > sleepMs) s.duration = Math.round((wakeMs - sleepMs) / 60000);
          } catch(e) {}
        }
      }
    }
    saveSleeps(sleeps);
    closeSleepWrite();
    renderSleepList();
    notifySleepChanged();
    editingSleepId = null;
    return;
  }

  if (sleepWriteType === 'sleep') {
    var newSleep = {
      id: 'sleep_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      author: 'user',
      sleepAt: new Date().toISOString().split('T')[0] + 'T' + (timeVal || '23:00') + ':00',
      wakeAt: null, duration: null,
      sleepNote: noteVal,
      sleepMood: sleepWriteMood || 'calm',
      events: [], wakeNote: null, wakeMood: null, quality: null,
      status: 'sleeping',
      createdAt: Date.now(), completedAt: null,
      hearts: { user: true }, comments: []
    };
    sleeps.push(newSleep);
    saveSleeps(sleeps);
    closeSleepWrite();
    renderSleepList();
    notifySleepChanged();
    // Ask AI to comment and heart
    window.parent.postMessage({
      type: 'coupleSpaceSleepCommentRequest', charId: currentCharId,
      sleepId: newSleep.id, sleepNote: newSleep.sleepNote, sleepStatus: 'sleeping'
    }, '*');
    window.parent.postMessage({
      type: 'coupleSpaceSleepHeartRequest', charId: currentCharId,
      sleepId: newSleep.id, sleepNote: newSleep.sleepNote
    }, '*');
  } else {
    // Wake: find the latest sleeping record by user
    var sleepingIdx = -1;
    for (var i = sleeps.length - 1; i >= 0; i--) {
      if (sleeps[i].author === 'user' && sleeps[i].status === 'sleeping') { sleepingIdx = i; break; }
    }
    if (sleepingIdx >= 0) {
      var s = sleeps[sleepingIdx];
      s.wakeAt = new Date().toISOString().split('T')[0] + 'T' + (timeVal || '07:00') + ':00';
      s.wakeNote = noteVal;
      s.wakeMood = sleepWriteMood || 'refreshed';
      s.quality = sleepWriteQuality || 'normal';
      s.status = 'completed';
      s.completedAt = Date.now();
      try {
        var sleepMs = new Date(s.sleepAt).getTime();
        var wakeMs = new Date(s.wakeAt).getTime();
        if (wakeMs > sleepMs) s.duration = Math.round((wakeMs - sleepMs) / 60000);
      } catch(e) {}
      saveSleeps(sleeps);
      closeSleepWrite();
      renderSleepList();
      notifySleepChanged();
      window.parent.postMessage({
        type: 'coupleSpaceSleepCommentRequest', charId: currentCharId,
        sleepId: s.id, sleepNote: s.sleepNote, wakeNote: s.wakeNote,
        quality: s.quality, sleepStatus: 'completed', events: s.events
      }, '*');
      window.parent.postMessage({
        type: 'coupleSpaceSleepHeartRequest', charId: currentCharId,
        sleepId: s.id, wakeNote: s.wakeNote
      }, '*');
    } else {
      // No sleeping record, create a standalone wake
      var newWake = {
        id: 'sleep_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
        author: 'user',
        sleepAt: null, wakeAt: new Date().toISOString().split('T')[0] + 'T' + (timeVal || '07:00') + ':00',
        duration: null,
        sleepNote: null, sleepMood: null,
        events: [],
        wakeNote: noteVal, wakeMood: sleepWriteMood || 'refreshed',
        quality: sleepWriteQuality || 'normal',
        status: 'completed',
        createdAt: Date.now(), completedAt: Date.now(),
        hearts: { user: true }, comments: []
      };
      sleeps.push(newWake);
      saveSleeps(sleeps);
      closeSleepWrite();
      renderSleepList();
      notifySleepChanged();
      window.parent.postMessage({
        type: 'coupleSpaceSleepCommentRequest', charId: currentCharId,
        sleepId: newWake.id, wakeNote: newWake.wakeNote, quality: newWake.quality, sleepStatus: 'completed'
      }, '*');
      window.parent.postMessage({
        type: 'coupleSpaceSleepHeartRequest', charId: currentCharId,
        sleepId: newWake.id, wakeNote: newWake.wakeNote
      }, '*');
    }
  }
}
</script>

<script>
// --- Sleep Detail ---
function editCurrentSleep() {
  if (!currentViewingSleepId) return;
  var sleeps = getSleeps();
  var s = sleeps.find(function(x){ return x.id === currentViewingSleepId; });
  if (!s || s.author !== 'user') return;
  var idToEdit = currentViewingSleepId;
  closeSleepDetail();
  openSleepWrite(null, idToEdit);
}
function openSleepDetail(id) {
  currentViewingSleepId = id;
  var sleeps = getSleeps();
  var s = sleeps.find(function(x) { return x.id === id; });
  if (!s) return;
  var isChar = s.author === 'char';
  var avatar = isChar ? csCharAvatar : csUserAvatar;
  var name = isChar ? csCharName : csUserName;
  var userHearted = s.hearts && s.hearts.user;
  var charHearted = s.hearts && s.hearts.char;

  var html = '';

  // Quality badge
  if (s.quality) {
    var qi = getSleepQualityInfo(s.quality);
    html += '<div class="sleep-detail-quality" style="background:' + qi.color + '15;color:' + qi.color + ';border:1px solid ' + qi.color + '30;display:inline-flex;align-items:center;gap:6px">' + qi.icon + ' ' + escHtml(qi.label) + '</div>';
  }

  // Duration
  if (s.duration) {
    var hrs = Math.floor(s.duration / 60);
    var mins = s.duration % 60;
    html += '<div class="sleep-detail-duration">' + SVG_SLEEP_CLOCK + ' 睡了 ' + (hrs > 0 ? hrs + '小时' : '') + (mins > 0 ? mins + '分钟' : '') + '</div>';
  }

  // Author info
  html += '<div class="mood-detail-author-row">' +
    '<div class="mood-detail-avatar" style="background-image:url(' + escAttr(avatar) + ')"></div>' +
    '<div><div class="mood-detail-author-name">' + escHtml(name) + '</div>' +
    '<div class="mood-detail-date">' + fmtRelativeDate(s.createdAt) + '</div></div></div>';

  // Sleep phase
  if (s.sleepNote || s.sleepAt) {
    var sleepMoodInfo = getSleepMoodInfo(s.sleepMood);
    html += '<div class="sleep-detail-phase">' +
      '<div class="sleep-detail-phase-header">' +
        '<span class="sleep-detail-phase-icon">' + SVG_SLEEP_MOON + '</span>' +
        '<span class="sleep-detail-phase-title">入睡</span>' +
        (s.sleepAt ? '<span class="sleep-detail-phase-time">' + (s.sleepAt.split('T')[1] || '').substring(0, 5) + '</span>' : '') +
      '</div>' +
      (s.sleepNote ? '<div class="sleep-detail-phase-content">' + escHtml(s.sleepNote) + '</div>' : '') +
      (s.sleepMood ? '<div class="sleep-detail-phase-mood">' + sleepMoodInfo.icon + ' ' + escHtml(sleepMoodInfo.label) + '</div>' : '') +
    '</div>';
  }

  // Events
  if (s.events && s.events.length > 0) {
    html += '<div style="margin-bottom:12px">';
    html += '<div style="font-size:12px;font-weight:600;color:#7c3aed;margin-bottom:8px;display:flex;align-items:center;gap:4px">' + SVG_SLEEP_ZZZ + ' 睡眠期间</div>';
    s.events.forEach(function(evt) {
      var info = getSleepEventTypeInfo(evt.type);
      html += '<div class="sleep-detail-event">' +
        '<div class="sleep-detail-event-type">' + info.icon + ' ' + escHtml(info.label) + '</div>' +
        '<div class="sleep-detail-event-content">' + escHtml(evt.content || '') + '</div>' +
      '</div>';
    });
    html += '</div>';
  }

  // Wake phase
  if (s.wakeNote || s.wakeAt) {
    var wakeMoodInfo = getSleepMoodInfo(s.wakeMood);
    html += '<div class="sleep-detail-phase">' +
      '<div class="sleep-detail-phase-header">' +
        '<span class="sleep-detail-phase-icon">' + SVG_SLEEP_SUN + '</span>' +
        '<span class="sleep-detail-phase-title">起床</span>' +
        (s.wakeAt ? '<span class="sleep-detail-phase-time">' + (s.wakeAt.split('T')[1] || '').substring(0, 5) + '</span>' : '') +
      '</div>' +
      (s.wakeNote ? '<div class="sleep-detail-phase-content">' + escHtml(s.wakeNote) + '</div>' : '') +
      (s.wakeMood ? '<div class="sleep-detail-phase-mood">' + wakeMoodInfo.icon + ' ' + escHtml(wakeMoodInfo.label) + '</div>' : '') +
    '</div>';
  }

  // Hearts
  html += '<div class="sleep-detail-hearts">' +
    '<button class="sleep-detail-heart-btn' + (userHearted ? ' active' : '') + '" onclick="toggleSleepHeart(\'' + id + '\',\'user\')">' +
      '<svg style="width:16px;height:16px" fill="' + (userHearted ? '#fb7185' : 'none') + '" stroke="' + (userHearted ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + escHtml(csUserName) +
    '</button>' +
    '<button class="sleep-detail-heart-btn' + (charHearted ? ' active' : '') + '" style="pointer-events:none">' +
      '<svg style="width:16px;height:16px" fill="' + (charHearted ? '#fb7185' : 'none') + '" stroke="' + (charHearted ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + escHtml(csCharName) +
    '</button></div>';

  // Comments
  html += '<div class="mood-comments-section"><div class="mood-comments-title">评论</div>';
  var comments = s.comments || [];
  if (comments.length === 0) {
    html += '<div class="mood-comment-empty">暂无评论</div>';
  } else {
    comments.forEach(function(c) {
      var cIsChar = c.author === 'char';
      var cAvatar = cIsChar ? csCharAvatar : csUserAvatar;
      var cName = cIsChar ? csCharName : csUserName;
      html += '<div class="mood-comment-item">' +
        '<div class="mood-comment-avatar" style="background-image:url(' + escAttr(cAvatar) + ')"></div>' +
        '<div class="mood-comment-body">' +
          '<span class="mood-comment-name">' + escHtml(cName) + '</span>' +
          '<span class="mood-comment-time">' + fmtRelativeDate(c.timestamp) + '</span>' +
          '<div class="mood-comment-text">' + escHtml(c.content) + '</div>' +
        '</div></div>';
    });
  }
  html += '</div>';

  document.getElementById('sleep-detail-scroll').innerHTML = html;
  document.getElementById('sleep-detail-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
  document.getElementById('sleep-comment-input').value = '';
  updateSleepCommentBtn();
}

function closeSleepDetail() {
  currentViewingSleepId = null;
  document.getElementById('sleep-detail-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
  renderSleepList();
}

function deleteSleepFromDetail() {
  if (!currentViewingSleepId) return;
  if (!confirm('确定删除这条睡眠记录？')) return;
  var sleeps = getSleeps();
  sleeps = sleeps.filter(function(s) { return s.id !== currentViewingSleepId; });
  saveSleeps(sleeps);
  notifySleepChanged();
  closeSleepDetail();
}

function toggleSleepHeart(id, who) {
  var sleeps = getSleeps();
  var s = sleeps.find(function(x) { return x.id === id; });
  if (!s) return;
  if (!s.hearts) s.hearts = {};
  s.hearts[who] = !s.hearts[who];
  saveSleeps(sleeps);
  notifySleepChanged();
  openSleepDetail(id);
  if (who === 'user' && s.hearts.user) {
    window.parent.postMessage({
      type: 'coupleSpaceSleepHeartRequest', charId: currentCharId,
      sleepId: id, sleepNote: s.sleepNote, wakeNote: s.wakeNote
    }, '*');
  }
}

function updateSleepCommentBtn() {
  var val = document.getElementById('sleep-comment-input').value.trim();
  var btn = document.getElementById('sleep-comment-send');
  if (val) btn.classList.remove('disabled');
  else btn.classList.add('disabled');
}

function sendSleepComment() {
  var val = document.getElementById('sleep-comment-input').value.trim();
  if (!val || !currentViewingSleepId) return;
  var sleeps = getSleeps();
  var s = sleeps.find(function(x) { return x.id === currentViewingSleepId; });
  if (!s) return;
  if (!s.comments) s.comments = [];
  s.comments.push({ author: 'user', content: val, timestamp: Date.now() });
  saveSleeps(sleeps);
  notifySleepChanged();
  document.getElementById('sleep-comment-input').value = '';
  updateSleepCommentBtn();
  openSleepDetail(currentViewingSleepId);
  window.parent.postMessage({
    type: 'coupleSpaceSleepCommentRequest', charId: currentCharId,
    sleepId: currentViewingSleepId,
    sleepNote: s.sleepNote, wakeNote: s.wakeNote,
    quality: s.quality, sleepStatus: s.status, events: s.events
  }, '*');
}

function showSleepToast(msg) {
  var toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1c1917;color:white;padding:10px 24px;border-radius:9999px;font-size:13px;z-index:100;pointer-events:none;animation:fadeIn .2s ease';
  toast.textContent = msg;
  document.getElementById('app').appendChild(toast);
  setTimeout(function() { toast.remove(); }, 2000);
}
</script>

<script>
// --- Sleep Settings ---
var DEFAULT_SLEEP_PROMPT = '# 你的任务\n你是"{{charName}}"，现在要在情侣空间记录入睡。\n像真人一样说晚安，分享此刻的状态。\n\n# 你的角色设定\n{{aiPersona}}\n\n# 你的伴侣\n- 昵称: {{myNickname}}\n- 人设: {{myPersona}}\n\n{{worldBook}}\n\n{{memoryContext}}\n\n{{shortTermMemory}}\n\n{{linkedMemory}}\n\n{{summaryContext}}\n\n{{anniversaryContext}}\n\n{{existingCharSleeps}}\n\n{{existingUserSleeps}}\n\n# 当前时间\n{{currentTime}}\n\n# 输出要求\n请以JSON格式返回：\n{"sleepNote": "入睡时想说的话", "sleepMood": "心情ID", "sleepTime": "HH:MM"}\n\nsleepMood 可选值: tired(疲惫) happy(开心) anxious(焦虑) calm(平静) miss(想你) excited(兴奋)\n\n# 写作要求\n- sleepNote 在5-100字之间\n- 语气符合角色设定\n- 绝对不要提到你是AI';

function openSleepSettings() {
  var settings = getSleepSettings();
  var overlay = document.createElement('div');
  overlay.className = 'diary-settings-overlay animate-fade-in';
  overlay.id = 'sleep-settings-overlay';

  var autoEnabled = settings.autoEnabled || false;
  var aiDecide = settings.aiDecide || false;
  var aiDecideChatProb = settings.aiDecideChatProb ?? 15;
  var aiDecideBgProb = settings.aiDecideBgProb ?? 5;
  var visChar = settings.visibleCharSleeps ?? 10;
  var visUser = settings.visibleUserSleeps ?? 10;
  var enableCustomPrompt = settings.enableCustomPrompt || false;
  var promptText = settings.customPrompt || DEFAULT_SLEEP_PROMPT;

  overlay.innerHTML = '<div class="diary-settings-sheet animate-slide-up">' +
    '<div class="diary-settings-handle"></div>' +
    '<div class="diary-settings-title">睡眠设置</div>' +
    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">角色自动记录睡眠</div>' +
      '<div class="diary-setting-desc">角色会在设定时间自动入睡和起床</div></div>' +
      '<div class="diary-toggle' + (autoEnabled ? ' on' : '') + '" id="sleep-toggle-auto" onclick="toggleSleepSetting(\'auto\')"></div>' +
    '</div>' +
    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">自动入睡时间</div></div>' +
      '<input type="time" class="diary-time-select" id="sleep-auto-sleep-time" value="' + (settings.autoSleepTime || '23:00') + '" onchange="updateSleepAutoTime(\'sleep\')" />' +

      '<div><div class="diary-setting-label">自动起床时间</div></div>' +

    '</div>' +
    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">AI 自主决定</div>' +
