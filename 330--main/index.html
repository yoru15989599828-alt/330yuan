      '<div class="diary-toggle' + (aiDecide ? ' on' : '') + '" id="sleep-toggle-decide" onclick="toggleSleepSetting(\'decide\')"></div>' +
    '</div>' +

    '<div id="sleep-ai-decide-probs" style="' + (aiDecide ? '' : 'display:none') + '">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">聊天触发概率 (%)</div>' +
        '<div class="diary-setting-desc">每次聊天消息后触发的概率</div></div>' +
        '<input type="number" value="' + aiDecideChatProb + '" class="diary-time-select" style="width:70px;text-align:center" onchange="updateSleepAiDecideProb()" id="sleep-chat-prob" />' +
      '</div>' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">后台触发概率 (%)</div>' +
        '<div class="diary-setting-desc">后台活动每次心跳触发的概率</div></div>' +
        '<input type="number" value="' + aiDecideBgProb + '" class="diary-time-select" style="width:70px;text-align:center" onchange="updateSleepAiDecideProb()" id="sleep-bg-prob" />' +
      '</div>' +
    '</div>' +

    '<div style="padding-top:16px;margin-top:8px;border-top:1px solid #f0efed">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">AI可见角色睡眠数</div>' +
        '<div class="diary-setting-desc">AI能看到多少条角色的睡眠记录</div></div>' +
        '<input type="number" class="diary-time-select" style="width:60px" id="sleep-vis-char" value="' + visChar + '" min="0" max="50" onchange="updateSleepVisibility()" />' +
      '</div>' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">AI可见用户睡眠数</div>' +
        '<div class="diary-setting-desc">AI能看到多少条你的睡眠记录</div></div>' +
        '<input type="number" class="diary-time-select" style="width:60px" id="sleep-vis-user" value="' + visUser + '" min="0" max="50" onchange="updateSleepVisibility()" />' +
      '</div>' +
    '</div>' +
    '<div style="padding-top:16px;margin-top:8px;border-top:1px solid #f0efed">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">自定义提示词</div>' +
        '<div class="diary-setting-desc">自定义 AI 记录睡眠时使用的提示词</div></div>' +
        '<div class="diary-toggle' + (enableCustomPrompt ? ' on' : '') + '" id="sleep-toggle-prompt" onclick="toggleSleepPromptSetting()"></div>' +
      '</div>' +
      '<div class="diary-prompt-section" id="sleep-prompt-section" style="' + (enableCustomPrompt ? '' : 'display:none') + '">' +
        '<textarea class="diary-prompt-textarea" id="sleep-prompt-textarea" placeholder="输入自定义提示词...">' + escHtml(promptText) + '</textarea>' +
        '<div class="diary-prompt-actions">' +
          '<button class="diary-prompt-action-btn" onclick="saveSleepPromptText()">保存</button>' +
          '<button class="diary-prompt-action-btn warn" onclick="resetSleepPrompt()">重置默认</button>' +
        '</div>' +
        '<div style="margin-top:8px;font-size:11px;color:#a8a29e;line-height:1.5">可用变量: {{charName}} {{myNickname}} {{aiPersona}} {{myPersona}} {{worldBook}} {{memoryContext}} {{shortTermMemory}} {{linkedMemory}} {{summaryContext}} {{existingCharSleeps}} {{existingUserSleeps}} {{currentTime}} {{anniversaryContext}}</div>' +
      '</div>' +
    '</div>' +
  '</div>';

  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeSleepSettings(); });
  document.getElementById('app').appendChild(overlay);
}

function closeSleepSettings() {
  var el = document.getElementById('sleep-settings-overlay');
  if (el) el.remove();
}

function toggleSleepSetting(key) {
  var settings = getSleepSettings();
  if (key === 'auto') {
    settings.autoEnabled = !settings.autoEnabled;
    document.getElementById('sleep-toggle-auto').classList.toggle('on', settings.autoEnabled);
  } else if (key === 'decide') {
    settings.aiDecide = !settings.aiDecide;
    document.getElementById('sleep-toggle-decide').classList.toggle('on', settings.aiDecide);
    var probsDiv = document.getElementById('sleep-ai-decide-probs');
    if (probsDiv) probsDiv.style.display = settings.aiDecide ? '' : 'none';
  }
  saveSleepSettings(settings);
  notifySleepSettingsChanged();
}

function updateSleepAutoTime(which) {
  var settings = getSleepSettings();
  if (which === 'sleep') settings.autoSleepTime = document.getElementById('sleep-auto-sleep-time').value;
  else settings.autoWakeTime = document.getElementById('sleep-auto-wake-time').value;
  saveSleepSettings(settings);
  notifySleepSettingsChanged();
}

function updateSleepAiDecideProb() {
  var settings = getSleepSettings();
  settings.aiDecideChatProb = parseInt(document.getElementById('sleep-chat-prob').value) || 15;
  settings.aiDecideBgProb = parseInt(document.getElementById('sleep-bg-prob').value) || 5;
  saveSleepSettings(settings);
  notifySleepSettingsChanged();
}

function updateSleepVisibility() {
  var settings = getSleepSettings();
  settings.visibleCharSleeps = parseInt(document.getElementById('sleep-vis-char').value) || 10;
  settings.visibleUserSleeps = parseInt(document.getElementById('sleep-vis-user').value) || 10;
  saveSleepSettings(settings);
  notifySleepSettingsChanged();
}

function toggleSleepPromptSetting() {
  var settings = getSleepSettings();
  settings.enableCustomPrompt = !settings.enableCustomPrompt;
  saveSleepSettings(settings);
  document.getElementById('sleep-toggle-prompt').classList.toggle('on', settings.enableCustomPrompt);
  document.getElementById('sleep-prompt-section').style.display = settings.enableCustomPrompt ? '' : 'none';
  if (settings.enableCustomPrompt && !settings.customPrompt) {
    document.getElementById('sleep-prompt-textarea').value = DEFAULT_SLEEP_PROMPT;
  }
}

function saveSleepPromptText() {
  var settings = getSleepSettings();
  settings.customPrompt = document.getElementById('sleep-prompt-textarea').value;
  saveSleepSettings(settings);
  notifySleepSettingsChanged();
  showSleepToast('提示词已保存');
}

function resetSleepPrompt() {
  document.getElementById('sleep-prompt-textarea').value = DEFAULT_SLEEP_PROMPT;
  var settings = getSleepSettings();
  settings.customPrompt = '';
  saveSleepSettings(settings);
  notifySleepSettingsChanged();
  showSleepToast('已重置为默认');
}
</script>

<script>
// ===== FINANCE (记账) =====
var finFabOpen = false;
var aiWritingFin = false;
var currentViewingFinId = null;
var editingFinType = 'expense';
var editingFinCat = '';
var finFilterType = 'all';

function getCustomFinCats() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleCustomFinCats_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveCustomFinCats(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleCustomFinCats_' + currentCharId, JSON.stringify(list));
}
function getAllFinCats() {
  return getCustomFinCats();
}
function getFinCatInfo(id) {
  var all = getAllFinCats();
  var c = all.find(function(x) { return x.id === id; });
  return c || { id: id, label: id };
}

// --- Storage ---
function getFinItems() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleFinance_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveFinItems(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleFinance_' + currentCharId, JSON.stringify(list));
}
function getFinSettings() {
  if (!currentCharId) return {};
  try { return JSON.parse(localStorage.getItem('coupleFinanceSettings_' + currentCharId)) || {}; }
  catch(e) { return {}; }
}
function saveFinSettings(s) {
  if (!currentCharId) return;
  localStorage.setItem('coupleFinanceSettings_' + currentCharId, JSON.stringify(s));
}
function notifyFinChanged() {
  window.parent.postMessage({ type: 'coupleSpaceFinanceChanged', charId: currentCharId, items: getFinItems() }, '*');
}
function notifyFinSettingsChanged() {
  window.parent.postMessage({ type: 'coupleSpaceFinanceSettingsChanged', charId: currentCharId, settings: getFinSettings() }, '*');
}

// --- Summary ---
function renderFinSummary() {
  var el = document.getElementById('fin-summary');
  if (!el) return;
  var items = getFinItems();
  var now = new Date();
  var thisMonth = items.filter(function(i) {
    var d = new Date(i.date || i.createdAt);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  var exp = thisMonth.filter(function(i){ return i.type === 'expense'; }).reduce(function(s,i){ return s + (i.amount||0); }, 0);
  var inc = thisMonth.filter(function(i){ return i.type === 'income'; }).reduce(function(s,i){ return s + (i.amount||0); }, 0);
  el.innerHTML = '<div class="fin-summary-card"><div class="fin-summary-label">本月支出</div><div class="fin-summary-amount expense">¥' + exp.toFixed(2) + '</div></div>' +
    '<div class="fin-summary-card"><div class="fin-summary-label">本月收入</div><div class="fin-summary-amount income">¥' + inc.toFixed(2) + '</div></div>';
}

// --- Filter ---
function filterFin(type) {
  finFilterType = type;
  var chips = document.querySelectorAll('#fin-filter-bar .fin-filter-chip');
  chips.forEach(function(c) { c.classList.toggle('active', c.getAttribute('data-filter') === type); });
  renderFinList();
}

// --- List ---
function renderFinList() {
  renderFinSummary();
  var container = document.getElementById('fin-list-container');
  if (!container) return;
  var items = getFinItems();
  if (finFilterType !== 'all') items = items.filter(function(i) { return i.type === finFilterType; });
  items.sort(function(a, b) { return b.createdAt - a.createdAt; });

  if (items.length === 0 && !aiWritingFin) {
    container.innerHTML = '<div class="fin-empty">' +
      '<svg class="fin-empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>' +
      '<span class="fin-empty-text">还没有记账记录</span></div>';
    return;
  }

  var html = '';
  if (aiWritingFin) {
    html += '<div class="fin-ai-writing"><div class="diary-ai-dots"><span></span><span></span><span></span></div>' + escHtml(csCharName) + ' 正在记账...</div>';
  }
  items.forEach(function(item) {
    var cat = getFinCatInfo(item.category);
    var isChar = item.author === 'char';
    var name = isChar ? csCharName : csUserName;
    var heartCount = 0;
    if (item.hearts) { if (item.hearts.user) heartCount++; if (item.hearts.char) heartCount++; }
    var commentCount = (item.comments || []).length;
    var amtClass = item.type === 'income' ? 'income' : 'expense';
    var amtPrefix = item.type === 'income' ? '+' : '-';

    html += '<div class="fin-card" onclick="openFinDetail(\'' + item.id + '\')">' +
      '<div class="fin-card-top">' +
        '<div class="fin-card-icon" style="background:' + (item.type === 'income' ? '#ecfdf5' : '#fef2f2') + ';color:' + (item.type === 'income' ? '#10b981' : '#ef4444') + ';font-size:13px;font-weight:600">' + (item.type === 'income' ? '+' : '-') + '</div>' +
        '<div class="fin-card-meta"><div class="fin-card-title">' + escHtml(item.title || '未命名') + '</div>' +
        '<div class="fin-card-info"><span class="fin-card-author">' + escHtml(name) + '</span>' +
        '<span class="fin-card-cat">' + escHtml(cat.label) + '</span>' +
        '<span class="fin-card-date">' + fmtRelativeDate(item.createdAt) + '</span></div></div>' +
        '<div class="fin-card-amount ' + amtClass + '">' + amtPrefix + '¥' + (item.amount || 0).toFixed(2) + '</div>' +
      '</div>' +
      (item.note ? '<div class="fin-card-note">' + escHtml(item.note) + '</div>' : '') +
      '<div class="fin-card-footer">' +
        '<span class="fin-card-heart' + (heartCount > 0 ? ' active' : '') + '">' +
        '<svg style="width:14px;height:14px" fill="' + (heartCount > 0 ? '#fb7185' : 'none') + '" stroke="' + (heartCount > 0 ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + heartCount + '</span>' +
        '<svg style="width:14px;height:14px;margin-left:auto;color:#c8c5c2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
        '<span>' + commentCount + '</span>' +
      '</div></div>';
  });
  container.innerHTML = html;
}

// --- FAB ---
function toggleFinFab() {
  finFabOpen = !finFabOpen;
  var menu = document.getElementById('fin-fab-menu');
  var btn = document.getElementById('fin-fab-btn');
  if (finFabOpen) {
    menu.style.display = 'flex';
    menu.innerHTML =
      '<div class="album-fab-option animate-fade-in" onclick="openFinWrite()">' +
        '<svg style="width:18px;height:18px;color:#78716c;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>' +
        '我来记' +
      '</div>' +
      '<div class="album-fab-option animate-fade-in" onclick="requestAiFin()">' +
        '<svg style="width:18px;height:18px;color:#78716c;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>' +
        '让TA记' +
      '</div>';
    btn.innerHTML = '<svg class="icon-lg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  } else {
    menu.style.display = 'none';
    btn.innerHTML = SVG_PLUS;
  }
}
function closeFinFab() { if (finFabOpen) toggleFinFab(); }

// --- Request AI ---
function requestAiFin() {
  closeFinFab();
  if (aiWritingFin) return;
  aiWritingFin = true;
  renderFinList();
  var settings = getFinSettings();
  window.parent.postMessage({
    type: 'coupleSpaceFinanceAiRequest',
    charId: currentCharId,
    existingItems: getFinItems(),
    financeSettings: settings,
    customCategories: getAllFinCats()
  }, '*');
}

// --- Write ---
var editingFinId = null;
function openFinWrite(existingId) {
  closeFinFab();
  editingFinId = existingId || null;
  editingFinType = 'expense';
  editingFinCat = '';
  document.getElementById('fin-write-amount').value = '';
  document.getElementById('fin-write-title').value = '';
  document.getElementById('fin-write-note').value = '';
  document.getElementById('fin-write-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('fin-type-expense').className = 'fin-write-type-btn expense active';
  document.getElementById('fin-type-income').className = 'fin-write-type-btn income';
  if (existingId) {
    var items = getFinItems();
    var item = items.find(function(x){ return x.id === existingId; });
    if (item) {
      editingFinType = item.type || 'expense';
      editingFinCat = item.category || '';
      document.getElementById('fin-write-amount').value = item.amount || '';
      document.getElementById('fin-write-title').value = item.title || '';
      document.getElementById('fin-write-note').value = item.note || '';
      document.getElementById('fin-write-date').value = item.date || new Date().toISOString().split('T')[0];
      document.getElementById('fin-type-expense').className = 'fin-write-type-btn expense' + (editingFinType === 'expense' ? ' active' : '');
      document.getElementById('fin-type-income').className = 'fin-write-type-btn income' + (editingFinType === 'income' ? ' active' : '');
    }
  }
  renderFinCatRow();
  updateFinSaveBtn();
  document.getElementById('fin-write-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
}
function closeFinWrite() {
  document.getElementById('fin-write-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
}
function selectFinType(type) {
  editingFinType = type;
  document.getElementById('fin-type-expense').className = 'fin-write-type-btn expense' + (type === 'expense' ? ' active' : '');
  document.getElementById('fin-type-income').className = 'fin-write-type-btn income' + (type === 'income' ? ' active' : '');
}
function renderFinCatRow() {
  var row = document.getElementById('fin-cat-row');
  row.innerHTML = '';
  var allCats = getAllFinCats();
  allCats.forEach(function(c) {
    var chip = document.createElement('button');
    chip.className = 'fin-write-cat-chip custom-mood' + (editingFinCat === c.id ? ' active' : '');
    chip.setAttribute('data-cat', c.id);
    var labelSpan = document.createElement('span');
    labelSpan.textContent = c.label;
    chip.appendChild(labelSpan);
    var delBtn = document.createElement('span');
    delBtn.className = 'mood-delete-btn';
    delBtn.innerHTML = '✕';
    delBtn.onclick = function(e) { e.stopPropagation(); deleteCustomFinCat(c.id); };
    chip.appendChild(delBtn);
    chip.onclick = function() { editingFinCat = c.id; renderFinCatRow(); updateFinSaveBtn(); };
    row.appendChild(chip);
  });
  // Add button
  var addChip = document.createElement('button');
  addChip.className = 'diary-mood-add-chip';
  addChip.innerHTML = '<svg style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>自定义';
  addChip.onclick = function() { openAddFinCatModal(); };
  row.appendChild(addChip);
}
function openAddFinCatModal() {
  var overlay = document.createElement('div');
  overlay.className = 'mood-add-overlay animate-fade-in';
  overlay.id = 'fin-cat-add-overlay';
  overlay.innerHTML = '<div class="mood-add-modal animate-slide-up">' +
    '<h3>添加自定义分类</h3>' +
    '<input id="fin-cat-add-input" type="text" placeholder="输入分类名称" maxlength="8" />' +
    '<div class="mood-add-btns">' +
      '<button class="sig-cancel" onclick="closeAddFinCatModal()">取消</button>' +
      '<button class="sig-confirm" onclick="confirmAddFinCat()">添加</button>' +
    '</div></div>';
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeAddFinCatModal(); });
  document.getElementById('app').appendChild(overlay);
  setTimeout(function(){ document.getElementById('fin-cat-add-input').focus(); }, 100);
}
function closeAddFinCatModal() {
  var el = document.getElementById('fin-cat-add-overlay');
  if (el) el.remove();
}
function confirmAddFinCat() {
  var label = document.getElementById('fin-cat-add-input').value.trim();
  if (!label) return;
  var allCats = getAllFinCats();
  if (allCats.some(function(c){ return c.label === label; })) {
    showFinToast('该分类已存在');
    return;
  }
  var customs = getCustomFinCats();
  customs.push({ id: 'fincat_' + Date.now().toString(36), label: label });
  saveCustomFinCats(customs);
  closeAddFinCatModal();
  renderFinCatRow();
}
function deleteCustomFinCat(id) {
  var customs = getCustomFinCats();
  customs = customs.filter(function(c){ return c.id !== id; });
  saveCustomFinCats(customs);
  if (editingFinCat === id) editingFinCat = '';
  renderFinCatRow();
  updateFinSaveBtn();
}
function updateFinSaveBtn() {
  var amt = parseFloat(document.getElementById('fin-write-amount').value);
  var title = document.getElementById('fin-write-title').value.trim();
  var btn = document.getElementById('fin-save-btn');
  if (amt > 0 && title && editingFinCat) btn.classList.remove('disabled');
  else btn.classList.add('disabled');
}
function saveFinItem() {
  var amt = parseFloat(document.getElementById('fin-write-amount').value);
  var title = document.getElementById('fin-write-title').value.trim();
  if (!amt || !title || !editingFinCat) return;
  var note = document.getElementById('fin-write-note').value.trim();
  var date = document.getElementById('fin-write-date').value || new Date().toISOString().split('T')[0];
  var items = getFinItems();
  if (editingFinId) {
    var idx = items.findIndex(function(x){ return x.id === editingFinId; });
    if (idx >= 0) {
      items[idx].type = editingFinType;
      items[idx].amount = amt;
      items[idx].category = editingFinCat;
      items[idx].title = title;
      items[idx].note = note;
      items[idx].date = date;
    }
    saveFinItems(items);
    closeFinWrite();
    renderFinList();
    notifyFinChanged();
    editingFinId = null;
  } else {
    var newItem = {
      id: 'fin_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      type: editingFinType,
      amount: amt,
      category: editingFinCat,
      title: title,
      note: note,
      date: date,
      author: 'user',
      createdAt: Date.now(),
      hearts: { user: true },
      comments: []
    };
    items.push(newItem);
    saveFinItems(items);
    closeFinWrite();
    renderFinList();
    notifyFinChanged();
    // Ask AI to comment
    window.parent.postMessage({
      type: 'coupleSpaceFinanceCommentRequest',
      charId: currentCharId,
      itemId: newItem.id,
      itemType: newItem.type,
      itemAmount: newItem.amount,
      itemCategory: newItem.category,
      itemTitle: newItem.title,
      itemNote: newItem.note
    }, '*');
    // Ask AI to heart
    window.parent.postMessage({
      type: 'coupleSpaceFinanceHeartRequest',
      charId: currentCharId,
      itemId: newItem.id,
      itemType: newItem.type,
      itemAmount: newItem.amount,
      itemTitle: newItem.title
    }, '*');
  }
}
function editCurrentFin() {
  if (!currentViewingFinId) return;
  var items = getFinItems();
  var item = items.find(function(x){ return x.id === currentViewingFinId; });
  if (!item || item.author !== 'user') return;
  var idToEdit = currentViewingFinId;
  closeFinDetail();
  openFinWrite(idToEdit);
}

// --- Detail ---
function openFinDetail(id) {
  currentViewingFinId = id;
  var items = getFinItems();
  var item = items.find(function(x) { return x.id === id; });
  if (!item) return;
  var cat = getFinCatInfo(item.category);
  var isChar = item.author === 'char';
  var avatar = isChar ? csCharAvatar : csUserAvatar;
  var name = isChar ? csCharName : csUserName;
  var userHearted = item.hearts && item.hearts.user;
  var charHearted = item.hearts && item.hearts.char;
  var amtClass = item.type === 'income' ? 'income' : 'expense';
  var amtPrefix = item.type === 'income' ? '+' : '-';
  var typeLabel = item.type === 'income' ? '收入' : '支出';
  var typeBg = item.type === 'income' ? 'background:#ecfdf5;color:#10b981;border:1px solid #a7f3d0' : 'background:#fef2f2;color:#ef4444;border:1px solid #fecaca';

  var html = '<div class="fin-detail-amount-row">' +
    '<div class="fin-detail-amount ' + amtClass + '">' + amtPrefix + '¥' + (item.amount||0).toFixed(2) + '</div>' +
    '<div class="fin-detail-type-tag" style="' + typeBg + '">' + typeLabel + ' · ' + escHtml(cat.label) + '</div></div>';
  html += '<div class="fin-detail-author-row">' +
    '<div class="fin-detail-avatar" style="background-image:url(' + escAttr(avatar) + ')"></div>' +
    '<div><div class="fin-detail-author-name">' + escHtml(name) + '</div>' +
    '<div class="fin-detail-date">' + fmtRelativeDate(item.createdAt) + '</div></div></div>';
  html += '<div class="fin-detail-info">' +
    '<div class="fin-detail-info-row"><span class="fin-detail-info-label">描述</span><span class="fin-detail-info-value">' + escHtml(item.title || '') + '</span></div>' +
    '<div class="fin-detail-info-row"><span class="fin-detail-info-label">日期</span><span class="fin-detail-info-value">' + escHtml(item.date || '') + '</span></div>' +
    '<div class="fin-detail-info-row"><span class="fin-detail-info-label">分类</span><span class="fin-detail-info-value">' + escHtml(cat.label) + '</span></div></div>';
  if (item.note) {
    html += '<div class="fin-detail-note">' + escHtml(item.note) + '</div>';
  }
  // Hearts
  html += '<div class="fin-detail-hearts">' +
    '<button class="fin-detail-heart-btn' + (userHearted ? ' active' : '') + '" onclick="toggleFinHeart(\'' + id + '\',\'user\')">' +
      '<svg style="width:16px;height:16px" fill="' + (userHearted ? '#fb7185' : 'none') + '" stroke="' + (userHearted ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + escHtml(csUserName) +
    '</button>' +
    '<button class="fin-detail-heart-btn' + (charHearted ? ' active' : '') + '" style="pointer-events:none">' +
      '<svg style="width:16px;height:16px" fill="' + (charHearted ? '#fb7185' : 'none') + '" stroke="' + (charHearted ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + escHtml(csCharName) +
    '</button></div>';
  // Comments
  html += '<div class="mood-comments-section"><div class="mood-comments-title">评论</div>';
  var comments = item.comments || [];
  if (comments.length === 0) {
    html += '<div class="mood-comment-empty">暂无评论</div>';
  } else {
    comments.forEach(function(c) {
      var cIsChar = c.author === 'char';
      var cAvatar = cIsChar ? csCharAvatar : csUserAvatar;
      var cName = cIsChar ? csCharName : csUserName;
      html += '<div class="mood-comment-item">' +
        '<div class="mood-comment-avatar" style="background-image:url(' + escAttr(cAvatar) + ')"></div>' +
        '<div class="mood-comment-body">' +
          '<span class="mood-comment-name">' + escHtml(cName) + '</span>' +
          '<span class="mood-comment-time">' + fmtRelativeDate(c.timestamp) + '</span>' +
          '<div class="mood-comment-text">' + escHtml(c.content) + '</div>' +
        '</div></div>';
    });
  }
  html += '</div>';

  document.getElementById('fin-detail-scroll').innerHTML = html;
  document.getElementById('fin-detail-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
  document.getElementById('fin-comment-input').value = '';
  updateFinCommentBtn();
}
function closeFinDetail() {
  currentViewingFinId = null;
  document.getElementById('fin-detail-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
  renderFinList();
}
function deleteFinFromDetail() {
  if (!currentViewingFinId) return;
  if (!confirm('确定删除这条记录？')) return;
  var items = getFinItems();
  items = items.filter(function(i) { return i.id !== currentViewingFinId; });
  saveFinItems(items);
  notifyFinChanged();
  closeFinDetail();
}
function toggleFinHeart(id, who) {
  var items = getFinItems();
  var item = items.find(function(x) { return x.id === id; });
  if (!item) return;
  if (!item.hearts) item.hearts = {};
  item.hearts[who] = !item.hearts[who];
  saveFinItems(items);
  notifyFinChanged();
  openFinDetail(id);
  if (who === 'user' && item.hearts.user) {
    window.parent.postMessage({
      type: 'coupleSpaceFinanceHeartRequest',
      charId: currentCharId,
      itemId: id,
      itemType: item.type,
      itemAmount: item.amount,
      itemTitle: item.title
    }, '*');
  }
}
function updateFinCommentBtn() {
  var val = document.getElementById('fin-comment-input').value.trim();
  var btn = document.getElementById('fin-comment-send');
  if (val) btn.classList.remove('disabled');
  else btn.classList.add('disabled');
}
function sendFinComment() {
  var val = document.getElementById('fin-comment-input').value.trim();
  if (!val || !currentViewingFinId) return;
  var items = getFinItems();
  var item = items.find(function(x) { return x.id === currentViewingFinId; });
  if (!item) return;
  if (!item.comments) item.comments = [];
  item.comments.push({ author: 'user', content: val, timestamp: Date.now() });
  saveFinItems(items);
  notifyFinChanged();
  document.getElementById('fin-comment-input').value = '';
  updateFinCommentBtn();
  openFinDetail(currentViewingFinId);
  window.parent.postMessage({
    type: 'coupleSpaceFinanceCommentRequest',
    charId: currentCharId,
    itemId: currentViewingFinId,
    itemType: item.type,
    itemAmount: item.amount,
    itemCategory: item.category,
    itemTitle: item.title,
    itemNote: (item.note || '') + '\n\n用户评论: ' + val
  }, '*');
}

function showFinToast(msg) {
  var toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1c1917;color:white;padding:10px 24px;border-radius:9999px;font-size:13px;z-index:100;pointer-events:none;animation:fadeIn .2s ease';
  toast.textContent = msg;
  document.getElementById('app').appendChild(toast);
  setTimeout(function() { toast.remove(); }, 2000);
}
</script>

<script>
// --- Finance message handlers ---
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'coupleSpaceFinanceAiResult') {
    if (e.data.error) {
      showFinToast('记账失败，请重试');
      aiWritingFin = false;
      renderFinList();
      return;
    }
    var items = getFinItems();
    var newItem = {
      id: 'fin_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      type: e.data.finType || 'expense',
      amount: e.data.amount || 0,
      category: e.data.category || '',
      title: e.data.title || '',
      note: e.data.note || '',
      date: new Date().toISOString().split('T')[0],
      author: 'char',
      createdAt: Date.now(),
      hearts: { char: true },
      comments: []
    };
    items.push(newItem);
    saveFinItems(items);
    aiWritingFin = false;
    renderFinList();
    showFinToast((csCharName || 'TA') + '记了一笔账');
    notifyFinChanged();
  }

  if (e.data && e.data.type === 'coupleSpaceFinanceCommentResult') {
    if (e.data.error) return;
    var items = getFinItems();
    var item = items.find(function(i) { return i.id === e.data.itemId; });
    if (item) {
      if (!item.comments) item.comments = [];
      item.comments.push({ author: 'char', content: e.data.comment, timestamp: Date.now() });
      saveFinItems(items);
      if (currentViewingFinId === e.data.itemId) openFinDetail(e.data.itemId);
      notifyFinChanged();
    }
  }

  if (e.data && e.data.type === 'coupleSpaceFinanceHeartResult') {
    if (e.data.liked) {
      var items = getFinItems();
      var item = items.find(function(i) { return i.id === e.data.itemId; });
      if (item) {
        if (!item.hearts) item.hearts = {};
        item.hearts.char = true;
        saveFinItems(items);
        if (currentViewingFinId === e.data.itemId) openFinDetail(e.data.itemId);
        else renderFinList();
        showFinToast((csCharName || 'TA') + '也点了爱心');
        notifyFinChanged();
      }
    }
  }

  if (e.data && e.data.type === 'coupleSpaceFinanceAutoResult') {
    var items = getFinItems();
    if (e.data.item && !items.find(function(i) { return i.id === e.data.item.id; })) {
      items.push(e.data.item);
      saveFinItems(items);
      renderFinList();
      showFinToast((csCharName || 'TA') + '记了一笔账');
    }
  }
});
</script>

<script>
// --- Finance Settings ---
var DEFAULT_FIN_PROMPT = '# 你的任务\n你是"{{charName}}"，现在要在情侣空间的记账本里记一笔和伴侣"{{myNickname}}"相关的花销或收入。\n\n# 你的角色设定\n{{aiPersona}}\n\n# 你的伴侣\n- 昵称: {{myNickname}}\n- 人设: {{myPersona}}\n\n{{worldBook}}\n\n{{memoryContext}}\n\n{{shortTermMemory}}\n\n{{linkedMemory}}\n\n{{summaryContext}}\n\n{{anniversaryContext}}\n\n{{existingCharItems}}\n\n{{existingUserItems}}\n\n# 当前时间\n{{currentTime}}\n\n# 输出要求\n请以JSON格式返回，不要输出任何其他内容：\n{"type": "expense或income", "amount": 金额数字, "category": "分类ID", "title": "这笔账的简短描述", "note": "为什么花这笔钱/你的感受"}\n\n分类ID可选值: {{categoryList}}\n\n# 要求\n- 基于你的记忆和最近的对话来记账，不要凭空编造金额\n- 如果最近聊天提到了吃饭、买东西、看电影等消费场景，就记录下来\n- 金额要合理，符合日常消费水平\n- note 要像真人说话，体现你的性格，可以撒娇、吐槽、感慨\n- 不要和已有记录重复\n- 字数控制在 10-60 字\n- 绝对不要提到你是AI';

function openFinSettings() {
  var settings = getFinSettings();
  var overlay = document.createElement('div');
  overlay.className = 'diary-settings-overlay animate-fade-in';
  overlay.id = 'fin-settings-overlay';

  var autoEnabled = settings.autoEnabled || false;
  var aiDecide = settings.aiDecide || false;
  var aiDecideChatProb = settings.aiDecideChatProb ?? 15;
  var aiDecideBgProb = settings.aiDecideBgProb ?? 5;
  var visCharItems = settings.visibleCharItems ?? 10;
  var visUserItems = settings.visibleUserItems ?? 10;
  var enableCustomPrompt = settings.enableCustomPrompt || false;
  var promptText = settings.customPrompt || DEFAULT_FIN_PROMPT;

  overlay.innerHTML = '<div class="diary-settings-sheet animate-slide-up">' +
    '<div class="diary-settings-handle"></div>' +
    '<div class="diary-settings-title">记账设置</div>' +
    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">角色自动记账</div>' +
      '<div class="diary-setting-desc">角色会在设定时间自动记一笔账</div></div>' +
      '<div class="diary-toggle' + (autoEnabled ? ' on' : '') + '" id="fin-toggle-auto" onclick="toggleFinSetting(\'auto\')"></div>' +
    '</div>' +
    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">自动记账时间</div></div>' +
      '<input type="time" class="diary-time-select" id="fin-auto-time" value="' + (settings.autoTime || '22:00') + '" onchange="updateFinAutoTime()" />' +
    '</div>' +
    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">AI 自主决定</div>' +
      '<div class="diary-setting-desc">聊天或后台活动时随机触发，AI 自己决定</div></div>' +
      '<div class="diary-toggle' + (aiDecide ? ' on' : '') + '" id="fin-toggle-decide" onclick="toggleFinSetting(\'decide\')"></div>' +
    '</div>' +

    '<div id="fin-ai-decide-probs" style="' + (aiDecide ? '' : 'display:none') + '">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">聊天触发概率 (%)</div>' +
        '<div class="diary-setting-desc">每次聊天消息后触发的概率</div></div>' +
        '<input type="number" value="' + aiDecideChatProb + '" class="diary-time-select" style="width:70px;text-align:center" onchange="updateFinAiDecideProb()" id="fin-chat-prob" />' +
      '</div>' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">后台触发概率 (%)</div>' +
        '<div class="diary-setting-desc">后台活动每次心跳触发的概率</div></div>' +
        '<input type="number" value="' + aiDecideBgProb + '" class="diary-time-select" style="width:70px;text-align:center" onchange="updateFinAiDecideProb()" id="fin-bg-prob" />' +
      '</div>' +
    '</div>' +

    '<div style="padding-top:16px;margin-top:8px;border-top:1px solid #f0efed">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">AI可见角色记录数</div>' +
        '<div class="diary-setting-desc">AI能看到多少条角色的记账</div></div>' +
        '<input type="number" class="diary-time-select" style="width:60px" id="fin-vis-char" value="' + visCharItems + '" min="0" max="50" onchange="updateFinVisibility()" />' +
      '</div>' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">AI可见用户记录数</div>' +
        '<div class="diary-setting-desc">AI能看到多少条你的记账</div></div>' +
        '<input type="number" class="diary-time-select" style="width:60px" id="fin-vis-user" value="' + visUserItems + '" min="0" max="50" onchange="updateFinVisibility()" />' +
      '</div>' +
    '</div>' +
    '<div style="padding-top:16px;margin-top:8px;border-top:1px solid #f0efed">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">自定义记账提示词</div>' +
        '<div class="diary-setting-desc">自定义 AI 记账时使用的提示词模板</div></div>' +
        '<div class="diary-toggle' + (enableCustomPrompt ? ' on' : '') + '" id="fin-toggle-prompt" onclick="toggleFinPromptSetting()"></div>' +
      '</div>' +
      '<div class="diary-prompt-section" id="fin-prompt-section" style="' + (enableCustomPrompt ? '' : 'display:none') + '">' +
        '<textarea class="diary-prompt-textarea" id="fin-prompt-textarea" placeholder="输入自定义提示词...">' + escHtml(promptText) + '</textarea>' +
        '<div class="diary-prompt-actions">' +
          '<button class="diary-prompt-action-btn" onclick="saveFinPromptText()">保存</button>' +
          '<button class="diary-prompt-action-btn warn" onclick="resetFinPrompt()">重置默认</button>' +
        '</div>' +
        '<div style="margin-top:8px;font-size:11px;color:#a8a29e;line-height:1.5">可用变量: {{charName}} {{myNickname}} {{aiPersona}} {{myPersona}} {{worldBook}} {{memoryContext}} {{shortTermMemory}} {{linkedMemory}} {{summaryContext}} {{existingCharItems}} {{existingUserItems}} {{currentTime}} {{anniversaryContext}} {{categoryList}}</div>' +
      '</div>' +
    '</div>' +
  '</div>';

  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeFinSettings(); });
  document.getElementById('app').appendChild(overlay);
}
function closeFinSettings() {
  var el = document.getElementById('fin-settings-overlay');
  if (el) el.remove();
}
function toggleFinSetting(key) {
  var settings = getFinSettings();
  if (key === 'auto') {
    settings.autoEnabled = !settings.autoEnabled;
    document.getElementById('fin-toggle-auto').classList.toggle('on', settings.autoEnabled);
  } else if (key === 'decide') {
    settings.aiDecide = !settings.aiDecide;
    document.getElementById('fin-toggle-decide').classList.toggle('on', settings.aiDecide);
    var probsDiv = document.getElementById('fin-ai-decide-probs');
    if (probsDiv) probsDiv.style.display = settings.aiDecide ? '' : 'none';
  }
  saveFinSettings(settings);
  notifyFinSettingsChanged();
}
function updateFinAutoTime() {
  var settings = getFinSettings();
  settings.autoTime = document.getElementById('fin-auto-time').value;
  saveFinSettings(settings);
  notifyFinSettingsChanged();
}
function updateFinAiDecideProb() {
  var settings = getFinSettings();
  settings.aiDecideChatProb = parseInt(document.getElementById('fin-chat-prob').value) || 15;
  settings.aiDecideBgProb = parseInt(document.getElementById('fin-bg-prob').value) || 5;
  saveFinSettings(settings);
  notifyFinSettingsChanged();
}
function updateFinVisibility() {
  var settings = getFinSettings();
  settings.visibleCharItems = parseInt(document.getElementById('fin-vis-char').value) || 10;
  settings.visibleUserItems = parseInt(document.getElementById('fin-vis-user').value) || 10;
  saveFinSettings(settings);
  notifyFinSettingsChanged();
}
function toggleFinPromptSetting() {
  var settings = getFinSettings();
  settings.enableCustomPrompt = !settings.enableCustomPrompt;
  saveFinSettings(settings);
  document.getElementById('fin-toggle-prompt').classList.toggle('on', settings.enableCustomPrompt);
  document.getElementById('fin-prompt-section').style.display = settings.enableCustomPrompt ? '' : 'none';
  if (settings.enableCustomPrompt && !settings.customPrompt) {
    document.getElementById('fin-prompt-textarea').value = DEFAULT_FIN_PROMPT;
  }
}
function saveFinPromptText() {
  var settings = getFinSettings();
  settings.customPrompt = document.getElementById('fin-prompt-textarea').value;
  saveFinSettings(settings);
  notifyFinSettingsChanged();
  showFinToast('提示词已保存');
}
function resetFinPrompt() {
  document.getElementById('fin-prompt-textarea').value = DEFAULT_FIN_PROMPT;
  var settings = getFinSettings();
  settings.customPrompt = '';
  saveFinSettings(settings);
  notifyFinSettingsChanged();
  showFinToast('已重置为默认');
}
</script>
</body>
</html>
