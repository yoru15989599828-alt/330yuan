// --- Request AI Timeline ---
function requestAiTl() {
  closeTlFab();
  if (aiWritingTl) return;
  aiWritingTl = true;
  renderTlList();
  var settings = getTlSettings();
  var items = getTlItems();
  var charItems = items.filter(function(i) { return i.author === 'char'; }).slice(-( settings.visibleCharItems || 10));
  var userItems = items.filter(function(i) { return i.author === 'user'; }).slice(-(settings.visibleUserItems || 10));
  window.parent.postMessage({
    type: 'coupleSpaceTimelineAiRequest',
    charId: currentCharId,
    existingItems: items,
    charItems: charItems,
    userItems: userItems,
    timelineSettings: settings
  }, '*');
}

// --- Write ---
var editingTlId = null;
function openTlWrite(existingId) {
  closeTlFab();
  editingTlId = existingId || null;
  editingTlCategory = 'moment';
  document.getElementById('tl-write-title').value = '';
  document.getElementById('tl-write-content').value = '';
  if (existingId) {
    var items = getTlItems();
    var item = items.find(function(x){ return x.id === existingId; });
    if (item) {
      document.getElementById('tl-write-title').value = item.title || '';
      document.getElementById('tl-write-content').value = item.content || '';
      editingTlCategory = item.category || 'moment';
    }
  }
  renderTlCatRow();
  document.getElementById('tl-write-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
}
function closeTlWrite() {
  document.getElementById('tl-write-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
}
function renderTlCatRow() {
  var row = document.getElementById('tl-cat-row');
  row.innerHTML = '';
  var allCats = getAllTlCategories();
  var customIds = getCustomTlCategories().map(function(c){ return c.id; });
  allCats.forEach(function(c) {
    var chip = document.createElement('button');
    var isCustom = customIds.indexOf(c.id) !== -1;
    chip.className = 'tl-write-cat-chip' + (isCustom ? ' custom-cat' : '') + (editingTlCategory === c.id ? ' active' : '');
    chip.setAttribute('data-cat', c.id);
    var labelSpan = document.createElement('span');
    labelSpan.textContent = c.label;
    chip.appendChild(labelSpan);
    if (isCustom) {
      var delBtn = document.createElement('span');
      delBtn.className = 'cat-delete-btn';
      delBtn.innerHTML = '✕';
      delBtn.onclick = function(e) { e.stopPropagation(); deleteCustomTlCategory(c.id); };
      chip.appendChild(delBtn);
    }
    chip.onclick = function() { selectTlCat(c.id); };
    row.appendChild(chip);
  });
  var addChip = document.createElement('button');
  addChip.className = 'tl-cat-add-chip';
  addChip.innerHTML = '<svg style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>自定义';
  addChip.onclick = function() { openAddTlCategoryModal(); };
  row.appendChild(addChip);
}

function openAddTlCategoryModal() {
  var overlay = document.createElement('div');
  overlay.className = 'mood-add-overlay animate-fade-in';
  overlay.id = 'tl-cat-add-overlay';
  overlay.innerHTML = '<div class="mood-add-modal animate-slide-up">' +
    '<h3>添加自定义分类</h3>' +
    '<input id="tl-cat-add-input" type="text" placeholder="输入分类名称" maxlength="8" />' +
    '<div class="mood-add-btns">' +
      '<button class="sig-cancel" onclick="closeAddTlCategoryModal()">取消</button>' +
      '<button class="sig-confirm" onclick="confirmAddTlCategory()">添加</button>' +
    '</div></div>';
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeAddTlCategoryModal(); });
  document.getElementById('app').appendChild(overlay);
  setTimeout(function(){ document.getElementById('tl-cat-add-input').focus(); }, 100);
}
function closeAddTlCategoryModal() {
  var el = document.getElementById('tl-cat-add-overlay');
  if (el) el.remove();
}
function confirmAddTlCategory() {
  var input = document.getElementById('tl-cat-add-input');
  var label = input.value.trim();
  if (!label) return;
  var allCats = getAllTlCategories();
  if (allCats.some(function(c){ return c.label === label; })) {
    showTlToast('该分类已存在');
    return;
  }
  var customs = getCustomTlCategories();
  customs.push({ id: 'tlcat_' + Date.now().toString(36), label: label, color: '#78716c' });
  saveCustomTlCategories(customs);
  closeAddTlCategoryModal();
  renderTlCatRow();
}
function deleteCustomTlCategory(id) {
  var customs = getCustomTlCategories();
  customs = customs.filter(function(c){ return c.id !== id; });
  saveCustomTlCategories(customs);
  if (editingTlCategory === id) editingTlCategory = 'moment';
  renderTlCatRow();
}
function selectTlCat(id) {
  editingTlCategory = id;
  renderTlCatRow();
}
function saveTlItem() {
  var title = document.getElementById('tl-write-title').value.trim();
  var content = document.getElementById('tl-write-content').value.trim();
  if (!title || !content) return;
  var items = getTlItems();
  if (editingTlId) {
    var idx = items.findIndex(function(x){ return x.id === editingTlId; });
    if (idx >= 0) {
      items[idx].title = title;
      items[idx].content = content;
      items[idx].category = editingTlCategory;
    }
    saveTlItems(items);
    closeTlWrite();
    renderTlList();
    notifyTlChanged();
    editingTlId = null;
  } else {
    var newItem = {
      id: 'tl_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      title: title,
      content: content,
      category: editingTlCategory,
      author: 'user',
      createdAt: Date.now(),
      hearts: { user: true },
      comments: []
    };
    items.push(newItem);
    saveTlItems(items);
    closeTlWrite();
    renderTlList();
    notifyTlChanged();
    // Ask AI to comment
    window.parent.postMessage({
      type: 'coupleSpaceTimelineCommentRequest',
      charId: currentCharId,
      itemId: newItem.id,
      itemTitle: title,
      itemContent: content,
      itemCategory: editingTlCategory,
      itemAuthor: 'user'
    }, '*');
    // Ask AI to heart
    window.parent.postMessage({
      type: 'coupleSpaceTimelineHeartRequest',
      charId: currentCharId,
      itemId: newItem.id,
      itemContent: title + ': ' + content
    }, '*');
  }
}
function editCurrentTl() {
  if (!currentViewingTlId) return;
  var items = getTlItems();
  var item = items.find(function(x){ return x.id === currentViewingTlId; });
  if (!item || item.author !== 'user') return;
  var idToEdit = currentViewingTlId;
  closeTlDetail();
  openTlWrite(idToEdit);
}

// --- Detail ---
function openTlDetail(id) {
  var items = getTlItems();
  var item = items.find(function(x) { return x.id === id; });
  if (!item) return;
  currentViewingTlId = id;
  var isChar = item.author === 'char';
  var avatar = isChar ? csCharAvatar : csUserAvatar;
  var name = isChar ? csCharName : csUserName;
  var cat = getTlCategoryInfo(item.category);
  var d = new Date(item.createdAt);
  var dateStr = d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');

  var userHearted = item.hearts && item.hearts.user;
  var charHearted = item.hearts && item.hearts.char;

  var html = '<div class="tl-detail-tags"><span class="tl-card-tag" style="background:' + (cat.color || '#78716c') + '15;color:' + (cat.color || '#78716c') + '">' + cat.label + '</span></div>' +
    '<div class="tl-detail-title">' + escHtml(item.title) + '</div>' +
    '<div class="tl-detail-author-row">' +
      '<div class="tl-detail-avatar" style="background-image:url(' + escAttr(avatar) + ')"></div>' +
      '<div><div class="tl-detail-author-name">' + escHtml(name) + '</div>' +
      '<div class="tl-detail-date">' + dateStr + '</div></div>' +
    '</div>' +
    '<div class="tl-detail-content">' + escHtml(item.content) + '</div>' +
    '<div class="tl-detail-hearts">' +
      '<button class="tl-detail-heart-btn' + (userHearted ? ' active' : '') + '" onclick="toggleTlHeart(\'' + id + '\',\'user\')">' +
        '<svg style="width:16px;height:16px" fill="' + (userHearted ? '#fb7185' : 'none') + '" stroke="' + (userHearted ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
        escHtml(csUserName) +
      '</button>' +
      '<button class="tl-detail-heart-btn' + (charHearted ? ' active' : '') + '" style="pointer-events:none">' +
        '<svg style="width:16px;height:16px" fill="' + (charHearted ? '#fb7185' : 'none') + '" stroke="' + (charHearted ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
        escHtml(csCharName) +
      '</button>' +
    '</div>';

  // Comments
  if (item.comments && item.comments.length > 0) {
    html += '<div class="tl-detail-comments">';
    item.comments.forEach(function(c) {
      var cIsChar = c.author === 'char';
      var cAvatar = cIsChar ? csCharAvatar : csUserAvatar;
      var cName = cIsChar ? csCharName : csUserName;
      html += '<div class="tl-detail-comment">' +
        '<div class="tl-detail-comment-avatar" style="background-image:url(' + escAttr(cAvatar) + ')"></div>' +
        '<div class="tl-detail-comment-body">' +
          '<div class="tl-detail-comment-name">' + escHtml(cName) + '</div>' +
          '<div class="tl-detail-comment-text">' + escHtml(c.content) + '</div>' +
          '<div class="tl-detail-comment-time">' + fmtRelativeDate(c.timestamp) + '</div>' +
        '</div></div>';
    });
    html += '</div>';
  }

  document.getElementById('tl-detail-scroll').innerHTML = html;
  document.getElementById('tl-detail-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
}
function closeTlDetail() {
  currentViewingTlId = null;
  document.getElementById('tl-detail-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
  renderTlList();
}
function showTlDeleteConfirm() {
  if (!currentViewingTlId) return;
  if (confirm('确定删除这条时光记录吗？')) {
    var items = getTlItems().filter(function(x) { return x.id !== currentViewingTlId; });
    saveTlItems(items);
    notifyTlChanged();
    closeTlDetail();
  }
}
function toggleTlHeart(id, who) {
  var items = getTlItems();
  var item = items.find(function(x) { return x.id === id; });
  if (!item) return;
  if (!item.hearts) item.hearts = {};
  item.hearts[who] = !item.hearts[who];
  saveTlItems(items);
  notifyTlChanged();
  openTlDetail(id);
  if (who === 'user' && item.hearts.user) {
    window.parent.postMessage({
      type: 'coupleSpaceTimelineHeartRequest',
      charId: currentCharId,
      itemId: id,
      itemContent: item.title + ': ' + item.content
    }, '*');
  }
}
function updateTlCommentBtn() {
  var val = document.getElementById('tl-comment-input').value.trim();
  var btn = document.getElementById('tl-comment-send-btn');
  if (val) btn.classList.remove('disabled');
  else btn.classList.add('disabled');
}
function sendTlComment() {
  var val = document.getElementById('tl-comment-input').value.trim();
  if (!val || !currentViewingTlId) return;
  var items = getTlItems();
  var item = items.find(function(x) { return x.id === currentViewingTlId; });
  if (!item) return;
  if (!item.comments) item.comments = [];
  item.comments.push({ author: 'user', content: val, timestamp: Date.now() });
  saveTlItems(items);
  notifyTlChanged();
  document.getElementById('tl-comment-input').value = '';
  updateTlCommentBtn();
  openTlDetail(currentViewingTlId);
  // Ask AI to reply
  window.parent.postMessage({
    type: 'coupleSpaceTimelineCommentRequest',
    charId: currentCharId,
    itemId: currentViewingTlId,
    itemTitle: item.title,
    itemContent: item.content + '\n\n用户评论: ' + val,
    itemCategory: item.category,
    itemAuthor: item.author
  }, '*');
}

function toggleTlSetting(key) {
  var settings = getTlSettings();
  if (key === 'auto') {
    settings.autoEnabled = !settings.autoEnabled;
    document.getElementById('tl-toggle-auto').classList.toggle('on', settings.autoEnabled);
  } else if (key === 'decide') {
    settings.aiDecide = !settings.aiDecide;
    document.getElementById('tl-toggle-decide').classList.toggle('on', settings.aiDecide);
    var probsDiv = document.getElementById('tl-ai-decide-probs');
    if (probsDiv) probsDiv.style.display = settings.aiDecide ? '' : 'none';
  }
  saveTlSettings(settings);
  notifyTlSettingsChanged();
}

function updateTlAutoTime() {
  var settings = getTlSettings();
  settings.autoTime = document.getElementById('tl-auto-time').value;
  saveTlSettings(settings);
  notifyTlSettingsChanged();
}

function updateTlAiDecideProb() {
  var settings = getTlSettings();
  settings.aiDecideChatProb = parseInt(document.getElementById('tl-chat-prob').value) || 15;
  settings.aiDecideBgProb = parseInt(document.getElementById('tl-bg-prob').value) || 5;
  saveTlSettings(settings);
  notifyTlSettingsChanged();
}

function updateTlVisibility() {
  var settings = getTlSettings();
  settings.visibleCharItems = parseInt(document.getElementById('tl-vis-char').value) || 10;
  settings.visibleUserItems = parseInt(document.getElementById('tl-vis-user').value) || 10;
  saveTlSettings(settings);
  notifyTlSettingsChanged();
}

function toggleTlPromptSetting() {
  var settings = getTlSettings();
  settings.enableCustomPrompt = !settings.enableCustomPrompt;
  saveTlSettings(settings);
  var toggle = document.getElementById('tl-toggle-prompt');
  toggle.classList.toggle('on', settings.enableCustomPrompt);
  var section = document.getElementById('tl-prompt-section');
  section.style.display = settings.enableCustomPrompt ? '' : 'none';
  if (settings.enableCustomPrompt && !settings.customPrompt) {
    document.getElementById('tl-prompt-textarea').value = DEFAULT_TL_PROMPT;
  }
}

function saveTlPromptText() {
  var settings = getTlSettings();
  settings.customPrompt = document.getElementById('tl-prompt-textarea').value;
  saveTlSettings(settings);
  notifyTlSettingsChanged();
  showTlToast('提示词已保存');
}

function resetTlPrompt() {
  document.getElementById('tl-prompt-textarea').value = DEFAULT_TL_PROMPT;
  var settings = getTlSettings();
  settings.customPrompt = '';
  saveTlSettings(settings);
  notifyTlSettingsChanged();
  showTlToast('已重置为默认');
}

// --- Message handlers from parent ---
window.addEventListener('message', function(e) {
  // AI generated timeline item
  if (e.data && e.data.type === 'coupleSpaceTimelineAiResult') {
    if (e.data.error) {
      showTlToast('记录失败，请重试');
      aiWritingTl = false;
      renderTlList();
      return;
    }
    var items = getTlItems();
    items.push({
      id: 'tl_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      title: e.data.title,
      content: e.data.content,
      category: e.data.category || 'moment',
      author: 'char',
      createdAt: Date.now(),
      hearts: { char: true },
      comments: []
    });
    saveTlItems(items);
    aiWritingTl = false;
    renderTlList();
    showTlToast((csCharName || 'TA') + '记录了一个瞬间');
    notifyTlChanged();
  }

  // AI comment result
  if (e.data && e.data.type === 'coupleSpaceTimelineCommentResult') {
    if (e.data.error || !e.data.comment) return;
    var items = getTlItems();
    var item = items.find(function(x) { return x.id === e.data.itemId; });
    if (item) {
      if (!item.comments) item.comments = [];
      item.comments.push({ author: 'char', content: e.data.comment, timestamp: Date.now() });
      saveTlItems(items);
      if (currentViewingTlId === e.data.itemId) openTlDetail(e.data.itemId);
      else renderTlList();
      notifyTlChanged();
    }
  }

  // AI heart result
  if (e.data && e.data.type === 'coupleSpaceTimelineHeartResult') {
    if (!e.data.liked) return;
    var items = getTlItems();
    var item = items.find(function(x) { return x.id === e.data.itemId; });
    if (item) {
      if (!item.hearts) item.hearts = {};
      item.hearts.char = true;
      saveTlItems(items);
      if (currentViewingTlId === e.data.itemId) openTlDetail(e.data.itemId);
      else renderTlList();
      showTlToast((csCharName || 'TA') + '也点了爱心');
      notifyTlChanged();
    }
  }

  // Auto timeline result
  if (e.data && e.data.type === 'coupleSpaceTimelineAutoResult') {
    var items = getTlItems();
    items.push(e.data.item);
    saveTlItems(items);
    renderTlList();
    showTlToast((csCharName || 'TA') + '记录了一个瞬间');
  }
});
</script>

<script>
// ===== MOOD (心情) =====
var MOOD_TYPES = [
  { id: 'happy', label: '开心', color: '#f43f5e' },
  { id: 'sweet', label: '甜蜜', color: '#ec4899' },
  { id: 'calm', label: '平静', color: '#3b82f6' },
  { id: 'miss', label: '想你', color: '#a855f7' },
  { id: 'excited', label: '兴奋', color: '#f59e0b' },
  { id: 'tired', label: '疲惫', color: '#6b7280' },
  { id: 'sad', label: '难过', color: '#64748b' },
  { id: 'angry', label: '生气', color: '#ef4444' },
  { id: 'anxious', label: '焦虑', color: '#8b5cf6' },
  { id: 'grateful', label: '感恩', color: '#10b981' }
];
var moodFabOpen = false;
var aiWritingMood = false;
var currentViewingMoodId = null;
var editingMoodType = '';

function getCustomMoodTypes() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleCustomMoodTypes_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveCustomMoodTypes(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleCustomMoodTypes_' + currentCharId, JSON.stringify(list));
}
function getAllMoodTypes() {
  return MOOD_TYPES.concat(getCustomMoodTypes());
}
function getMoodTypeInfo(id) {
  var all = getAllMoodTypes();
  var t = all.find(function(x) { return x.id === id; });
  return t || { id: id, label: id, color: '#78716c' };
}

// --- Storage ---
function getMoods() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleMoods_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveMoods(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleMoods_' + currentCharId, JSON.stringify(list));
}
function getMoodSettings() {
  if (!currentCharId) return {};
  try { return JSON.parse(localStorage.getItem('coupleMoodSettings_' + currentCharId)) || {}; }
  catch(e) { return {}; }
}
function saveMoodSettings(s) {
  if (!currentCharId) return;
  localStorage.setItem('coupleMoodSettings_' + currentCharId, JSON.stringify(s));
}

function notifyMoodChanged() {
  window.parent.postMessage({
    type: 'coupleSpaceMoodChanged',
    charId: currentCharId,
    items: getMoods()
  }, '*');
}
function notifyMoodSettingsChanged() {
  window.parent.postMessage({
    type: 'coupleSpaceMoodSettingsChanged',
    charId: currentCharId,
    settings: getMoodSettings()
  }, '*');
}

// --- List ---
function renderMoodList() {
  var container = document.getElementById('mood-list-container');
  if (!container) return;
  var moods = getMoods();
  moods.sort(function(a, b) { return b.createdAt - a.createdAt; });

  if (moods.length === 0 && !aiWritingMood) {
    container.innerHTML = '<div class="mood-empty">' +
      '<svg class="mood-empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>' +
      '<span class="mood-empty-text">还没有心情记录</span></div>';
    return;
  }

  var html = '';
  if (aiWritingMood) {
    html += '<div class="mood-ai-writing"><div class="diary-ai-dots"><span></span><span></span><span></span></div>' + escHtml(csCharName) + ' 正在记录心情...</div>';
  }
  moods.forEach(function(m) {
    var info = getMoodTypeInfo(m.moodType);
    var isChar = m.author === 'char';
    var name = isChar ? csCharName : csUserName;
    var commentCount = (m.comments || []).length;
    var heartCount = 0;
    if (m.hearts) { if (m.hearts.user) heartCount++; if (m.hearts.char) heartCount++; }

    html += '<div class="mood-card" onclick="openMoodDetail(\'' + m.id + '\')">' +
      '<div class="mood-card-top">' +
        '<div class="mood-card-dot" style="background:' + info.color + '20"><div class="mood-card-dot-inner" style="background:' + info.color + '"></div></div>' +
        '<div class="mood-card-meta"><div class="mood-card-label">' + escHtml(info.label) + '</div>' +
        '<div class="mood-card-info"><span class="mood-card-author">' + escHtml(name) + '</span>' +
        '<span class="mood-card-date">' + fmtRelativeDate(m.createdAt) + '</span></div></div>' +
      '</div>' +
      (m.content ? '<div class="mood-card-content">' + escHtml(m.content) + '</div>' : '') +
      '<div class="mood-card-footer">' +
        '<span class="mood-card-heart' + (heartCount > 0 ? ' active' : '') + '">' +
        '<svg style="width:14px;height:14px" fill="' + (heartCount > 0 ? '#fb7185' : 'none') + '" stroke="' + (heartCount > 0 ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + heartCount + '</span>' +
        '<svg style="width:14px;height:14px;margin-left:auto;color:#c8c5c2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
        '<span>' + commentCount + '</span>' +
      '</div></div>';
  });
  container.innerHTML = html;
}

// --- FAB ---
function toggleMoodFab() {
  moodFabOpen = !moodFabOpen;
  var menu = document.getElementById('mood-fab-menu');
  var btn = document.getElementById('mood-fab-btn');
  if (moodFabOpen) {
    menu.style.display = 'flex';
    menu.innerHTML =
      '<div class="album-fab-option animate-fade-in" onclick="openMoodWrite()">' +
        '<svg style="width:18px;height:18px;color:#78716c;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>' +
        '我来记' +
      '</div>' +
      '<div class="album-fab-option animate-fade-in" onclick="requestAiMood()">' +
        '<svg style="width:18px;height:18px;color:#78716c;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>' +
        '让TA记' +
      '</div>';
    btn.innerHTML = '<svg class="icon-lg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  } else {
    menu.style.display = 'none';
    btn.innerHTML = SVG_PLUS;
  }
}
function closeMoodFab() { if (moodFabOpen) toggleMoodFab(); }

// --- Request AI Mood ---
function requestAiMood() {
  closeMoodFab();
  if (aiWritingMood) return;
  aiWritingMood = true;
  renderMoodList();
  var settings = getMoodSettings();
  window.parent.postMessage({
    type: 'coupleSpaceMoodAiRequest',
    charId: currentCharId,
    existingMoods: getMoods(),
    moodSettings: settings
  }, '*');
}

// --- Write Mood ---
var editingMoodId = null;
function openMoodWrite(existingId) {
  closeMoodFab();
  editingMoodId = existingId || null;
  editingMoodType = '';
  document.getElementById('mood-write-content').value = '';
  if (existingId) {
    var moods = getMoods();
    var m = moods.find(function(x){ return x.id === existingId; });
    if (m) {
      document.getElementById('mood-write-content').value = m.content || '';
      editingMoodType = m.moodType || '';
    }
  }
  renderMoodTypeRow();
  updateMoodSaveBtn();
  document.getElementById('mood-write-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
}
function closeMoodWrite() {
  document.getElementById('mood-write-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
}
function updateMoodSaveBtn() {
  var btn = document.getElementById('mood-save-btn');
  if (editingMoodType) btn.classList.remove('disabled');
  else btn.classList.add('disabled');
}

function renderMoodTypeRow() {
  var row = document.getElementById('mood-type-row');
  row.innerHTML = '';
  var allTypes = getAllMoodTypes();
  var customIds = getCustomMoodTypes().map(function(c){ return c.id; });
  allTypes.forEach(function(t) {
    var chip = document.createElement('button');
    var isCustom = customIds.indexOf(t.id) !== -1;
    chip.className = 'mood-type-chip' + (isCustom ? ' custom-mood' : '') + (editingMoodType === t.id ? ' active' : '');
    chip.setAttribute('data-type', t.id);
    var dot = document.createElement('span');
    dot.className = 'mood-type-dot';
    dot.style.background = t.color;
    chip.appendChild(dot);
    var labelSpan = document.createElement('span');
    labelSpan.textContent = t.label;
    chip.appendChild(labelSpan);
    if (isCustom) {
      var delBtn = document.createElement('span');
      delBtn.className = 'mood-delete-btn';
      delBtn.innerHTML = '✕';
      delBtn.onclick = function(e) { e.stopPropagation(); deleteCustomMoodType(t.id); };
      chip.appendChild(delBtn);
    }
    chip.onclick = function() { selectMoodType(t.id); };
    row.appendChild(chip);
  });
  // Add custom button
  var addChip = document.createElement('button');
  addChip.className = 'diary-mood-add-chip';
  addChip.innerHTML = '<svg style="width:14px;height:14px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>自定义';
  addChip.onclick = function() { openAddMoodTypeModal(); };
  row.appendChild(addChip);
}

function selectMoodType(id) {
  editingMoodType = id;
  renderMoodTypeRow();
  updateMoodSaveBtn();
}
function openAddMoodTypeModal() {
  var overlay = document.createElement('div');
  overlay.className = 'mood-add-overlay animate-fade-in';
  overlay.id = 'mood-type-add-overlay';
  overlay.innerHTML = '<div class="mood-add-modal animate-slide-up">' +
    '<h3>添加自定义心情</h3>' +
    '<input id="mood-type-add-label" type="text" placeholder="心情名称" maxlength="8" style="margin-bottom:12px" />' +
    '<input id="mood-type-add-color" type="color" value="#78716c" style="width:100%;height:40px;border:1px solid #e7e5e4;border-radius:0.75rem;cursor:pointer" />' +
    '<div class="mood-add-btns">' +
      '<button class="sig-cancel" onclick="closeAddMoodTypeModal()">取消</button>' +
      '<button class="sig-confirm" onclick="confirmAddMoodType()">添加</button>' +
    '</div></div>';
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeAddMoodTypeModal(); });
  document.getElementById('app').appendChild(overlay);
  setTimeout(function(){ document.getElementById('mood-type-add-label').focus(); }, 100);
}
function closeAddMoodTypeModal() {
  var el = document.getElementById('mood-type-add-overlay');
  if (el) el.remove();
}
function confirmAddMoodType() {
  var label = document.getElementById('mood-type-add-label').value.trim();
  var color = document.getElementById('mood-type-add-color').value;
  if (!label) return;
  var allTypes = getAllMoodTypes();
  if (allTypes.some(function(t){ return t.label === label; })) {
    showMoodToast('该心情已存在');
    return;
  }
  var customs = getCustomMoodTypes();
  customs.push({ id: 'moodtype_' + Date.now().toString(36), label: label, color: color });
  saveCustomMoodTypes(customs);
  closeAddMoodTypeModal();
  renderMoodTypeRow();
}
function deleteCustomMoodType(id) {
  var customs = getCustomMoodTypes();
  customs = customs.filter(function(t){ return t.id !== id; });
  saveCustomMoodTypes(customs);
  if (editingMoodType === id) editingMoodType = '';
  renderMoodTypeRow();
  updateMoodSaveBtn();
}

function saveMoodItem() {
  if (!editingMoodType) return;
  var content = document.getElementById('mood-write-content').value.trim();
  var moods = getMoods();
  if (editingMoodId) {
    var idx = moods.findIndex(function(x){ return x.id === editingMoodId; });
    if (idx >= 0) {
      moods[idx].moodType = editingMoodType;
      moods[idx].content = content;
    }
    saveMoods(moods);
    closeMoodWrite();
    renderMoodList();
    notifyMoodChanged();
    editingMoodId = null;
  } else {
    moods.push({
      id: 'mood_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      moodType: editingMoodType,
      content: content,
      author: 'user',
      createdAt: Date.now(),
      hearts: { user: true },
      comments: []
    });
    saveMoods(moods);
    closeMoodWrite();
    renderMoodList();
    notifyMoodChanged();
    // Ask AI to comment
    var lastMood = moods[moods.length - 1];
    window.parent.postMessage({
      type: 'coupleSpaceMoodCommentRequest',
      charId: currentCharId,
      moodId: lastMood.id,
      moodType: lastMood.moodType,
      moodContent: lastMood.content
    }, '*');
    // Ask AI to heart
    window.parent.postMessage({
      type: 'coupleSpaceMoodHeartRequest',
      charId: currentCharId,
      moodId: lastMood.id,
      moodType: lastMood.moodType,
      moodContent: lastMood.content
    }, '*');
  }
}
function editCurrentMood() {
  if (!currentViewingMoodId) return;
  var moods = getMoods();
  var m = moods.find(function(x){ return x.id === currentViewingMoodId; });
  if (!m || m.author !== 'user') return;
  var idToEdit = currentViewingMoodId;
  closeMoodDetail();
  openMoodWrite(idToEdit);
}

// --- Detail ---
function openMoodDetail(id) {
  currentViewingMoodId = id;
  var moods = getMoods();
  var m = moods.find(function(x) { return x.id === id; });
  if (!m) return;
  var info = getMoodTypeInfo(m.moodType);
  var isChar = m.author === 'char';
  var avatar = isChar ? csCharAvatar : csUserAvatar;
  var name = isChar ? csCharName : csUserName;
  var userHearted = m.hearts && m.hearts.user;
  var charHearted = m.hearts && m.hearts.char;

  var html = '<div class="mood-detail-tag" style="background:' + info.color + '15;color:' + info.color + ';border:1px solid ' + info.color + '30">' +
    '<span class="mood-detail-tag-dot" style="background:' + info.color + '"></span>' + escHtml(info.label) + '</div>';
  html += '<div class="mood-detail-author-row">' +
    '<div class="mood-detail-avatar" style="background-image:url(' + escAttr(avatar) + ')"></div>' +
    '<div><div class="mood-detail-author-name">' + escHtml(name) + '</div>' +
    '<div class="mood-detail-date">' + fmtRelativeDate(m.createdAt) + '</div></div></div>';
  if (m.content) {
    html += '<div class="mood-detail-content">' + escHtml(m.content) + '</div>';
  }

  // Hearts
  html += '<div class="mood-detail-hearts">' +
    '<button class="mood-detail-heart-btn' + (userHearted ? ' active' : '') + '" onclick="toggleMoodHeart(\'' + id + '\',\'user\')">' +
      '<svg style="width:16px;height:16px" fill="' + (userHearted ? '#fb7185' : 'none') + '" stroke="' + (userHearted ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + escHtml(csUserName) +
    '</button>' +
    '<button class="mood-detail-heart-btn' + (charHearted ? ' active' : '') + '" style="pointer-events:none">' +
      '<svg style="width:16px;height:16px" fill="' + (charHearted ? '#fb7185' : 'none') + '" stroke="' + (charHearted ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + escHtml(csCharName) +
    '</button></div>';

  // Comments
  html += '<div class="mood-comments-section"><div class="mood-comments-title">评论</div>';
  var comments = m.comments || [];
  if (comments.length === 0) {
    html += '<div class="mood-comment-empty">暂无评论</div>';
  } else {
    comments.forEach(function(c) {
      var cIsChar = c.author === 'char';
      var cAvatar = cIsChar ? csCharAvatar : csUserAvatar;
      var cName = cIsChar ? csCharName : csUserName;
      html += '<div class="mood-comment-item">' +
        '<div class="mood-comment-avatar" style="background-image:url(' + escAttr(cAvatar) + ')"></div>' +
        '<div class="mood-comment-body">' +
          '<span class="mood-comment-name">' + escHtml(cName) + '</span>' +
          '<span class="mood-comment-time">' + fmtRelativeDate(c.timestamp) + '</span>' +
          '<div class="mood-comment-text">' + escHtml(c.content) + '</div>' +
        '</div></div>';
    });
  }
  html += '</div>';

  document.getElementById('mood-detail-scroll').innerHTML = html;
  document.getElementById('mood-detail-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
  document.getElementById('mood-comment-input').value = '';
  updateMoodCommentBtn();
}

function closeMoodDetail() {
  currentViewingMoodId = null;
  document.getElementById('mood-detail-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
  renderMoodList();
}
function deleteMoodFromDetail() {
  if (!currentViewingMoodId) return;
  if (!confirm('确定删除这条心情？')) return;
  var moods = getMoods();
  moods = moods.filter(function(m) { return m.id !== currentViewingMoodId; });
  saveMoods(moods);
  notifyMoodChanged();
  closeMoodDetail();
}
function toggleMoodHeart(id, who) {
  var moods = getMoods();
  var m = moods.find(function(x) { return x.id === id; });
  if (!m) return;
  if (!m.hearts) m.hearts = {};
  m.hearts[who] = !m.hearts[who];
  saveMoods(moods);
  notifyMoodChanged();
  openMoodDetail(id);
  if (who === 'user' && m.hearts.user) {
    window.parent.postMessage({
      type: 'coupleSpaceMoodHeartRequest',
      charId: currentCharId,
      moodId: id,
      moodType: m.moodType,
      moodContent: m.content
    }, '*');
  }
}
function updateMoodCommentBtn() {
  var val = document.getElementById('mood-comment-input').value.trim();
  var btn = document.getElementById('mood-comment-send');
  if (val) btn.classList.remove('disabled');
  else btn.classList.add('disabled');
}
function sendMoodComment() {
  var val = document.getElementById('mood-comment-input').value.trim();
  if (!val || !currentViewingMoodId) return;
  var moods = getMoods();
  var m = moods.find(function(x) { return x.id === currentViewingMoodId; });
  if (!m) return;
  if (!m.comments) m.comments = [];
  m.comments.push({ author: 'user', content: val, timestamp: Date.now() });
  saveMoods(moods);
  notifyMoodChanged();
  document.getElementById('mood-comment-input').value = '';
  updateMoodCommentBtn();
  openMoodDetail(currentViewingMoodId);
  window.parent.postMessage({
    type: 'coupleSpaceMoodCommentRequest',
    charId: currentCharId,
    moodId: currentViewingMoodId,
    moodType: m.moodType,
    moodContent: m.content + '\n\n用户评论: ' + val
  }, '*');
}

function showMoodToast(msg) {
  var toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1c1917;color:white;padding:10px 24px;border-radius:9999px;font-size:13px;z-index:100;pointer-events:none;animation:fadeIn .2s ease';
  toast.textContent = msg;
  document.getElementById('app').appendChild(toast);
  setTimeout(function() { toast.remove(); }, 2000);
}

// --- Settings ---
var DEFAULT_MOOD_PROMPT = '# 你的任务\n你是"{{charName}}"，现在要在情侣空间记录一条心情。\n心情是简短的情绪快照，记录此刻的感受。\n\n# 你的角色设定\n{{aiPersona}}\n\n# 你的伴侣\n- 昵称: {{myNickname}}\n- 人设: {{myPersona}}\n\n{{worldBook}}\n\n{{memoryContext}}\n\n{{shortTermMemory}}\n\n{{linkedMemory}}\n\n{{summaryContext}}\n\n{{anniversaryContext}}\n\n{{existingCharMoods}}\n\n{{existingUserMoods}}\n\n# 当前时间\n{{currentTime}}\n\n# 输出要求\n请以JSON格式返回，不要输出任何其他内容：\n{"moodType": "心情类型ID", "content": "心情文字"}\n\nmoodType 可选值: happy(开心) sweet(甜蜜) calm(平静) miss(想你) excited(兴奋) tired(疲惫) sad(难过) angry(生气) anxious(焦虑) grateful(感恩)\n\n# 写作要求\n- 心情文字在5-150字之间，简短真实\n- 像发一条心情动态，不是写日记\n- 可以是此刻的感受、对伴侣的想念、一个小感悟\n- 语气符合你的角色设定\n- 基于记忆和最近的对话，不要凭空编造\n- 和之前的心情不要重复\n- 绝对不要提到你是AI';

function openMoodSettings() {
  var settings = getMoodSettings();
  var overlay = document.createElement('div');
  overlay.className = 'diary-settings-overlay animate-fade-in';
  overlay.id = 'mood-settings-overlay';

  var autoEnabled = settings.autoEnabled || false;
  var aiDecide = settings.aiDecide || false;
  var aiDecideChatProb = settings.aiDecideChatProb ?? 15;
  var aiDecideBgProb = settings.aiDecideBgProb ?? 5;
  var visCharMoods = settings.visibleCharMoods ?? 10;
  var visUserMoods = settings.visibleUserMoods ?? 10;
  var enableCustomPrompt = settings.enableCustomPrompt || false;
  var promptText = settings.customPrompt || DEFAULT_MOOD_PROMPT;

  overlay.innerHTML = '<div class="diary-settings-sheet animate-slide-up">' +
    '<div class="diary-settings-handle"></div>' +
    '<div class="diary-settings-title">心情设置</div>' +
    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">角色自动记录心情</div>' +
      '<div class="diary-setting-desc">角色会在设定时间自动记录心情</div></div>' +
      '<div class="diary-toggle' + (autoEnabled ? ' on' : '') + '" id="mood-toggle-auto" onclick="toggleMoodSetting(\'auto\')"></div>' +
    '</div>' +
    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">自动记录时间</div></div>' +
      '<input type="time" class="diary-time-select" id="mood-auto-time" value="' + (settings.autoTime || '21:00') + '" onchange="updateMoodAutoTime()" />' +
    '</div>' +
    '<div class="diary-setting-item">' +
      '<div><div class="diary-setting-label">AI 自主决定</div>' +
      '<div class="diary-setting-desc">聊天或后台活动时随机触发，AI 自己决定</div></div>' +
      '<div class="diary-toggle' + (aiDecide ? ' on' : '') + '" id="mood-toggle-decide" onclick="toggleMoodSetting(\'decide\')"></div>' +
    '</div>' +

    '<div id="mood-ai-decide-probs" style="' + (aiDecide ? '' : 'display:none') + '">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">聊天触发概率 (%)</div>' +
        '<div class="diary-setting-desc">每次聊天消息后触发的概率</div></div>' +
        '<input type="number" value="' + aiDecideChatProb + '" class="diary-time-select" style="width:70px;text-align:center" onchange="updateMoodAiDecideProb()" id="mood-chat-prob" />' +
      '</div>' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">后台触发概率 (%)</div>' +
        '<div class="diary-setting-desc">后台活动每次心跳触发的概率</div></div>' +
        '<input type="number" value="' + aiDecideBgProb + '" class="diary-time-select" style="width:70px;text-align:center" onchange="updateMoodAiDecideProb()" id="mood-bg-prob" />' +
      '</div>' +
    '</div>' +

    '<div style="padding-top:16px;margin-top:8px;border-top:1px solid #f0efed">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">AI可见角色心情数</div>' +
        '<div class="diary-setting-desc">AI能看到多少条角色的心情</div></div>' +
        '<input type="number" class="diary-time-select" style="width:60px" id="mood-vis-char" value="' + visCharMoods + '" min="0" max="50" onchange="updateMoodVisibility()" />' +
      '</div>' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">AI可见用户心情数</div>' +
        '<div class="diary-setting-desc">AI能看到多少条你的心情</div></div>' +
        '<input type="number" class="diary-time-select" style="width:60px" id="mood-vis-user" value="' + visUserMoods + '" min="0" max="50" onchange="updateMoodVisibility()" />' +
      '</div>' +
    '</div>' +
    '<div style="padding-top:16px;margin-top:8px;border-top:1px solid #f0efed">' +
      '<div class="diary-setting-item">' +
        '<div><div class="diary-setting-label">自定义心情生成提示词</div>' +
        '<div class="diary-setting-desc">自定义 AI 记录心情时使用的提示词模板</div></div>' +
        '<div class="diary-toggle' + (enableCustomPrompt ? ' on' : '') + '" id="mood-toggle-prompt" onclick="toggleMoodPromptSetting()"></div>' +
      '</div>' +
      '<div class="diary-prompt-section" id="mood-prompt-section" style="' + (enableCustomPrompt ? '' : 'display:none') + '">' +
        '<textarea class="diary-prompt-textarea" id="mood-prompt-textarea" placeholder="输入自定义提示词...">' + escHtml(promptText) + '</textarea>' +
        '<div class="diary-prompt-actions">' +
          '<button class="diary-prompt-action-btn" onclick="saveMoodPromptText()">保存</button>' +
          '<button class="diary-prompt-action-btn warn" onclick="resetMoodPrompt()">重置默认</button>' +
        '</div>' +
        '<div style="margin-top:8px;font-size:11px;color:#a8a29e;line-height:1.5">可用变量: {{charName}} {{myNickname}} {{aiPersona}} {{myPersona}} {{worldBook}} {{memoryContext}} {{shortTermMemory}} {{linkedMemory}} {{summaryContext}} {{existingCharMoods}} {{existingUserMoods}} {{currentTime}} {{anniversaryContext}}</div>' +
      '</div>' +
    '</div>' +
  '</div>';

  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeMoodSettings(); });
  document.getElementById('app').appendChild(overlay);
}

function closeMoodSettings() {
  var el = document.getElementById('mood-settings-overlay');
  if (el) el.remove();
}
function toggleMoodSetting(key) {
  var settings = getMoodSettings();
  if (key === 'auto') {
    settings.autoEnabled = !settings.autoEnabled;
    document.getElementById('mood-toggle-auto').classList.toggle('on', settings.autoEnabled);
  } else if (key === 'decide') {
    settings.aiDecide = !settings.aiDecide;
    document.getElementById('mood-toggle-decide').classList.toggle('on', settings.aiDecide);
    var probsDiv = document.getElementById('mood-ai-decide-probs');
    if (probsDiv) probsDiv.style.display = settings.aiDecide ? '' : 'none';
  }
  saveMoodSettings(settings);
  notifyMoodSettingsChanged();
}
function updateMoodAutoTime() {
  var settings = getMoodSettings();
  settings.autoTime = document.getElementById('mood-auto-time').value;
  saveMoodSettings(settings);
  notifyMoodSettingsChanged();
}
function updateMoodAiDecideProb() {
  var settings = getMoodSettings();
  settings.aiDecideChatProb = parseInt(document.getElementById('mood-chat-prob').value) || 15;
  settings.aiDecideBgProb = parseInt(document.getElementById('mood-bg-prob').value) || 5;
  saveMoodSettings(settings);
  notifyMoodSettingsChanged();
}
function updateMoodVisibility() {
  var settings = getMoodSettings();
  settings.visibleCharMoods = parseInt(document.getElementById('mood-vis-char').value) || 10;
  settings.visibleUserMoods = parseInt(document.getElementById('mood-vis-user').value) || 10;
  saveMoodSettings(settings);
  notifyMoodSettingsChanged();
}
function toggleMoodPromptSetting() {
  var settings = getMoodSettings();
  settings.enableCustomPrompt = !settings.enableCustomPrompt;
  saveMoodSettings(settings);
  document.getElementById('mood-toggle-prompt').classList.toggle('on', settings.enableCustomPrompt);
  document.getElementById('mood-prompt-section').style.display = settings.enableCustomPrompt ? '' : 'none';
  if (settings.enableCustomPrompt && !settings.customPrompt) {
    document.getElementById('mood-prompt-textarea').value = DEFAULT_MOOD_PROMPT;
  }
}
function saveMoodPromptText() {
  var settings = getMoodSettings();
  settings.customPrompt = document.getElementById('mood-prompt-textarea').value;
  saveMoodSettings(settings);
  notifyMoodSettingsChanged();
  showMoodToast('提示词已保存');
}
function resetMoodPrompt() {
  document.getElementById('mood-prompt-textarea').value = DEFAULT_MOOD_PROMPT;
  var settings = getMoodSettings();
  settings.customPrompt = '';
  saveMoodSettings(settings);
  notifyMoodSettingsChanged();
  showMoodToast('已重置为默认');
}
</script>

<script>
// ===== LETTER (信件) =====
var LETTER_ENVELOPES = [
  { id: 'none', label: '普通' },
  { id: 'love', label: '情书' },
  { id: 'classic', label: '经典' },
  { id: 'seasonal', label: '时令' },
  { id: 'handwrite', label: '手写风' }
];
var letterFabOpen = false;
var aiWritingLetter = false;
var currentViewingLetterId = null;
var editingLetterEnvelope = 'none';
var replyToLetterId = null;

function getLetterEnvelopeLabel(id) {
  var e = LETTER_ENVELOPES.find(function(x) { return x.id === id; });
  return e ? e.label : '';
}

// --- Storage ---
function getLetters() {
  if (!currentCharId) return [];
  try { return JSON.parse(localStorage.getItem('coupleLetters_' + currentCharId)) || []; }
  catch(e) { return []; }
}
function saveLetters(list) {
  if (!currentCharId) return;
  localStorage.setItem('coupleLetters_' + currentCharId, JSON.stringify(list));
}
function getLetterSettings() {
  if (!currentCharId) return {};
  try { return JSON.parse(localStorage.getItem('coupleLetterSettings_' + currentCharId)) || {}; }
  catch(e) { return {}; }
}
function saveLetterSettings(s) {
  if (!currentCharId) return;
  localStorage.setItem('coupleLetterSettings_' + currentCharId, JSON.stringify(s));
}
function notifyLetterChanged() {
  window.parent.postMessage({ type: 'coupleSpaceLetterChanged', charId: currentCharId, items: getLetters() }, '*');
}
function notifyLetterSettingsChanged() {
  window.parent.postMessage({ type: 'coupleSpaceLetterSettingsChanged', charId: currentCharId, settings: getLetterSettings() }, '*');
}

// --- List ---
function renderLetterList() {
  var container = document.getElementById('letter-list-container');
  if (!container) return;
  var letters = getLetters();
  letters.sort(function(a, b) { return b.createdAt - a.createdAt; });

  if (letters.length === 0 && !aiWritingLetter) {
    container.innerHTML = '<div class="letter-empty">' +
      '<svg class="letter-empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>' +
      '<span class="letter-empty-text">还没有信件，写下第一封吧</span></div>';
    return;
  }

  var html = '';
  if (aiWritingLetter) {
    html += '<div class="letter-ai-writing"><div class="diary-ai-dots"><span></span><span></span><span></span></div>' + escHtml(csCharName) + ' 正在写信...</div>';
  }
  letters.forEach(function(l) {
    var isChar = l.author === 'char';
    var avatar = isChar ? csCharAvatar : csUserAvatar;
    var name = isChar ? csCharName : csUserName;
    var heartCount = 0;
    if (l.hearts) { if (l.hearts.user) heartCount++; if (l.hearts.char) heartCount++; }
    var commentCount = (l.comments || []).length;
    var envLabel = getLetterEnvelopeLabel(l.envelope || 'none');
    var envHtml = (envLabel && envLabel !== '普通') ? '<div class="letter-card-envelope"><span class="letter-card-envelope-tag">' + escHtml(envLabel) + '</span></div>' : '';
    var unreadHtml = (!l.read && l.author === 'char') ? '<div class="letter-card-unread"></div>' : '';
    var replyHtml = l.replyTo ? '<span class="letter-card-reply-badge"><svg style="width:12px;height:12px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>回信</span>' : '';

    html += '<div class="letter-card" onclick="openLetterDetail(\'' + l.id + '\')">' +
      unreadHtml + envHtml +
      '<div class="letter-card-top">' +
        '<div class="letter-card-avatar" style="background-image:url(' + escAttr(avatar) + ')"></div>' +
        '<div class="letter-card-meta"><div class="letter-card-author">' + escHtml(name) + '</div>' +
        '<div class="letter-card-date">' + fmtRelativeDate(l.createdAt) + '</div></div>' +
      '</div>' +
      '<div class="letter-card-title">' + escHtml(l.title || '无题') + '</div>' +
      '<div class="letter-card-preview">' + escHtml(l.content || '') + '</div>' +
      '<div class="letter-card-footer">' +
        '<span class="letter-card-heart' + (heartCount > 0 ? ' active' : '') + '"><svg style="width:14px;height:14px" fill="' + (heartCount > 0 ? '#fb7185' : 'none') + '" stroke="' + (heartCount > 0 ? '#fb7185' : 'currentColor') + '" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ' + heartCount + '</span>' +
        '<svg style="width:14px;height:14px;color:#c8c5c2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
        '<span>' + commentCount + '</span>' +
        replyHtml +
      '</div></div>';
  });
  container.innerHTML = html;
}

// --- FAB ---
function toggleLetterFab() {
  letterFabOpen = !letterFabOpen;
  var menu = document.getElementById('letter-fab-menu');
  var btn = document.getElementById('letter-fab-btn');
  if (letterFabOpen) {
    menu.style.display = 'flex';
    menu.innerHTML =
      '<div class="album-fab-option animate-fade-in" onclick="openLetterWrite()">' +
        '<svg style="width:18px;height:18px;color:#78716c;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>' +
        '我来写' +
      '</div>' +
      '<div class="album-fab-option animate-fade-in" onclick="requestAiLetter()">' +
        '<svg style="width:18px;height:18px;color:#78716c;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>' +
        '让TA写' +
      '</div>';
    btn.innerHTML = '<svg class="icon-lg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  } else {
    menu.style.display = 'none';
    btn.innerHTML = SVG_PLUS;
  }
}
function closeLetterFab() { if (letterFabOpen) toggleLetterFab(); }

// --- Request AI Letter ---
function requestAiLetter() {
  closeLetterFab();
  if (aiWritingLetter) return;
  aiWritingLetter = true;
  renderLetterList();
  var settings = getLetterSettings();
  window.parent.postMessage({
    type: 'coupleSpaceLetterAiRequest',
    charId: currentCharId,
    existingLetters: getLetters(),
    letterSettings: settings
  }, '*');
}

// --- Write Letter ---
var editingLetterId = null;
function openLetterWrite(replyId, existingId) {
  closeLetterFab();
  editingLetterId = existingId || null;
  replyToLetterId = replyId || null;
  editingLetterEnvelope = 'none';
  document.getElementById('letter-write-title').value = '';
  document.getElementById('letter-write-content').value = '';
  document.getElementById('letter-write-title-label').textContent = existingId ? '编辑信件' : (replyId ? '回信' : '写信');
  if (existingId) {
    var letters = getLetters();
    var l = letters.find(function(x){ return x.id === existingId; });
    if (l) {
      document.getElementById('letter-write-title').value = l.title || '';
      document.getElementById('letter-write-content').value = l.content || '';
      editingLetterEnvelope = l.envelope || 'none';
    }
  }
  renderLetterEnvelopeRow();
  updateLetterSaveBtn();
  document.getElementById('letter-write-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
}
function closeLetterWrite() {
  replyToLetterId = null;
  document.getElementById('letter-write-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
}
function renderLetterEnvelopeRow() {
  var row = document.getElementById('letter-envelope-row');
  row.innerHTML = '';
  LETTER_ENVELOPES.forEach(function(e) {
    var chip = document.createElement('button');
    chip.className = 'letter-envelope-chip' + (editingLetterEnvelope === e.id ? ' active' : '');
    chip.textContent = e.label;
    chip.onclick = function() { editingLetterEnvelope = e.id; renderLetterEnvelopeRow(); };
    row.appendChild(chip);
  });
}
function updateLetterSaveBtn() {
  var title = document.getElementById('letter-write-title').value.trim();
  var content = document.getElementById('letter-write-content').value.trim();
  var btn = document.getElementById('letter-save-btn');
  if (title && content) btn.classList.remove('disabled');
  else btn.classList.add('disabled');
}
function saveLetterItem() {
  var title = document.getElementById('letter-write-title').value.trim();
  var content = document.getElementById('letter-write-content').value.trim();
  if (!title || !content) return;
  var letters = getLetters();
  if (editingLetterId) {
    var idx = letters.findIndex(function(x){ return x.id === editingLetterId; });
    if (idx >= 0) {
      letters[idx].title = title;
      letters[idx].content = content;
      letters[idx].envelope = editingLetterEnvelope;
    }
    saveLetters(letters);
    closeLetterWrite();
    renderLetterList();
    notifyLetterChanged();
    editingLetterId = null;
  } else {
    var newLetter = {
      id: 'letter_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      title: title,
      content: content,
      envelope: editingLetterEnvelope,
      author: 'user',
      replyTo: replyToLetterId || null,
      read: true,
      readAt: Date.now(),
      createdAt: Date.now(),
      hearts: { user: true },
      comments: []
    };
    letters.push(newLetter);
    saveLetters(letters);
    closeLetterWrite();
    renderLetterList();
    notifyLetterChanged();
    // Ask AI to reply
    window.parent.postMessage({
      type: 'coupleSpaceLetterReplyRequest',
      charId: currentCharId,
      letterId: newLetter.id,
      letterTitle: title,
      letterContent: content,
      letterDate: new Date().toLocaleString('zh-CN')
    }, '*');
    // Ask AI to heart
    window.parent.postMessage({
      type: 'coupleSpaceLetterHeartRequest',
      charId: currentCharId,
      letterId: newLetter.id,
      letterTitle: title,
      letterContent: content
    }, '*');
  }
}
function editCurrentLetter() {
  if (!currentViewingLetterId) return;
  var letters = getLetters();
  var l = letters.find(function(x){ return x.id === currentViewingLetterId; });
  if (!l || l.author !== 'user') return;
  var idToEdit = currentViewingLetterId;
  closeLetterDetail();
  openLetterWrite(null, idToEdit);
}

// --- Detail ---
function openLetterDetail(id) {
  currentViewingLetterId = id;
  var letters = getLetters();
  var l = letters.find(function(x) { return x.id === id; });
  if (!l) return;

  // Mark as read
  if (!l.read && l.author === 'char') {
    l.read = true;
    l.readAt = Date.now();
    saveLetters(letters);
    notifyLetterChanged();
  }

  var isChar = l.author === 'char';
  var avatar = isChar ? csCharAvatar : csUserAvatar;
  var name = isChar ? csCharName : csUserName;
  var userHearted = l.hearts && l.hearts.user;
  var charHearted = l.hearts && l.hearts.char;

  var html = '';
  var envLabel = getLetterEnvelopeLabel(l.envelope || 'none');

      '<button class="letter-detail-action-btn" onclick="requestAiLetterReply(\'' + id + '\')">让TA回信</button>' +
    '</div>';

    html += '<div class="letter-detail-actions">' +
      '<button class="letter-detail-action-btn" onclick="requestAiLetterReply(\'' + id + '\')">让TA回信</button>' +

  html += '<div class="letter-comments-section"><div class="letter-comments-title">批注</div>';

    html += '<div class="letter-comment-empty">暂无批注</div>';
  } else {
    comments.forEach(function(c) {
      var cIsChar = c.author === 'char';
      var cAvatar = cIsChar ? csCharAvatar : csUserAvatar;

        '</div></div>';
    });
  }
  html += '</div>';

  document.getElementById('letter-detail-scroll').innerHTML = html;
  document.getElementById('letter-detail-page').classList.add('active');
  document.getElementById('feature-wrapper').classList.remove('active');
  document.getElementById('letter-comment-input').value = '';

}
function closeLetterDetail() {
  currentViewingLetterId = null;
  document.getElementById('letter-detail-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
  renderLetterList();
}
function deleteLetterFromDetail() {
  if (!currentViewingLetterId) return;
  if (!confirm('确定删除这封信？')) return;
  var letters = getLetters();
  letters = letters.filter(function(l) { return l.id !== currentViewingLetterId; });
  saveLetters(letters);
  notifyLetterChanged();
  closeLetterDetail();
}

function toggleLetterHeart(id, who) {
  var letters = getLetters();
  var l = letters.find(function(x) { return x.id === id; });
  if (!l) return;
  if (!l.hearts) l.hearts = {};
  l.hearts[who] = !l.hearts[who];
  saveLetters(letters);
  notifyLetterChanged();
  openLetterDetail(id);
  if (who === 'user' && l.hearts.user) {
    window.parent.postMessage({
      type: 'coupleSpaceLetterHeartRequest',
      charId: currentCharId,
      letterId: id,
      letterTitle: l.title,
      letterContent: l.content
    }, '*');
  }
}

function requestAiLetterReply(letterId) {
  var letters = getLetters();
  var l = letters.find(function(x) { return x.id === letterId; });
  if (!l) return;
  if (aiWritingLetter) return;
  aiWritingLetter = true;
  closeLetterDetail();
  renderLetterList();
  window.parent.postMessage({
    type: 'coupleSpaceLetterReplyRequest',
    charId: currentCharId,
    letterId: letterId,
    letterTitle: l.title,
    letterContent: l.content,
    letterDate: new Date(l.createdAt).toLocaleString('zh-CN')
  }, '*');
}

function updateLetterCommentBtn() {
  var val = document.getElementById('letter-comment-input').value.trim();
  var btn = document.getElementById('letter-comment-send');
  if (val) btn.classList.remove('disabled');
  else btn.classList.add('disabled');
}
function sendLetterComment() {
  var val = document.getElementById('letter-comment-input').value.trim();
  if (!val || !currentViewingLetterId) return;
  var letters = getLetters();
  var l = letters.find(function(x) { return x.id === currentViewingLetterId; });
  if (!l) return;
  if (!l.comments) l.comments = [];
  l.comments.push({ author: 'user', content: val, timestamp: Date.now() });
  saveLetters(letters);
  notifyLetterChanged();
  document.getElementById('letter-comment-input').value = '';
  updateLetterCommentBtn();
  openLetterDetail(currentViewingLetterId);
  // Ask AI to comment
  window.parent.postMessage({
    type: 'coupleSpaceLetterCommentRequest',
    charId: currentCharId,
    letterId: currentViewingLetterId,
    letterTitle: l.title,
    letterContent: l.content,
    userComment: val
  }, '*');
}

<script>
// --- Letter handlers from parent ---
window.addEventListener('message', function(e) {
  // AI generated letter
  if (e.data && e.data.type === 'coupleSpaceLetterAiResult') {
    if (e.data.error) {
      showLetterToast('写信失败，请重试');
      aiWritingLetter = false;
      renderLetterList();
      return;
    }
    var letters = getLetters();
    var newLetter = {
      id: 'letter_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      title: e.data.title,
      content: e.data.content,
      envelope: e.data.envelope || 'none',
      author: 'char',
      replyTo: null,
      read: false,
      readAt: null,
      createdAt: Date.now(),
      hearts: { char: true },
      comments: []
    };
    letters.push(newLetter);
    saveLetters(letters);
    aiWritingLetter = false;
    renderLetterList();
    showLetterToast((csCharName || 'TA') + '写了一封信');
    notifyLetterChanged();
  }

  // AI reply letter
  if (e.data && e.data.type === 'coupleSpaceLetterReplyResult') {
    if (e.data.error) {
      aiWritingLetter = false;
      renderLetterList();
      return;
    }
    var letters = getLetters();
    var replyLetter = {
      id: 'letter_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      title: e.data.title,
      content: e.data.content,
      envelope: e.data.envelope || 'none',
      author: 'char',
      replyTo: e.data.letterId || null,
      read: false,
      readAt: null,
      createdAt: Date.now(),
      hearts: { char: true },
      comments: []
    };
    letters.push(replyLetter);
    saveLetters(letters);
    aiWritingLetter = false;
    renderLetterList();
    showLetterToast((csCharName || 'TA') + '回了一封信');
    notifyLetterChanged();
  }

  // AI comment result
  if (e.data && e.data.type === 'coupleSpaceLetterCommentResult') {
    if (e.data.error || !e.data.comment) return;
    var letters = getLetters();
    var letter = letters.find(function(l) { return l.id === e.data.letterId; });
    if (letter) {
      if (!letter.comments) letter.comments = [];
      letter.comments.push({ author: 'char', content: e.data.comment, timestamp: Date.now() });
      saveLetters(letters);
      if (currentViewingLetterId === e.data.letterId) openLetterDetail(e.data.letterId);
      notifyLetterChanged();
    }
  }

  // AI heart result
  if (e.data && e.data.type === 'coupleSpaceLetterHeartResult') {
    if (!e.data.liked) return;
    var letters = getLetters();
    var letter = letters.find(function(l) { return l.id === e.data.letterId; });
    if (letter) {
      if (!letter.hearts) letter.hearts = {};
      letter.hearts.char = true;
      saveLetters(letters);
      if (currentViewingLetterId === e.data.letterId) openLetterDetail(e.data.letterId);
      else renderLetterList();
      showLetterToast((csCharName || 'TA') + '也点了爱心');
      notifyLetterChanged();
    }
  }

  // Auto letter result
  if (e.data && e.data.type === 'coupleSpaceLetterAutoResult') {
    var letters = getLetters();
    if (e.data.item && !letters.find(function(l) { return l.id === e.data.item.id; })) {
      letters.push(e.data.item);
      saveLetters(letters);
      renderLetterList();
      showLetterToast((csCharName || 'TA') + '写了一封信');
    }
  }
});
</script>

  if (!currentCharId) return {};
  try { return JSON.parse(localStorage.getItem('coupleGardenSettings_' + currentCharId)) || {}; }
  catch(e) { return {}; }
}
function saveGardenSettings(s) {
  if (!currentCharId) return;
  localStorage.setItem('coupleGardenSettings_' + currentCharId, JSON.stringify(s));
}
function notifyGardenChanged() {
  window.parent.postMessage({

  }, '*');
}

// --- Check today's special date ---
function getTodaySpecialDate() {
  var now = new Date();
  var mmdd = String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
  // Check default
  for (var i = 0; i < GARDEN_DEFAULT_SPECIAL_DATES.length; i++) {
    if (GARDEN_DEFAULT_SPECIAL_DATES[i].date === mmdd) return GARDEN_DEFAULT_SPECIAL_DATES[i];
  }
  // Check custom
  var gd = getGardenData();
  for (var j = 0; j < gd.specialDates.length; j++) {
    if (gd.specialDates[j].date === mmdd) return gd.specialDates[j];
  }
  // Check anniversaries
  try {
    var annivs = JSON.parse(localStorage.getItem('coupleAnniv_' + currentCharId) || '[]');
    for (var k = 0; k < annivs.length; k++) {
      var ad = annivs[k].date; // YYYY-MM-DD
      if (ad) {
        var parts = ad.split('-');
        var annivMmdd = parts[1] + '-' + parts[2];
        if (annivMmdd === mmdd) return { date: mmdd, name: annivs[k].title, coins: GARDEN_ANNIV_REWARD };
      }
    }
  } catch(e) {}
  return null;
}

// --- Calculate co-water streak ---
function getCoWaterStreak() {
  var gd = getGardenData();
  var logs = gd.waterLogs || [];
  if (logs.length === 0) return 0;
  // Group by date
  var dateMap = {};
  logs.forEach(function(l) {
    var ds = new Date(l.createdAt).toISOString().split('T')[0];
    if (!dateMap[ds]) dateMap[ds] = { user: false, char: false };
    dateMap[ds][l.author] = true;
  });
  // Count consecutive days (from today backwards) where both watered
  var streak = 0;
  var d = new Date(); d.setHours(0,0,0,0);
  for (var i = 0; i < 400; i++) {
    var ds = d.toISOString().split('T')[0];
    if (dateMap[ds] && dateMap[ds].user && dateMap[ds].char) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

// --- Calculate reward for a water action ---
function calculateWaterReward(author) {
  var special = getTodaySpecialDate();
  if (special) return { amount: special.coins, special: special };
  return { amount: GARDEN_NORMAL_REWARD, special: null };
}

// --- Check and grant streak reward ---
function checkStreakReward() {
  var streak = getCoWaterStreak();
  var gd = getGardenData();
  var claimedStreaks = gd.claimedStreaks || {};
  var rewards = [];
  GARDEN_STREAK_REWARDS.forEach(function(sr) {
    if (streak >= sr.days && !claimedStreaks[sr.days]) {
      rewards.push(sr);
      claimedStreaks[sr.days] = Date.now();
    }
  });
  if (rewards.length > 0) {
    gd.claimedStreaks = claimedStreaks;
    saveGardenData(gd);
    notifyGardenChanged();
  }
  return rewards;
}

  var val = (document.getElementById('garden-write-input').value || '').trim();
  var btn = document.getElementById('garden-write-btn');
  if (val.length > 0) { btn.classList.remove('disabled'); }
  else { btn.classList.add('disabled'); }
}

function submitGardenWrite() {
  var input = document.getElementById('garden-write-input');
  var content = (input.value || '').trim();
  if (!content) return;
  var reward = calculateWaterReward('user');
  var gd = getGardenData();
  var newWater = {
    id: 'water_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
    content: content,
    author: 'user',
    createdAt: Date.now(),
    coinsEarned: reward.amount,
    specialDate: reward.special ? { name: reward.special.name, coins: reward.special.coins } : null,
    hearts: { user: true },
    comments: []
  };
  gd.waterLogs.push(newWater);
  gd.totalCoins = (gd.totalCoins || 0) + reward.amount;
  saveGardenData(gd);
  notifyGardenChanged();

  // Send reward to user wallet
  window.parent.postMessage({
    type: 'coupleSpaceGardenWaterReward',
    charId: currentCharId,
    author: 'user',
    amount: reward.amount,
    description: reward.special ? ('情侣树浇水-' + reward.special.name) : '情侣树浇水奖励'
  }, '*');

  // Check streak rewards
  var streakRewards = checkStreakReward();
  streakRewards.forEach(function(sr) {
    gd = getGardenData();
    gd.totalCoins = (gd.totalCoins || 0) + sr.coins;
    saveGardenData(gd);
    window.parent.postMessage({
      type: 'coupleSpaceGardenWaterReward',
      charId: currentCharId,
      author: 'user',
      amount: sr.coins,
      description: '情侣树连续共同浇水' + sr.label + '奖励'
    }, '*');
    // Also reward char
    window.parent.postMessage({
      type: 'coupleSpaceGardenWaterReward',
      charId: currentCharId,
      author: 'char',
      amount: sr.coins,
      description: '情侣树连续共同浇水' + sr.label + '奖励'
    }, '*');
  });

  var overlay = document.getElementById('garden-write-overlay');
  if (overlay) overlay.remove();
  renderGardenPage();
  showGardenToast('浇水成功 +' + reward.amount.toFixed(2) + '元');

  // Ask char for heart
  window.parent.postMessage({
    type: 'coupleSpaceGardenHeartRequest',
    charId: currentCharId,
    waterId: newWater.id,
    waterContent: content
  }, '*');

  if (streakRewards.length > 0) {
    var totalStreakReward = streakRewards.reduce(function(s, r) { return s + r.coins; }, 0);
    setTimeout(function() {
      showGardenToast('连续共同浇水奖励 +' + totalStreakReward.toFixed(2) + '元');
    }, 1500);
  }
}

function closeGardenDetail() {
  document.getElementById('garden-detail-page').classList.remove('active');
  document.getElementById('feature-wrapper').classList.add('active');
  currentViewingWaterId = null;
  renderGardenPage();
}

function toggleGardenHeart(who) {
  if (!currentViewingWaterId) return;
  var gd = getGardenData();
  var w = gd.waterLogs.find(function(x) { return x.id === currentViewingWaterId; });
  if (!w) return;
  if (!w.hearts) w.hearts = {};
  w.hearts[who] = !w.hearts[who];
  saveGardenData(gd);
  notifyGardenChanged();
  openGardenDetail(currentViewingWaterId);

  // If user hearts a char's water, ask char to heart back
  if (who === 'user' && w.hearts.user && w.author === 'char') {
    window.parent.postMessage({
      type: 'coupleSpaceGardenHeartRequest',
      charId: currentCharId,
      waterId: w.id,
      waterContent: w.content
    }, '*');
  }
}

function deleteWaterFromDetail() {
  if (!currentViewingWaterId) return;
  if (!confirm('确定删除这条浇水记录？')) return;
  var gd = getGardenData();
  var idx = gd.waterLogs.findIndex(function(x) { return x.id === currentViewingWaterId; });
  if (idx >= 0) {
    var removed = gd.waterLogs[idx];
    gd.totalCoins = Math.max(0, (gd.totalCoins || 0) - (removed.coinsEarned || 0));
    gd.waterLogs.splice(idx, 1);
    saveGardenData(gd);
    notifyGardenChanged();
  }
  closeGardenDetail();
}

// --- Comments ---
function updateGardenCommentBtn() {
  var val = (document.getElementById('garden-comment-input').value || '').trim();
  var btn = document.getElementById('garden-comment-send');
  if (val.length > 0) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }
  else { btn.style.opacity = '0.4'; btn.style.pointerEvents = 'none'; }
}

function sendGardenComment() {
  var input = document.getElementById('garden-comment-input');
  var content = (input.value || '').trim();
  if (!content || !currentViewingWaterId) return;
  var gd = getGardenData();
  var w = gd.waterLogs.find(function(x) { return x.id === currentViewingWaterId; });
  if (!w) return;
  if (!w.comments) w.comments = [];
  w.comments.push({ author: 'user', content: content, createdAt: Date.now() });
  saveGardenData(gd);
  notifyGardenChanged();
  input.value = '';
  updateGardenCommentBtn();
  openGardenDetail(currentViewingWaterId);

  // Ask AI to comment back
  if (w.author === 'user') {
    window.parent.postMessage({
      type: 'coupleSpaceGardenCommentRequest',
      charId: currentCharId,
      waterId: w.id,
      waterContent: w.content
    }, '*');
  }
}
